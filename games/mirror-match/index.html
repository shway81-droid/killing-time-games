<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>거울 대칭</title>
  <link rel="stylesheet" href="../../shared/style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 화면 1: 인트로 -->
  <section class="screen screen-intro active" id="introScreen">
    <header class="game-header">
      <button class="icon-btn" id="backBtn" aria-label="뒤로가기">←</button>
      <h1 class="game-title">거울 대칭</h1>
      <button class="sound-toggle" id="soundToggleIntro" aria-label="사운드 토글">🔇</button>
    </header>

    <div class="intro-body">
      <!-- Inline SVG demo: left half + mirror line + right half -->
      <div class="intro-demo" aria-hidden="true">
        <svg class="demo-svg" viewBox="0 0 200 100" xmlns="http://www.w3.org/2000/svg">
          <!-- Left 3x3 grid -->
          <rect x="4"  y="4"  width="28" height="28" rx="4" fill="#EF5350"/>
          <rect x="36" y="4"  width="28" height="28" rx="4" fill="none" stroke="#E0E0E0" stroke-width="1.5" stroke-dasharray="3,3"/>
          <rect x="68" y="4"  width="28" height="28" rx="4" fill="#26C6DA"/>
          <rect x="4"  y="36" width="28" height="28" rx="4" fill="none" stroke="#E0E0E0" stroke-width="1.5" stroke-dasharray="3,3"/>
          <rect x="36" y="36" width="28" height="28" rx="4" fill="#EF5350"/>
          <rect x="68" y="36" width="28" height="28" rx="4" fill="none" stroke="#E0E0E0" stroke-width="1.5" stroke-dasharray="3,3"/>
          <rect x="4"  y="68" width="28" height="28" rx="4" fill="#26C6DA"/>
          <rect x="36" y="68" width="28" height="28" rx="4" fill="#26C6DA"/>
          <rect x="68" y="68" width="28" height="28" rx="4" fill="none" stroke="#E0E0E0" stroke-width="1.5" stroke-dasharray="3,3"/>
          <!-- Mirror line -->
          <line x1="100" y1="2" x2="100" y2="98" stroke="#FF6F00" stroke-width="3" stroke-dasharray="6,4" stroke-linecap="round"/>
          <!-- Mirror arrow labels -->
          <text x="88" y="54" font-size="10" font-family="sans-serif" fill="#FF6F00" font-weight="700">↔</text>
          <!-- Right 3x3 grid (mirrored) -->
          <rect x="104" y="4"  width="28" height="28" rx="4" fill="#26C6DA"/>
          <rect x="136" y="4"  width="28" height="28" rx="4" fill="none" stroke="#E0E0E0" stroke-width="1.5" stroke-dasharray="3,3"/>
          <rect x="168" y="4"  width="28" height="28" rx="4" fill="#EF5350"/>
          <rect x="104" y="36" width="28" height="28" rx="4" fill="none" stroke="#E0E0E0" stroke-width="1.5" stroke-dasharray="3,3"/>
          <rect x="136" y="36" width="28" height="28" rx="4" fill="#EF5350"/>
          <rect x="168" y="36" width="28" height="28" rx="4" fill="none" stroke="#E0E0E0" stroke-width="1.5" stroke-dasharray="3,3"/>
          <rect x="104" y="68" width="28" height="28" rx="4" fill="none" stroke="#E0E0E0" stroke-width="1.5" stroke-dasharray="3,3"/>
          <rect x="136" y="68" width="28" height="28" rx="4" fill="#26C6DA"/>
          <rect x="168" y="68" width="28" height="28" rx="4" fill="#26C6DA"/>
          <!-- Correct badge -->
          <rect x="100" y="86" width="100" height="12" rx="6" fill="rgba(0,200,83,0.15)"/>
          <text x="150" y="96" font-size="8" font-family="sans-serif" fill="#00C853" font-weight="800" text-anchor="middle">정답!</text>
        </svg>
      </div>

      <p class="intro-text">거울에 비친 모습을 찾으세요!</p>
      <p class="intro-subtext">10라운드 · 먼저 정답을 터치하면 +1점 · 오답은 실격 · 오답 시 -1점 감점!</p>

      <div class="player-select-label">인원 선택</div>
      <div class="player-select-row">
        <button class="player-btn active" data-count="2">2명</button>
        <button class="player-btn" data-count="3">3명</button>
        <button class="player-btn" data-count="4">4명</button>
      </div>
    </div>

    <button class="btn btn-primary btn-play" id="playBtn">PLAY</button>
  </section>

  <!-- 화면 1-5: 카운트다운 -->
  <section class="screen screen-countdown" id="countdownScreen">
    <div class="countdown-number" id="countdownNumber">3</div>
  </section>

  <!-- 화면 2: 게임 플레이 -->
  <section class="screen screen-game" id="gameScreen">
    <!-- 플레이어 구역 (JS로 동적 렌더링) -->
    <div class="zones-wrap" id="zonesWrap"></div>

    <!-- 중앙 패널: 왼쪽 절반 + 거울선 + "?" -->
    <div class="target-panel" id="targetPanel">
      <div class="round-badge" id="roundBadge">1 / 10</div>
      <div class="target-wrap" id="targetWrap">
        <div class="target-question" id="targetQuestion">거울에 비친 모습은?</div>
        <div class="target-svg-box" id="targetSvgBox">
          <!-- JS로 채움 -->
        </div>
      </div>
      <div class="round-status" id="roundStatus"></div>
    </div>

    <button class="icon-btn close-btn" id="closeBtn" aria-label="홈으로">✕</button>
  </section>

  <!-- 화면 3: 결과 -->
  <section class="screen screen-result" id="resultScreen">
    <header class="result-header">
      <h2 class="result-title" id="resultTitle">게임 종료!</h2>
    </header>
    <div class="result-winner" id="resultWinner"></div>
    <div class="result-scores-wrap" id="resultScoresWrap"></div>
    <div class="result-actions">
      <button class="btn btn-primary" id="retryBtn">다시하기</button>
      <button class="btn btn-secondary" id="homeBtn">홈으로</button>
    </div>
  </section>

  <script src="../../shared/engine.js"></script>
  <script src="game.js"></script>
</body>
</html>
