<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>순서 정렬</title>
  <link rel="stylesheet" href="../../shared/style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 화면 1: 인트로 / 인원 선택 -->
  <section class="screen screen-intro active" id="introScreen">
    <header class="game-header">
      <button class="icon-btn" id="backBtn" aria-label="뒤로가기">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <h1 class="game-title">순서 정렬</h1>
      <button class="sound-toggle" id="soundToggleIntro" aria-label="사운드 토글">
        <svg id="soundIconIntro" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
      </button>
    </header>

    <div class="intro-body">
      <div class="intro-icon-wrap">
        <svg viewBox="0 0 120 80" width="160" height="107" xmlns="http://www.w3.org/2000/svg">
          <!-- 5 bars of increasing height (preview) -->
          <rect x="5"  y="55" width="18" height="20" rx="4" fill="#78909C" stroke="#546E7A" stroke-width="1.5"/>
          <rect x="28" y="45" width="18" height="30" rx="4" fill="#78909C" stroke="#546E7A" stroke-width="1.5"/>
          <rect x="51" y="33" width="18" height="42" rx="4" fill="#78909C" stroke="#546E7A" stroke-width="1.5"/>
          <rect x="74" y="20" width="18" height="55" rx="4" fill="#78909C" stroke="#546E7A" stroke-width="1.5"/>
          <rect x="97" y="5"  width="18" height="70" rx="4" fill="#78909C" stroke="#546E7A" stroke-width="1.5"/>
          <!-- floor line -->
          <line x1="2" y1="76" x2="118" y2="76" stroke="#607D8B" stroke-width="2" stroke-linecap="round"/>
          <!-- arrow hint -->
          <polyline points="10,72 108,72" stroke="none"/>
        </svg>
      </div>

      <p class="intro-text">짧은 막대부터<br>긴 막대 순서로 터치!</p>
      <p class="intro-subtext">10라운드 · 먼저 완성하면 +1점</p>

      <div class="select-label">인원 선택</div>
      <div class="player-select-row">
        <button class="player-btn active" data-count="2">2명</button>
        <button class="player-btn" data-count="3">3명</button>
        <button class="player-btn" data-count="4">4명</button>
      </div>
    </div>

    <button class="btn btn-primary btn-play" id="playBtn">PLAY</button>
  </section>

  <!-- 화면 2: 게임 플레이 -->
  <section class="screen screen-game" id="gameScreen">
    <div class="zones-wrap" id="zonesWrap"></div>

    <!-- 중앙 HUD -->
    <div class="center-hud" id="centerHud">
      <div class="round-badge" id="roundBadge">1 / 10</div>
      <div class="timer-ring-wrap">
        <svg class="timer-ring" viewBox="0 0 56 56" width="56" height="56">
          <circle cx="28" cy="28" r="24" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="5"/>
          <circle id="timerArc" cx="28" cy="28" r="24" fill="none" stroke="#FFD54F" stroke-width="5"
                  stroke-linecap="round" stroke-dasharray="150.8" stroke-dashoffset="0"
                  transform="rotate(-90 28 28)"/>
        </svg>
        <span class="timer-label" id="timerLabel">15</span>
      </div>
      <div class="round-msg" id="roundMsg"></div>
    </div>

    <button class="icon-btn close-btn" id="closeBtn" aria-label="홈으로">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </section>

  <!-- 화면 3: 결과 -->
  <section class="screen screen-result" id="resultScreen">
    <header class="result-header">
      <h2 class="result-title" id="resultTitle">게임 종료!</h2>
    </header>
    <div class="result-winner" id="resultWinner"></div>

    <div class="result-table-wrap">
      <table class="result-table" id="resultTable">
        <thead id="resultTableHead"></thead>
        <tbody id="resultTableBody"></tbody>
      </table>
    </div>

    <div class="total-row" id="totalRow"></div>

    <div class="result-actions">
      <button class="btn btn-primary" id="retryBtn">다시하기</button>
      <button class="btn btn-secondary" id="homeBtn">홈으로</button>
    </div>
  </section>

  <script src="../../shared/engine.js"></script>
  <script src="game.js"></script>
</body>
</html>
