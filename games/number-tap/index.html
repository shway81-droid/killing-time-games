<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>숫자 순서대로</title>
  <link rel="stylesheet" href="../../shared/style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 화면 1: 인트로 -->
  <section class="screen screen-intro active" id="introScreen">
    <header class="game-header">
      <button class="icon-btn" id="backBtn" aria-label="뒤로가기">←</button>
      <h1 class="game-title">숫자 순서대로 🔢</h1>
      <button class="sound-toggle" id="soundToggleIntro" aria-label="사운드 토글">🔇</button>
    </header>

    <div class="intro-body">
      <p class="intro-text">1부터 순서대로 빠르게 터치하세요!</p>
      <p class="intro-subtext">틀린 숫자를 누르면 반응이 없어요.</p>

      <!-- 플레이어 수 선택 -->
      <div class="option-group">
        <p class="option-label">플레이어</p>
        <div class="option-btns" id="playerCountGroup">
          <button class="option-btn" data-value="2">2명</button>
          <button class="option-btn selected" data-value="3">3명</button>
          <button class="option-btn" data-value="4">4명</button>
        </div>
      </div>

      <!-- 난이도 선택 -->
      <div class="option-group">
        <p class="option-label">난이도</p>
        <div class="option-btns" id="difficultyGroup">
          <button class="option-btn selected" data-value="easy">쉬움 (1~10)</button>
          <button class="option-btn" data-value="normal">보통 (1~15)</button>
        </div>
      </div>
    </div>

    <button class="btn btn-primary btn-play" id="playBtn">PLAY</button>
  </section>

  <!-- 화면 2: 카운트다운 -->
  <section class="screen screen-countdown" id="countdownScreen">
    <div class="countdown-number" id="countdownNumber">3</div>
  </section>

  <!-- 화면 3: 게임 플레이 -->
  <section class="screen screen-game" id="gameScreen">
    <!-- 상단 HUD: 타이머 -->
    <header class="game-hud">
      <div class="hud-time" id="hudTime">60</div>
      <div class="hud-timer-bar">
        <div class="progress-bar">
          <div class="progress-bar-fill" id="timerBar" style="width:100%"></div>
        </div>
      </div>
      <button class="icon-btn close-btn-hud" id="closeBtn" aria-label="홈으로">✕</button>
    </header>

    <!-- 플레이어 존 컨테이너 (JS가 동적으로 생성) -->
    <div class="zones-container" id="zonesContainer"></div>
  </section>

  <!-- 화면 4: 결과 -->
  <section class="screen screen-result" id="resultScreen">
    <div class="result-header">
      <h2 class="result-title">🏆 결과</h2>
    </div>
    <div class="result-rankings" id="resultRankings"></div>
    <div class="result-actions">
      <button class="btn btn-primary" id="retryBtn">다시하기</button>
      <button class="btn btn-secondary" id="homeBtn">홈으로</button>
    </div>
  </section>

  <script src="../../shared/engine.js"></script>
  <script src="game.js"></script>
</body>
</html>
