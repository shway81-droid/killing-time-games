<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>수도 맞추기</title>
  <link rel="stylesheet" href="../../shared/style.css?v=2">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 화면 1: 인트로 -->
  <section class="screen screen-intro active" id="introScreen">
    <header class="game-header">
      <button class="icon-btn" id="backBtn" aria-label="뒤로가기">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <path d="M14 5L8 11L14 17" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <h1 class="game-title">수도 맞추기</h1>
      <button class="sound-toggle icon-btn" id="soundToggleIntro" aria-label="사운드 토글">
        <svg id="soundIconIntro" width="22" height="22" viewBox="0 0 22 22" fill="none">
          <path d="M4 8H8L13 4V18L8 14H4V8Z" fill="currentColor"/>
          <path d="M16 8C17.5 9 17.5 13 16 14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M18.5 6C21 8 21 14 18.5 16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </header>

    <div class="intro-body">
      <!-- Globe SVG illustration -->
      <svg class="intro-globe" width="110" height="110" viewBox="0 0 110 110" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="55" cy="55" r="48" fill="#E0F7FA" stroke="#26A69A" stroke-width="3"/>
        <ellipse cx="55" cy="55" rx="22" ry="48" fill="none" stroke="#26A69A" stroke-width="2" stroke-dasharray="4 3"/>
        <line x1="7" y1="55" x2="103" y2="55" stroke="#26A69A" stroke-width="2"/>
        <line x1="15" y1="35" x2="95" y2="35" stroke="#26A69A" stroke-width="1.5" stroke-dasharray="3 3"/>
        <line x1="15" y1="75" x2="95" y2="75" stroke="#26A69A" stroke-width="1.5" stroke-dasharray="3 3"/>
        <circle cx="55" cy="55" r="48" fill="none" stroke="#26A69A" stroke-width="3"/>
        <!-- Pin marker -->
        <circle cx="68" cy="40" r="6" fill="#EF5350"/>
        <line x1="68" y1="46" x2="68" y2="54" stroke="#EF5350" stroke-width="2.5" stroke-linecap="round"/>
      </svg>

      <p class="intro-text">나라 이름을 보고<br>수도를 맞춰요!</p>
      <p class="intro-subtext">먼저 정답 탭 +1점 · 오답 시 -1점 감점! · 10문제 승부</p>
      <div class="intro-warning">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M9 1L17 16H1L9 1Z" fill="#FFA726" stroke="#F57C00" stroke-width="1.5" stroke-linejoin="round"/>
          <rect x="8.2" y="7" width="1.6" height="5" rx="0.8" fill="#fff"/>
          <circle cx="9" cy="14" r="0.9" fill="#fff"/>
        </svg>
        오답 시 -1점 감점!
      </div>

      <div class="select-label">인원 선택</div>
      <div class="player-select-row">
        <button class="player-btn active" data-count="2">2명</button>
        <button class="player-btn" data-count="3">3명</button>
        <button class="player-btn" data-count="4">4명</button>
      </div>
    </div>

    <button class="btn btn-play" id="playBtn">PLAY</button>
  </section>

  <!-- 화면 1-5: 카운트다운 -->
  <section class="screen screen-countdown" id="countdownScreen">
    <div class="countdown-number" id="countdownNumber">3</div>
  </section>

  <!-- 화면 2: 게임 플레이 -->
  <section class="screen screen-game" id="gameScreen">

    <!-- 상단 문제 패널 (flag-quiz 패턴) -->
    <div class="top-bar" id="problemPanel">
      <div class="top-bar-meta">
        <div class="question-counter" id="questionCounter">1 / 10</div>
        <div class="problem-timer" id="problemTimer">8</div>
      </div>
      <svg class="country-display" id="countryDisplay" width="300" height="80" viewBox="0 0 300 80">
        <rect x="2" y="2" width="296" height="76" rx="18" ry="18"
              fill="rgba(0,0,0,0.82)" stroke="rgba(255,255,255,0.18)" stroke-width="2"/>
        <text id="countryText" x="150" y="50"
              text-anchor="middle" dominant-baseline="middle"
              font-family="'Pretendard Variable',-apple-system,'Noto Sans KR',sans-serif"
              font-size="28" font-weight="800" fill="#FFFFFF" letter-spacing="1">?</text>
      </svg>
      <div class="problem-status" id="problemStatus"></div>
      <button class="icon-btn close-btn" id="closeBtn" aria-label="홈으로">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M3 3L15 15M15 3L3 15" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <!-- 플레이어 존 (JS 렌더링) -->
    <div class="zones-wrap" id="zonesWrap"></div>

    <!-- 점수 바 -->
    <div class="score-bar" id="scoreBar"></div>
  </section>

  <!-- 화면 3: 결과 -->
  <section class="screen screen-result" id="resultScreen">
    <header class="result-header">
      <h2 class="result-title" id="resultTitle">게임 종료!</h2>
    </header>
    <div class="result-winner" id="resultWinner"></div>

    <div class="result-table-wrap">
      <table class="result-table" id="resultTable">
        <thead id="resultTableHead"></thead>
        <tbody id="resultTableBody"></tbody>
      </table>
    </div>

    <div class="total-row" id="totalRow"></div>

    <div class="result-actions">
      <button class="btn btn-play" id="retryBtn">다시하기</button>
      <button class="btn btn-secondary" id="homeBtn">홈으로</button>
    </div>
  </section>

  <script src="../../shared/engine.js?v=2"></script>
  <script src="game.js"></script>
</body>
</html>
