<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>릴레이 숫자</title>
  <link rel="stylesheet" href="../../shared/style.css?v=2">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 화면 1: 인트로 / 인원 선택 -->
  <section class="screen screen-intro active" id="introScreen">
    <header class="game-header">
      <button class="icon-btn" id="backBtn" aria-label="뒤로가기">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M12 4L6 10L12 16" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <h1 class="game-title">🤝 릴레이 숫자</h1>
      <button class="sound-toggle" id="soundToggleIntro" aria-label="사운드 토글">🔇</button>
    </header>
    <div class="intro-body">
      <svg width="100" height="100" viewBox="0 0 100 100" aria-hidden="true">
        <circle cx="50" cy="50" r="46" fill="#5E35B1" opacity="0.15"/>
        <text x="50" y="62" text-anchor="middle" font-size="44" font-family="sans-serif">🤝</text>
      </svg>
      <p class="intro-desc">1부터 30까지<br>순서대로 함께 세어요!</p>
      <p class="intro-sub">자기 번호가 뜨면 구역을 터치하세요<br>3초 안에 못 누르면 실패!</p>

      <div class="player-select-label">인원 선택</div>
      <div class="player-select">
        <button class="player-btn active" data-count="2">2명</button>
        <button class="player-btn" data-count="3">3명</button>
        <button class="player-btn" data-count="4">4명</button>
      </div>
    </div>
    <button class="btn btn-primary btn-play" id="playBtn">PLAY</button>
  </section>

  <!-- 화면 2: 카운트다운 -->
  <section class="screen screen-countdown" id="countdownScreen">
    <div class="countdown-number" id="countdownNumber">3</div>
  </section>

  <!-- 화면 3: 게임 플레이 -->
  <section class="screen screen-game" id="gameScreen">
    <!-- 상단 진행 바 -->
    <div class="game-hud">
      <button class="btn-glass-circle" id="closeBtn" aria-label="홈으로">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M12 4L4 12M4 4L12 12" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </button>
      <div class="progress-wrap">
        <div class="progress-label" id="progressLabel">0 / 30</div>
        <div class="progress-bar">
          <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
        </div>
      </div>
      <div class="turn-timer-badge" id="turnTimerBadge">3</div>
    </div>

    <!-- 중앙 안내 메시지 -->
    <div class="center-announce" id="centerAnnounce">
      <span id="announceText"></span>
    </div>

    <!-- 플레이어 구역 (JS로 동적 렌더링) -->
    <div class="zones-wrap" id="zonesWrap"></div>
  </section>

  <!-- 화면 4: 결과 -->
  <section class="screen screen-result" id="resultScreen">
    <div class="result-modern">
      <!-- confetti layer -->
      <div class="confetti-layer" id="confettiLayer" aria-hidden="true"></div>

      <div class="result-icon" id="resultIcon">
        <svg width="90" height="90" viewBox="0 0 90 90" id="resultSvg">
          <!-- filled by JS -->
        </svg>
      </div>

      <h2 class="result-title" id="resultTitle" style="color:#fff"></h2>
      <p class="result-sub" id="resultSub" style="color:rgba(255,255,255,0.75); font-size:1.1rem; text-align:center;"></p>

      <div class="result-score-card">
        <div class="result-score-label">도달한 숫자</div>
        <div class="result-score-value" id="resultReached">0</div>
      </div>

      <div class="result-actions" style="margin-top:8px;">
        <button class="btn btn-primary" id="retryBtn">다시하기</button>
        <button class="btn btn-secondary" id="homeBtn">홈으로</button>
      </div>
    </div>
  </section>

  <script src="../../shared/engine.js?v=2"></script>
  <script src="game.js"></script>
</body>
</html>
