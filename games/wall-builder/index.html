<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>벽 세우기</title>
  <link rel="stylesheet" href="../../shared/style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 화면 1: 인트로 -->
  <section class="screen screen-intro active" id="introScreen">
    <header class="game-header">
      <button class="icon-btn" id="backBtn" aria-label="뒤로가기">←</button>
      <h1 class="game-title">벽 세우기</h1>
      <button class="sound-toggle" id="soundToggleIntro" aria-label="사운드 토글">🔇</button>
    </header>

    <div class="intro-body">
      <!-- 게임 미리보기 SVG -->
      <div class="intro-preview" aria-hidden="true">
        <svg viewBox="0 0 180 180" width="180" height="180">
          <!-- 그리드 셀 배경 -->
          <rect x="4" y="4" width="32" height="32" rx="4" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
          <rect x="40" y="4" width="32" height="32" rx="4" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
          <rect x="76" y="4" width="32" height="32" rx="4" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
          <rect x="112" y="4" width="32" height="32" rx="4" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
          <rect x="148" y="4" width="32" height="32" rx="4" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
          <rect x="4" y="40" width="32" height="32" rx="4" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
          <rect x="40" y="40" width="32" height="32" rx="4" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
          <rect x="76" y="40" width="32" height="32" rx="4" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
          <rect x="112" y="40" width="32" height="32" rx="4" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
          <rect x="148" y="40" width="32" height="32" rx="4" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
          <rect x="4" y="76" width="32" height="32" rx="4" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
          <rect x="40" y="76" width="32" height="32" rx="4" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
          <rect x="76" y="76" width="32" height="32" rx="4" fill="#E8F5E9" stroke="#E0E0E0" stroke-width="1"/>
          <rect x="112" y="76" width="32" height="32" rx="4" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
          <rect x="148" y="76" width="32" height="32" rx="4" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
          <rect x="4" y="112" width="32" height="32" rx="4" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
          <rect x="40" y="112" width="32" height="32" rx="4" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
          <rect x="76" y="112" width="32" height="32" rx="4" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
          <rect x="112" y="112" width="32" height="32" rx="4" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
          <rect x="148" y="112" width="32" height="32" rx="4" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
          <rect x="4" y="148" width="32" height="32" rx="4" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
          <rect x="40" y="148" width="32" height="32" rx="4" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
          <rect x="76" y="148" width="32" height="32" rx="4" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
          <rect x="112" y="148" width="32" height="32" rx="4" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
          <rect x="148" y="148" width="32" height="32" rx="4" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
          <!-- 배치된 벽 (파란색 / P1 색) -->
          <rect x="36" y="40" width="8" height="32" rx="3" fill="#29B6F6"/>
          <rect x="4" y="72" width="72" height="8" rx="3" fill="#EF5350"/>
          <!-- P1 말 (파란 원) at row0, col2 -->
          <circle cx="92" cy="20" r="13" fill="#29B6F6"/>
          <text x="92" y="25" text-anchor="middle" font-size="12" font-weight="900" fill="white">1</text>
          <!-- P2 말 (빨간 원) at row4, col2 -->
          <circle cx="92" cy="164" r="13" fill="#EF5350"/>
          <text x="92" y="169" text-anchor="middle" font-size="12" font-weight="900" fill="white">2</text>
          <!-- 목표선 표시 -->
          <rect x="4" y="148" width="172" height="32" rx="4" fill="#FFEB3B" opacity="0.25"/>
          <rect x="4" y="4" width="172" height="32" rx="4" fill="#FFEB3B" opacity="0.25"/>
        </svg>
      </div>

      <p class="intro-text">벽으로 막고 먼저 건너편에 도달!</p>
      <div class="intro-rules">
        <div class="rule-item">
          <svg width="20" height="20" viewBox="0 0 20 20">
            <circle cx="10" cy="10" r="9" fill="#29B6F6"/>
            <text x="10" y="15" text-anchor="middle" font-size="11" font-weight="900" fill="white">1</text>
          </svg>
          <span>P1은 위, P2는 아래에서 시작 — 반대편 끝줄 도달 시 승리</span>
        </div>
        <div class="rule-item">
          <svg width="20" height="20" viewBox="0 0 20 20">
            <rect x="2" y="8" width="16" height="4" rx="2" fill="#795548"/>
          </svg>
          <span>매 턴: 이동 또는 벽 놓기(각 5개) 중 하나 선택</span>
        </div>
        <div class="rule-item">
          <svg width="20" height="20" viewBox="0 0 20 20">
            <path d="M4 10 L10 4 L16 10 L10 16 Z" fill="#FFA726"/>
          </svg>
          <span>상대방의 길을 완전히 막는 벽은 놓을 수 없음</span>
        </div>
      </div>
    </div>

    <button class="btn btn-primary btn-play" id="playBtn">PLAY</button>
  </section>

  <!-- 화면 2: 게임 플레이 -->
  <section class="screen screen-game" id="gameScreen">
    <header class="game-header">
      <button class="icon-btn" id="closeBtn" aria-label="홈으로">←</button>
      <div class="turn-indicator" id="turnIndicator">
        <span class="turn-dot" id="turnDot"></span>
        <span class="turn-text" id="turnText">P1의 차례</span>
      </div>
      <button class="sound-toggle" id="soundToggleGame" aria-label="사운드 토글">🔇</button>
    </header>

    <!-- 플레이어 정보 바 -->
    <div class="player-info-bar">
      <div class="player-info p1-info" id="p1Info">
        <svg width="28" height="28" viewBox="0 0 28 28">
          <circle cx="14" cy="14" r="13" fill="#29B6F6"/>
          <text x="14" y="19" text-anchor="middle" font-size="13" font-weight="900" fill="white">1</text>
        </svg>
        <div class="player-walls">
          <span class="walls-label">벽</span>
          <div class="wall-pips" id="p1WallPips"></div>
        </div>
      </div>
      <div class="vs-badge">VS</div>
      <div class="player-info p2-info" id="p2Info">
        <svg width="28" height="28" viewBox="0 0 28 28">
          <circle cx="14" cy="14" r="13" fill="#EF5350"/>
          <text x="14" y="19" text-anchor="middle" font-size="13" font-weight="900" fill="white">2</text>
        </svg>
        <div class="player-walls">
          <span class="walls-label">벽</span>
          <div class="wall-pips" id="p2WallPips"></div>
        </div>
      </div>
    </div>

    <!-- 액션 선택 버튼 -->
    <div class="action-bar">
      <button class="action-btn active" id="actionMove">
        <svg width="22" height="22" viewBox="0 0 22 22">
          <circle cx="11" cy="11" r="5" fill="#555"/>
          <path d="M11 2 L11 6 M11 16 L11 20 M2 11 L6 11 M16 11 L20 11" stroke="#555" stroke-width="2.5" stroke-linecap="round"/>
          <path d="M11 2 L9 5 L13 5 Z M11 20 L9 17 L13 17 Z M2 11 L5 9 L5 13 Z M20 11 L17 9 L17 13 Z" fill="#555"/>
        </svg>
        이동
      </button>
      <button class="action-btn" id="actionWall" id="actionWallBtn">
        <svg width="22" height="22" viewBox="0 0 22 22">
          <rect x="3" y="9" width="16" height="4" rx="2" fill="#795548"/>
        </svg>
        벽 놓기
      </button>
    </div>

    <!-- 보드 -->
    <div class="board-wrapper">
      <div class="board-container" id="boardContainer">
        <!-- JS로 동적 생성 -->
      </div>
    </div>

    <!-- 상태 메시지 -->
    <div class="status-msg" id="statusMsg">이동할 칸을 선택하세요</div>
  </section>

  <!-- 화면 3: 결과 -->
  <section class="screen screen-result" id="resultScreen">
    <header class="game-header result-header">
      <div></div>
      <h2 class="result-header-title">게임 종료!</h2>
      <div></div>
    </header>

    <div class="result-body">
      <!-- 트로피 SVG (인라인) -->
      <div class="result-trophy" id="resultTrophy">
        <svg width="80" height="80" viewBox="0 0 80 80" id="trophySvg">
          <rect x="30" y="60" width="20" height="8" rx="3" fill="#FFA726"/>
          <rect x="22" y="68" width="36" height="6" rx="3" fill="#FFA726"/>
          <path d="M15 12 Q10 12 10 22 Q10 36 25 42 L25 55 L55 55 L55 42 Q70 36 70 22 Q70 12 65 12 Z" fill="#FFC107"/>
          <path d="M10 22 Q10 12 15 12" stroke="#FFD54F" stroke-width="3" fill="none" stroke-linecap="round"/>
          <path d="M65 12 Q70 12 70 22" stroke="#FFD54F" stroke-width="3" fill="none" stroke-linecap="round"/>
          <circle cx="40" cy="34" r="10" fill="#FFD54F" opacity="0.6"/>
          <text x="40" y="39" text-anchor="middle" font-size="12" font-weight="900" fill="#E65100">1위</text>
        </svg>
      </div>
      <h2 class="result-title" id="resultTitle">P1 승리!</h2>
      <p class="result-sub" id="resultSub">반대편 끝에 먼저 도달했어요!</p>
    </div>

    <div class="result-actions">
      <button class="btn btn-primary" id="retryBtn">다시하기</button>
      <button class="btn btn-secondary" id="homeBtn">홈으로</button>
    </div>
  </section>

  <script src="../../shared/engine.js"></script>
  <script src="game.js"></script>

</body>
</html>
