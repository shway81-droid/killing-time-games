<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>방패와 검</title>
<link rel="stylesheet" href="../../shared/style.css?v=2">
<style>
  html,body{background:#E3F2FD;overflow:hidden;height:100%;}
  .screen-intro{background:linear-gradient(160deg,#E3F2FD 0%,#BBDEFB 100%);justify-content:flex-start;}
  .intro-title-text{font-size:1.7rem;font-weight:900;color:#0D47A1;text-align:center;}
  .intro-desc-text{font-size:.95rem;color:#1565C0;text-align:center;line-height:1.5;}
  .intro-rules{background:rgba(255,255,255,.7);border:1px solid rgba(30,136,229,.3);border-radius:14px;padding:12px 20px;width:90%;max-width:340px;}
  .intro-rules li{font-size:.85rem;color:#0D47A1;margin-bottom:4px;list-style:none;padding-left:1.4em;position:relative;}
  .intro-rules li::before{content:'⚔️';position:absolute;left:0;font-size:.75rem;}
  .btn-play{background:linear-gradient(135deg,#1E88E5,#0D47A1);color:#fff;font-size:1.25rem;box-shadow:0 4px 20px rgba(30,136,229,.45);}
  .screen-countdown{background:linear-gradient(160deg,#0D47A1 0%,#1565C0 100%);}
  .countdown-number{color:#BBDEFB;}

  .screen-game{background:#0D1440;flex-direction:column;min-height:100vh;overflow:hidden;}
  .game-hud{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#000a33;}
  .hud-close,.hud-sound{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.12);border:none;color:#fff;font-size:1.1rem;display:flex;align-items:center;justify-content:center;}
  .hud-hp{font-size:.9rem;font-weight:900;color:#EF5350;min-width:70px;}
  .hud-monster{flex:1;}
  .hp-label{font-size:.65rem;color:#90CAF9;margin-bottom:2px;}
  .hp-bar{height:12px;background:rgba(255,255,255,.15);border-radius:6px;overflow:hidden;}
  .hp-fill{height:100%;background:linear-gradient(90deg,#EF5350,#FF7043);transition:width .2s;}
  .hud-time{font-size:1rem;font-weight:900;color:#FFD54F;min-width:40px;text-align:right;}

  .arena{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:4px;padding:4px;}
  .panel{border-radius:14px;padding:10px;display:flex;flex-direction:column;position:relative;overflow:hidden;}
  .panel.p1{background:linear-gradient(180deg,#0D47A1,#002171);border:2px solid #1565C0;}
  .panel.p2{background:linear-gradient(180deg,#B71C1C,#7f0000);border:2px solid #D32F2F;}
  .panel-label{font-size:.7rem;font-weight:900;letter-spacing:.08em;text-align:center;margin-bottom:4px;}
  .p1 .panel-label{color:#90CAF9;}
  .p2 .panel-label{color:#FFCDD2;}

  .attack-area{flex:1;position:relative;background:rgba(0,0,0,.2);border-radius:8px;overflow:hidden;}
  .falling{position:absolute;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;background:radial-gradient(circle,#FFEB3B,#FF6F00);box-shadow:0 0 12px rgba(255,152,0,.7);}
  .lane-row{display:flex;gap:4px;margin-top:6px;}
  .lane-btn{flex:1;height:44px;border-radius:10px;background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.2);color:#90CAF9;font-size:.8rem;font-weight:900;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform .08s,background .15s;}
  .lane-btn:active{transform:scale(.92);}
  .lane-btn.active{background:#42A5F5;border-color:#fff;color:#fff;}

  .monster-area{flex:1;display:flex;align-items:center;justify-content:center;position:relative;}
  .monster{font-size:5rem;animation:monsterIdle 1.5s ease-in-out infinite;user-select:none;-webkit-tap-highlight-color:transparent;cursor:pointer;}
  .monster.hit{animation:monsterHit .25s ease;}
  @keyframes monsterIdle{0%,100%{transform:scale(1);}50%{transform:scale(1.05);}}
  @keyframes monsterHit{0%{transform:scale(1) rotate(0);}30%{transform:scale(1.2) rotate(-5deg);filter:hue-rotate(90deg);}100%{transform:scale(1) rotate(0);}}
  .damage-float{position:absolute;color:#FFEB3B;font-weight:900;font-size:1.1rem;pointer-events:none;animation:dmgFloat .6s ease-out forwards;}
  @keyframes dmgFloat{0%{opacity:1;transform:translateY(0);}100%{opacity:0;transform:translateY(-40px);}}
  .attack-btn{padding:10px;border-radius:10px;background:#D32F2F;color:#fff;font-size:.85rem;font-weight:900;border:2px solid #FFCDD2;cursor:pointer;-webkit-tap-highlight-color:transparent;margin-top:4px;}
  .attack-btn:active{transform:scale(.96);background:#F44336;}

  .screen-result{background:linear-gradient(160deg,#0D47A1 0%,#1565C0 60%,#0D47A1 100%);justify-content:center;align-items:center;gap:16px;padding:24px;}
  .result-emoji-big{font-size:4rem;}
  .result-headline{font-size:2rem;font-weight:900;text-align:center;}
  .result-headline.success{color:#BBDEFB;}
  .result-headline.fail{color:#FF8A65;}
  .result-sub{font-size:1rem;color:rgba(255,255,255,.7);text-align:center;}
  .result-stats{background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.15);border-radius:16px;padding:16px 28px;width:100%;max-width:300px;display:flex;flex-direction:column;gap:8px;}
  .stat-row{display:flex;justify-content:space-between;font-size:.9rem;}
  .stat-label{color:rgba(255,255,255,.5);}
  .stat-val{color:#fff;font-weight:700;}
  .result-actions{display:flex;gap:12px;width:100%;max-width:300px;}
  .btn-retry{flex:1;background:linear-gradient(135deg,#1E88E5,#0D47A1);color:#fff;}
  .btn-home-res{flex:1;background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.15);}
</style>
</head>
<body>

<section class="screen screen-intro active" id="introScreen">
  <header class="game-header">
    <button class="icon-btn" id="backBtn">←</button>
    <h1 class="game-title" style="color:#0D47A1;">방패와 검</h1>
    <button class="sound-toggle" id="soundToggleIntro">🔇</button>
  </header>
  <div class="intro-body">
    <div style="text-align:center;font-size:4rem;">⚔️</div>
    <p class="intro-title-text">방패와 검</p>
    <p class="intro-desc-text">P1은 공격을 막고<br>P2는 몬스터를 공격해요!</p>
    <ul class="intro-rules">
      <li>P1 (방패): 떨어지는 화염구가 도착하는 레인 탭</li>
      <li>P2 (검): 몬스터를 계속 탭해서 공격!</li>
      <li>HP 공유. HP 0 = 패배</li>
      <li>60초 내 몬스터 HP 100 깎으면 승리!</li>
    </ul>
  </div>
  <button class="btn btn-play" id="playBtn">⚔️ PLAY</button>
</section>

<section class="screen screen-countdown" id="countdownScreen">
  <div class="countdown-number" id="countdownNumber">3</div>
</section>

<section class="screen screen-game" id="gameScreen">
  <div class="game-hud">
    <button class="hud-close" id="closeBtn">✕</button>
    <div class="hud-hp" id="hudHp">❤️❤️❤️</div>
    <div class="hud-monster">
      <div class="hp-label">👾 몬스터 HP</div>
      <div class="hp-bar"><div class="hp-fill" id="monsterFill" style="width:100%"></div></div>
    </div>
    <span class="hud-time" id="hudTime">60</span>
    <button class="hud-sound" id="soundToggleGame">🔇</button>
  </div>

  <div class="arena">
    <div class="panel p1">
      <div class="panel-label">🛡 P1 방패</div>
      <div class="attack-area" id="attackArea"></div>
      <div class="lane-row">
        <button class="lane-btn" data-lane="0">좌</button>
        <button class="lane-btn" data-lane="1">중</button>
        <button class="lane-btn" data-lane="2">우</button>
      </div>
    </div>
    <div class="panel p2">
      <div class="panel-label">⚔️ P2 검</div>
      <div class="monster-area" id="monsterArea">
        <div class="monster" id="monster">👾</div>
      </div>
      <button class="attack-btn" id="attackBtn">⚔️ 공격!</button>
    </div>
  </div>
</section>

<section class="screen screen-result" id="resultScreen">
  <div class="result-emoji-big" id="resultEmoji">🏆</div>
  <h2 class="result-headline" id="resultHeadline">승리!</h2>
  <p class="result-sub" id="resultSub">찰떡 호흡!</p>
  <div class="result-stats">
    <div class="stat-row"><span class="stat-label">몬스터 HP</span><span class="stat-val" id="statMon">0</span></div>
    <div class="stat-row"><span class="stat-label">남은 HP</span><span class="stat-val" id="statHp">0</span></div>
    <div class="stat-row"><span class="stat-label">남은 시간</span><span class="stat-val" id="statTime">0초</span></div>
  </div>
  <div class="result-actions">
    <button class="btn btn-retry" id="retryBtn">다시하기</button>
    <button class="btn btn-home-res" id="homeBtn">홈으로</button>
  </div>
</section>

<script src="../../shared/engine.js?v=2"></script>
<script src="game.js"></script>
</body>
</html>
