<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>숫자 빙고</title>
  <link rel="stylesheet" href="../../shared/style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 화면 1: 인트로 -->
  <section class="screen screen-intro active" id="introScreen">
    <header class="game-header">
      <button class="icon-btn" id="backBtn" aria-label="뒤로가기">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M13 4L7 10L13 16" stroke="#333" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <h1 class="game-title">숫자 빙고</h1>
      <button class="icon-btn sound-toggle" id="soundToggleIntro" aria-label="사운드 토글">
        <svg id="soundIconIntro" width="22" height="22" viewBox="0 0 22 22" fill="none">
          <path d="M3 8H7L12 3V19L7 14H3V8Z" fill="#555"/>
          <path d="M15 7C16.5 8.5 16.5 13.5 15 15" stroke="#555" stroke-width="2" stroke-linecap="round"/>
          <path d="M17.5 4.5C20.5 7.5 20.5 14.5 17.5 17.5" stroke="#555" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </header>

    <div class="intro-body">
      <!-- SVG 미리보기 -->
      <div class="intro-preview" aria-hidden="true">
        <svg viewBox="0 0 180 180" width="180" height="180">
          <!-- P1 board (left) -->
          <rect x="4" y="4" width="80" height="80" rx="8" fill="#E3F2FD" stroke="#29B6F6" stroke-width="2"/>
          <text x="44" y="16" text-anchor="middle" font-size="9" font-weight="bold" fill="#29B6F6">P1</text>
          <!-- P1 cells -->
          <rect x="8" y="20" width="14" height="14" rx="3" fill="white"/>
          <text x="15" y="31" text-anchor="middle" font-size="8" fill="#333">7</text>
          <rect x="24" y="20" width="14" height="14" rx="3" fill="#29B6F6" opacity="0.8"/>
          <text x="31" y="31" text-anchor="middle" font-size="8" fill="white">3</text>
          <line x1="25" y1="21" x2="37" y2="33" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="37" y1="21" x2="25" y2="33" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          <rect x="40" y="20" width="14" height="14" rx="3" fill="white"/>
          <text x="47" y="31" text-anchor="middle" font-size="8" fill="#333">15</text>
          <rect x="56" y="20" width="14" height="14" rx="3" fill="#29B6F6" opacity="0.8"/>
          <text x="63" y="31" text-anchor="middle" font-size="8" fill="white">9</text>
          <line x1="57" y1="21" x2="69" y2="33" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="69" y1="21" x2="57" y2="33" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          <rect x="72" y="20" width="10" height="14" rx="3" fill="white"/>
          <text x="77" y="31" text-anchor="middle" font-size="8" fill="#333">1</text>
          <!-- Line glow (P1 winning line) -->
          <rect x="8" y="36" width="14" height="14" rx="3" fill="#29B6F6" opacity="0.8"/>
          <line x1="9" y1="37" x2="21" y2="49" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="21" y1="37" x2="9" y2="49" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          <rect x="24" y="36" width="14" height="14" rx="3" fill="#29B6F6" opacity="0.8"/>
          <line x1="25" y1="37" x2="37" y2="49" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="37" y1="37" x2="25" y2="49" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          <rect x="40" y="36" width="14" height="14" rx="3" fill="#29B6F6" opacity="0.8"/>
          <line x1="41" y1="37" x2="53" y2="49" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="53" y1="37" x2="41" y2="49" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          <rect x="56" y="36" width="14" height="14" rx="3" fill="#29B6F6" opacity="0.8"/>
          <line x1="57" y1="37" x2="69" y2="49" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="69" y1="37" x2="57" y2="49" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          <rect x="72" y="36" width="10" height="14" rx="3" fill="#29B6F6" opacity="0.8"/>
          <line x1="73" y1="37" x2="81" y2="49" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="81" y1="37" x2="73" y2="49" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          <!-- BINGO line highlight -->
          <rect x="7" y="35" width="76" height="16" rx="4" fill="none" stroke="#FFD700" stroke-width="2" opacity="0.9"/>

          <!-- P2 board (right) -->
          <rect x="96" y="4" width="80" height="80" rx="8" fill="#FCE4EC" stroke="#EF5350" stroke-width="2"/>
          <text x="136" y="16" text-anchor="middle" font-size="9" font-weight="bold" fill="#EF5350">P2</text>
          <rect x="100" y="20" width="14" height="14" rx="3" fill="#EF5350" opacity="0.8"/>
          <line x1="101" y1="21" x2="113" y2="33" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="113" y1="21" x2="101" y2="33" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          <rect x="116" y="20" width="14" height="14" rx="3" fill="white"/>
          <text x="123" y="31" text-anchor="middle" font-size="8" fill="#333">22</text>
          <rect x="132" y="20" width="14" height="14" rx="3" fill="#EF5350" opacity="0.8"/>
          <line x1="133" y1="21" x2="145" y2="33" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="145" y1="21" x2="133" y2="33" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          <rect x="148" y="20" width="14" height="14" rx="3" fill="white"/>
          <text x="155" y="31" text-anchor="middle" font-size="8" fill="#333">5</text>
          <rect x="164" y="20" width="10" height="14" rx="3" fill="#EF5350" opacity="0.8"/>
          <line x1="165" y1="21" x2="173" y2="33" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="173" y1="21" x2="165" y2="33" stroke="white" stroke-width="2.5" stroke-linecap="round"/>

          <!-- Labels below -->
          <text x="44" y="100" text-anchor="middle" font-size="11" font-weight="bold" fill="#29B6F6">1줄 완성!</text>
          <text x="136" y="100" text-anchor="middle" font-size="11" font-weight="bold" fill="#EF5350">0줄</text>

          <!-- Bottom: called numbers history -->
          <rect x="4" y="108" width="172" height="26" rx="6" fill="#F5F5F5"/>
          <text x="10" y="124" font-size="9" fill="#888">불린 숫자:</text>
          <rect x="60" y="112" width="18" height="18" rx="4" fill="#E91E63" opacity="0.8"/>
          <text x="69" y="124" text-anchor="middle" font-size="9" font-weight="bold" fill="white">3</text>
          <rect x="81" y="112" width="18" height="18" rx="4" fill="#E91E63" opacity="0.8"/>
          <text x="90" y="124" text-anchor="middle" font-size="9" font-weight="bold" fill="white">9</text>
          <rect x="102" y="112" width="18" height="18" rx="4" fill="#E91E63" opacity="0.8"/>
          <text x="111" y="124" text-anchor="middle" font-size="9" font-weight="bold" fill="white">17</text>
          <rect x="123" y="112" width="18" height="18" rx="4" fill="#E91E63" opacity="0.8"/>
          <text x="132" y="124" text-anchor="middle" font-size="9" font-weight="bold" fill="white">22</text>
          <rect x="144" y="112" width="18" height="18" rx="4" fill="#E91E63" opacity="0.8"/>
          <text x="153" y="124" text-anchor="middle" font-size="9" font-weight="bold" fill="white">5</text>

          <!-- Turn indicator -->
          <rect x="44" y="140" width="92" height="28" rx="14" fill="#E91E63"/>
          <text x="90" y="158" text-anchor="middle" font-size="11" font-weight="bold" fill="white">P1의 차례</text>
        </svg>
      </div>

      <p class="intro-text">번갈아 숫자를 불러 빙고를 완성하세요!</p>
      <div class="intro-rules">
        <div class="rule-item">
          <svg width="20" height="20" viewBox="0 0 20 20"><circle cx="10" cy="10" r="9" fill="#E91E63" opacity="0.15"/><text x="10" y="15" text-anchor="middle" font-size="12" font-weight="bold" fill="#E91E63">1</text></svg>
          <span>내 보드에서 숫자를 탭해 부릅니다</span>
        </div>
        <div class="rule-item">
          <svg width="20" height="20" viewBox="0 0 20 20"><circle cx="10" cy="10" r="9" fill="#E91E63" opacity="0.15"/><text x="10" y="15" text-anchor="middle" font-size="12" font-weight="bold" fill="#E91E63">2</text></svg>
          <span>불린 숫자는 양쪽 보드 모두 X 표시</span>
        </div>
        <div class="rule-item">
          <svg width="20" height="20" viewBox="0 0 20 20"><circle cx="10" cy="10" r="9" fill="#E91E63" opacity="0.15"/><text x="10" y="15" text-anchor="middle" font-size="12" font-weight="bold" fill="#E91E63">3</text></svg>
          <span>먼저 <strong>3줄</strong> 완성하면 승리!</span>
        </div>
      </div>
    </div>

    <button class="btn btn-play" id="playBtn">PLAY</button>
  </section>

  <!-- 화면 2: 게임 플레이 -->
  <section class="screen screen-game" id="gameScreen">
    <header class="game-header">
      <button class="icon-btn" id="closeBtn" aria-label="홈으로">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M13 4L7 10L13 16" stroke="#333" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="turn-indicator" id="turnIndicator">
        <span class="turn-dot" id="turnDot"></span>
        <span class="turn-text" id="turnText">P1의 차례</span>
      </div>
      <button class="icon-btn sound-toggle" id="soundToggleGame" aria-label="사운드 토글">
        <svg id="soundIconGame" width="22" height="22" viewBox="0 0 22 22" fill="none">
          <path d="M3 8H7L12 3V19L7 14H3V8Z" fill="#555"/>
          <path d="M15 7C16.5 8.5 16.5 13.5 15 15" stroke="#555" stroke-width="2" stroke-linecap="round"/>
          <path d="M17.5 4.5C20.5 7.5 20.5 14.5 17.5 17.5" stroke="#555" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </header>

    <!-- 라인 카운터 -->
    <div class="line-counters" id="lineCounters">
      <div class="line-counter p1-counter" id="p1Counter">
        <span class="lc-name">P1</span>
        <span class="lc-lines" id="p1Lines">0줄</span>
        <div class="lc-dots" id="p1Dots">
          <span class="lc-dot empty"></span>
          <span class="lc-dot empty"></span>
          <span class="lc-dot empty"></span>
        </div>
      </div>
      <div class="lc-target">목표: 3줄</div>
      <div class="line-counter p2-counter" id="p2Counter">
        <span class="lc-name">P2</span>
        <span class="lc-lines" id="p2Lines">0줄</span>
        <div class="lc-dots" id="p2Dots">
          <span class="lc-dot empty"></span>
          <span class="lc-dot empty"></span>
          <span class="lc-dot empty"></span>
        </div>
      </div>
    </div>

    <!-- 불린 숫자 히스토리 -->
    <div class="called-history" id="calledHistory">
      <span class="history-label">불린 숫자:</span>
      <div class="history-chips" id="historyChips"></div>
    </div>

    <!-- 두 보드 -->
    <div class="boards-wrapper" id="boardsWrapper">
      <div class="board-section">
        <div class="board-label p1-label">P1</div>
        <div class="board-overlay p1-overlay" id="p1Overlay"></div>
        <svg class="bingo-board" id="p1Board"></svg>
      </div>
      <div class="board-divider"></div>
      <div class="board-section">
        <div class="board-label p2-label">P2</div>
        <div class="board-overlay p2-overlay" id="p2Overlay"></div>
        <svg class="bingo-board" id="p2Board"></svg>
      </div>
    </div>
  </section>

  <!-- 화면 3: 결과 -->
  <section class="screen screen-result" id="resultScreen">
    <div class="result-body">
      <!-- Trophy SVG -->
      <div class="result-trophy" id="resultTrophy">
        <svg width="100" height="100" viewBox="0 0 100 100">
          <rect x="30" y="70" width="40" height="8" rx="3" fill="#FFA726"/>
          <rect x="22" y="78" width="56" height="10" rx="4" fill="#FFA726"/>
          <path d="M20 20H80V55C80 68 66 78 50 78C34 78 20 68 20 55Z" fill="#FFD54F"/>
          <path d="M20 30H8C8 30 6 50 20 52" fill="#FFC107" stroke="#FFA726" stroke-width="2"/>
          <path d="M80 30H92C92 30 94 50 80 52" fill="#FFC107" stroke="#FFA726" stroke-width="2"/>
          <path d="M35 48L45 58L65 38" stroke="#FFA726" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
      </div>
      <h2 class="result-winner" id="resultWinner">P1 승리!</h2>
      <p class="result-sub" id="resultSub">먼저 3줄을 완성했어요!</p>

      <!-- 미니 보드 결과 -->
      <div class="result-boards" id="resultBoards"></div>
    </div>

    <div class="result-actions">
      <button class="btn btn-retry" id="retryBtn">다시하기</button>
      <button class="btn btn-home" id="homeBtn">홈으로</button>
    </div>
  </section>

  <script src="../../shared/engine.js"></script>
  <script src="game.js"></script>

</body>
</html>
