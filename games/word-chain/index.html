<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>단어 잇기</title>
  <link rel="stylesheet" href="../../shared/style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 화면 1: 인트로 / 인원 선택 -->
  <section class="screen screen-intro active" id="introScreen">
    <header class="game-header">
      <button class="icon-btn" id="backBtn" aria-label="뒤로가기">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <h1 class="game-title">단어 잇기</h1>
      <button class="icon-btn sound-toggle" id="soundToggleIntro" aria-label="사운드 토글">
        <svg id="soundIconIntro" width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M11 5L6 9H2v6h4l5 4V5z" fill="currentColor"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </header>

    <div class="intro-body">
      <!-- Inline SVG illustration -->
      <svg class="intro-illustration" viewBox="0 0 280 140" xmlns="http://www.w3.org/2000/svg">
        <!-- Word boxes -->
        <rect x="20" y="30" width="70" height="70" rx="14" fill="#FF7043" opacity="0.15"/>
        <rect x="20" y="30" width="70" height="70" rx="14" fill="none" stroke="#FF7043" stroke-width="2.5"/>
        <text x="55" y="75" text-anchor="middle" font-family="'Noto Sans KR', sans-serif" font-size="32" font-weight="800" fill="#FF7043">사</text>

        <!-- Arrow -->
        <path d="M98 65 L118 65" stroke="#FF7043" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arr)"/>
        <defs>
          <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
            <path d="M0 0 L8 4 L0 8 Z" fill="#FF7043"/>
          </marker>
        </defs>

        <rect x="126" y="30" width="70" height="70" rx="14" fill="#FF7043" opacity="0.15"/>
        <rect x="126" y="30" width="70" height="70" rx="14" fill="none" stroke="#FF7043" stroke-width="2.5"/>
        <text x="161" y="75" text-anchor="middle" font-family="'Noto Sans KR', sans-serif" font-size="32" font-weight="800" fill="#FF7043">과</text>

        <!-- Number badge on first box -->
        <circle cx="20" cy="30" r="14" fill="#FF7043"/>
        <text x="20" y="35" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="800" fill="white">1</text>

        <!-- Number badge on second box -->
        <circle cx="126" cy="30" r="14" fill="#4CAF50"/>
        <text x="126" y="35" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="800" fill="white">2</text>

        <!-- Label -->
        <text x="140" y="125" text-anchor="middle" font-family="'Noto Sans KR', sans-serif" font-size="13" fill="#888">순서대로 글자를 터치하세요</text>
      </svg>

      <p class="intro-text">목표 단어의 글자를<br>순서대로 터치!</p>
      <p class="intro-subtext">틀리면 처음부터 · 10라운드 승부</p>

      <div class="player-select-label">인원 선택</div>
      <div class="player-select-row">
        <button class="player-btn active" data-count="2">2명</button>
        <button class="player-btn" data-count="3">3명</button>
        <button class="player-btn" data-count="4">4명</button>
      </div>
    </div>

    <button class="btn btn-primary btn-play" id="playBtn">PLAY</button>
  </section>

  <!-- 화면 2: 게임 플레이 -->
  <section class="screen screen-game" id="gameScreen">
    <!-- 상단: 목표 단어 + 라운드 정보 -->
    <div class="game-top" id="gameTop">
      <div class="round-info" id="roundInfo">Round 1 / 10</div>
      <div class="target-word-wrap" id="targetWordWrap">
        <!-- SVG word boxes rendered by JS -->
      </div>
      <div class="timer-bar-wrap">
        <div class="timer-bar" id="timerBar">
          <div class="timer-bar-fill" id="timerFill"></div>
        </div>
        <div class="timer-text" id="timerText">10</div>
      </div>
    </div>

    <!-- 플레이어 존 그리드 -->
    <div class="zones-wrap" id="zonesWrap"></div>

    <!-- 라운드 결과 오버레이 -->
    <div class="round-overlay hidden" id="roundOverlay">
      <div class="round-result-box" id="roundResultBox"></div>
    </div>

    <!-- 홈 버튼 -->
    <button class="icon-btn close-btn" id="closeBtn" aria-label="홈으로">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <path d="M15 5L5 15M5 5l10 10" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
    </button>
  </section>

  <!-- 화면 3: 결과 -->
  <section class="screen screen-result" id="resultScreen">
    <header class="result-header">
      <h2 class="result-title" id="resultTitle">게임 종료!</h2>
      <div class="result-winner" id="resultWinner"></div>
    </header>

    <div class="result-scores" id="resultScores"></div>

    <div class="result-table-wrap">
      <table class="result-table" id="resultTable">
        <thead id="resultTableHead"></thead>
        <tbody id="resultTableBody"></tbody>
      </table>
    </div>

    <div class="result-actions">
      <button class="btn btn-primary" id="retryBtn">다시하기</button>
      <button class="btn btn-secondary" id="homeBtn">홈으로</button>
    </div>
  </section>

  <script src="../../shared/engine.js"></script>
  <script src="game.js"></script>
</body>
</html>
