<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>농구 슛</title>
  <link rel="stylesheet" href="../../shared/style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 화면 1: 인트로 (플레이어 수 선택) -->
  <section class="screen screen-intro active" id="introScreen">
    <header class="game-header">
      <button class="icon-btn" id="backBtn" aria-label="뒤로가기">←</button>
      <h1 class="game-title">🏀 농구 슛</h1>
      <button class="sound-toggle" id="soundToggleIntro" aria-label="사운드 토글">🔇</button>
    </header>

    <div class="intro-body">
      <div class="court-preview" aria-hidden="true">
        <svg viewBox="0 0 200 220" width="160" height="176">
          <!-- 백보드 -->
          <rect x="75" y="10" width="50" height="34" rx="3" fill="#ECEFF1" stroke="#90A4AE" stroke-width="2"/>
          <rect x="82" y="16" width="36" height="22" rx="1" fill="none" stroke="#EF9A9A" stroke-width="1.5"/>
          <!-- 림 지지대 -->
          <rect x="98" y="44" width="4" height="10" fill="#78909C"/>
          <!-- 림 (3D 효과) -->
          <ellipse cx="100" cy="58" rx="22" ry="6" fill="none" stroke="#FF5722" stroke-width="3.5"/>
          <ellipse cx="100" cy="60" rx="22" ry="6" fill="none" stroke="#BF360C" stroke-width="1" opacity="0.4"/>
          <!-- 네트 -->
          <path d="M78 58 L83 90 M100 64 L100 94 M122 58 L117 90 M84 73 Q100 78 116 73 M85 83 Q100 88 115 83"
                stroke="#ECEFF1" stroke-width="1.5" fill="none" opacity="0.9"/>
          <!-- 코트 바닥선 -->
          <rect x="10" y="180" width="180" height="3" rx="1.5" fill="#CE9A5A" opacity="0.6"/>
          <!-- 공 -->
          <circle cx="100" cy="155" r="24" fill="#FF8A65"/>
          <circle cx="100" cy="155" r="24" fill="none" stroke="#E64A19" stroke-width="1.5" opacity="0.4"/>
          <!-- 공 라인 -->
          <path d="M76 155 Q100 135 124 155" fill="none" stroke="#BF360C" stroke-width="1.5"/>
          <path d="M76 155 Q100 175 124 155" fill="none" stroke="#BF360C" stroke-width="1.5"/>
          <line x1="100" y1="131" x2="100" y2="179" stroke="#BF360C" stroke-width="1.5"/>
          <!-- 손가락/스와이프 힌트 -->
          <path d="M100 155 L100 105" stroke="white" stroke-width="2" stroke-dasharray="4 4" opacity="0.6"
                marker-end="url(#arrow)"/>
          <defs>
            <marker id="arrow" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
              <path d="M0,0 L0,6 L6,3 z" fill="white" opacity="0.6"/>
            </marker>
          </defs>
        </svg>
      </div>

      <p class="intro-text">공을 위로 스와이프해서 골을 넣으세요!</p>
      <p class="intro-subtext">각 플레이어가 5번씩 슛을 합니다</p>

      <div class="player-select">
        <p class="player-select-label">플레이어 수</p>
        <div class="player-count-btns" id="playerCountBtns">
          <button class="player-count-btn active" data-count="2">2명</button>
          <button class="player-count-btn" data-count="3">3명</button>
          <button class="player-count-btn" data-count="4">4명</button>
        </div>
      </div>
    </div>

    <button class="btn btn-primary btn-play" id="playBtn">PLAY</button>
  </section>

  <!-- 화면 2: 게임 플레이 -->
  <section class="screen screen-game" id="gameScreen">
    <!-- HUD 상단 -->
    <header class="game-hud" id="gameHud">
      <div class="hud-player" id="hudPlayer">P1</div>
      <div class="hud-center">
        <div class="hud-shots" id="hudShots">●●●●●</div>
        <div class="hud-label-small">남은 슛</div>
      </div>
      <div class="hud-score-box">
        <div class="hud-score-value" id="hudScore">0</div>
        <div class="hud-label-small">점수</div>
      </div>
      <button class="icon-btn close-game-btn" id="closeGameBtn" aria-label="홈">✕</button>
    </header>

    <!-- 농구 코트 캔버스 영역 -->
    <div class="court-area" id="courtArea">
      <!-- SVG 코트 배경 (백보드, 림) -->
      <svg class="court-svg" id="courtSvg" viewBox="0 0 360 600" preserveAspectRatio="xMidYMid meet">
        <!-- 코트 바닥 패턴 -->
        <rect width="360" height="600" fill="#D4874A"/>
        <!-- 코트 라인들 -->
        <rect x="20" y="20" width="320" height="560" rx="8" fill="none" stroke="#BF7A3C" stroke-width="2" opacity="0.6"/>
        <!-- 3점 라인 아크 -->
        <path d="M30 400 Q180 220 330 400" fill="none" stroke="#BF7A3C" stroke-width="2" opacity="0.5"/>
        <!-- 페인트 영역 -->
        <rect x="120" y="320" width="120" height="120" fill="none" stroke="#BF7A3C" stroke-width="2" opacity="0.4"/>
        <!-- 자유투 라인 -->
        <line x1="120" y1="320" x2="240" y2="320" stroke="#BF7A3C" stroke-width="2" opacity="0.4"/>
        <!-- 자유투 아크 -->
        <path d="M120 320 Q180 270 240 320" fill="none" stroke="#BF7A3C" stroke-width="2" opacity="0.4"/>
        <!-- 센터 서클 -->
        <circle cx="180" cy="560" r="40" fill="none" stroke="#BF7A3C" stroke-width="2" opacity="0.3"/>

        <!-- 백보드 -->
        <rect x="130" y="40" width="100" height="60" rx="4" fill="#ECEFF1" stroke="#90A4AE" stroke-width="3"/>
        <!-- 백보드 내부 사각형 (슈팅 가이드) -->
        <rect x="150" y="52" width="60" height="36" rx="2" fill="none" stroke="#EF9A9A" stroke-width="2"/>

        <!-- 림 지지대 -->
        <rect x="176" y="100" width="8" height="16" fill="#78909C"/>

        <!-- 림 후면 (그림자 효과) -->
        <ellipse id="rimBack" cx="180" cy="122" rx="38" ry="10" fill="none" stroke="#BF360C" stroke-width="3" opacity="0.35"/>

        <!-- 네트 -->
        <g id="netGroup" opacity="0.85">
          <line x1="142" y1="118" x2="150" y2="162" stroke="white" stroke-width="1.5"/>
          <line x1="156" y1="118" x2="158" y2="166" stroke="white" stroke-width="1.5"/>
          <line x1="170" y1="118" x2="170" y2="168" stroke="white" stroke-width="1.5"/>
          <line x1="180" y1="118" x2="180" y2="170" stroke="white" stroke-width="1.5"/>
          <line x1="190" y1="118" x2="190" y2="168" stroke="white" stroke-width="1.5"/>
          <line x1="204" y1="118" x2="202" y2="166" stroke="white" stroke-width="1.5"/>
          <line x1="218" y1="118" x2="210" y2="162" stroke="white" stroke-width="1.5"/>
          <!-- 수평 네트 라인 -->
          <path d="M145 130 Q180 134 215 130" fill="none" stroke="white" stroke-width="1.5"/>
          <path d="M148 142 Q180 147 212 142" fill="none" stroke="white" stroke-width="1.5"/>
          <path d="M151 154 Q180 159 209 154" fill="none" stroke="white" stroke-width="1.5"/>
          <path d="M153 165 Q180 169 207 165" fill="none" stroke="white" stroke-width="1.5"/>
        </g>

        <!-- 림 전면 (공이 통과하는 기준) -->
        <ellipse id="rimFront" cx="180" cy="118" rx="38" ry="10" fill="none" stroke="#FF5722" stroke-width="4"/>

        <!-- 공 (JS로 위치 제어) -->
        <g id="ballGroup">
          <circle id="ballCircle" cx="180" cy="520" r="26" fill="#FF8A65"/>
          <!-- 공 세로 줄 -->
          <path id="ballLineV" d="M180 494 Q174 520 180 546" fill="none" stroke="#BF360C" stroke-width="2"/>
          <!-- 공 가로 줄 -->
          <path id="ballLineH1" d="M154 520 Q180 514 206 520" fill="none" stroke="#BF360C" stroke-width="2"/>
          <path id="ballLineH2" d="M154 520 Q180 526 206 520" fill="none" stroke="#BF360C" stroke-width="2"/>
          <!-- 공 외각선 -->
          <circle id="ballOutline" cx="180" cy="520" r="26" fill="none" stroke="#E64A19" stroke-width="1.5" opacity="0.5"/>
        </g>

        <!-- 슛 경로 가이드 (드래그 중에만 표시) -->
        <path id="trajectoryGuide" d="" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="2"
              stroke-dasharray="6 5" display="none"/>

        <!-- 드래그 방향 화살표 -->
        <line id="dragArrow" x1="0" y1="0" x2="0" y2="0" stroke="rgba(255,255,255,0.5)"
              stroke-width="3" stroke-linecap="round" display="none"/>
      </svg>

      <!-- 점수 팝업 (CSS 애니메이션) -->
      <div class="score-popup" id="scorePopup"></div>

      <!-- 슈팅 결과 메시지 -->
      <div class="shot-result" id="shotResult"></div>

      <!-- 플레이어 교체 오버레이 -->
      <div class="player-handoff" id="playerHandoff">
        <div class="handoff-content">
          <div class="handoff-player" id="handoffPlayer">P2 차례!</div>
          <div class="handoff-scores" id="handoffScores"></div>
          <button class="btn btn-primary handoff-btn" id="handoffBtn">준비!</button>
        </div>
      </div>
    </div>

    <!-- 점수판 (하단) -->
    <div class="scoreboard-bar" id="scoreboardBar"></div>
  </section>

  <!-- 화면 3: 결과 -->
  <section class="screen screen-result" id="resultScreen">
    <div class="result-header">
      <div class="result-trophy" id="resultTrophy">🏆</div>
      <h2 class="result-title" id="resultTitle">게임 끝!</h2>
      <p class="result-winner" id="resultWinner"></p>
    </div>

    <div class="result-scores" id="resultScores"></div>

    <div class="result-actions">
      <button class="btn btn-primary" id="retryBtn">다시하기</button>
      <button class="btn btn-secondary" id="homeBtn">홈으로</button>
    </div>
  </section>

  <script src="../../shared/engine.js"></script>
  <script src="game.js"></script>
</body>
</html>
