<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>지휘관과 탐험가</title>
<link rel="stylesheet" href="../../shared/style.css?v=2">
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="screen screen-intro active" id="introScreen">
  <header class="game-header">
    <button class="icon-btn" id="backBtn" aria-label="뒤로가기">←</button>
    <h1 class="game-title">지휘관과 탐험가</h1>
    <button class="sound-toggle" id="soundToggleIntro" aria-label="사운드 토글">🔇</button>
  </header>
  <div class="intro-body">
    <div class="intro-demo" aria-hidden="true">
      <!-- Left: full map (P1) -->
      <svg viewBox="0 0 72 72" width="74" height="74">
        <rect x="4" y="4" width="64" height="64" rx="6" fill="#E8F5E9" stroke="#43A047" stroke-width="2"/>
        <g fill="#81C784">
          <rect x="8" y="8" width="10" height="10" rx="1"/>
          <rect x="20" y="8" width="10" height="10" rx="1"/>
          <rect x="44" y="8" width="10" height="10" rx="1"/>
          <rect x="8" y="20" width="10" height="10" rx="1"/>
          <rect x="32" y="20" width="10" height="10" rx="1"/>
          <rect x="56" y="20" width="10" height="10" rx="1"/>
          <rect x="20" y="32" width="10" height="10" rx="1"/>
          <rect x="44" y="32" width="10" height="10" rx="1"/>
          <rect x="8" y="44" width="10" height="10" rx="1"/>
          <rect x="32" y="44" width="10" height="10" rx="1"/>
          <rect x="56" y="44" width="10" height="10" rx="1"/>
          <rect x="20" y="56" width="10" height="10" rx="1"/>
          <rect x="44" y="56" width="10" height="10" rx="1"/>
        </g>
        <rect x="32" y="8" width="10" height="10" rx="1" fill="#EF5350"/>
        <rect x="56" y="56" width="10" height="10" rx="1" fill="#FFD54F"/>
        <rect x="8" y="32" width="10" height="10" rx="2" fill="#64B5F6"/>
        <text x="13" y="41" font-size="8" text-anchor="middle" fill="#fff" font-weight="900">🧭</text>
      </svg>
      <!-- Arrow + speech -->
      <svg viewBox="0 0 50 40" width="40" height="32">
        <text x="25" y="13" text-anchor="middle" font-size="10" fill="#43A047">🗣</text>
        <path d="M6 22 L38 22 M32 16 L38 22 L32 28" stroke="#43A047" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <!-- Right: fog-of-war (P2) -->
      <svg viewBox="0 0 72 72" width="74" height="74">
        <rect x="4" y="4" width="64" height="64" rx="6" fill="#1A1A1A" stroke="#455A64" stroke-width="2"/>
        <g fill="#CFD8DC">
          <rect x="20" y="20" width="10" height="10" rx="1"/>
          <rect x="32" y="20" width="10" height="10" rx="1"/>
          <rect x="20" y="32" width="10" height="10" rx="1"/>
          <rect x="32" y="32" width="10" height="10" rx="1" opacity="0.6"/>
          <rect x="20" y="44" width="10" height="10" rx="1"/>
          <rect x="32" y="44" width="10" height="10" rx="1"/>
        </g>
        <rect x="20" y="32" width="10" height="10" rx="2" fill="#64B5F6"/>
        <text x="25" y="41" font-size="8" text-anchor="middle" fill="#fff" font-weight="900">🧭</text>
      </svg>
    </div>
    <p class="intro-text">지도를 보고 길을 알려주세요!</p>
    <div class="badge-2p">👥 2인 전용</div>
    <p class="intro-subtext">P1은 전체 지도가 보여요<br>P2는 주변만 보여요</p>
    <ul class="intro-rules">
      <li>P1: 지도를 보고 길을 <b>말로</b> 안내</li>
      <li>P2: 방향키 버튼으로 이동</li>
      <li>🪤 함정 밟으면 HP 감소 (3개)</li>
      <li>⭐ 보물 3개 수집 + 🏁 도착!</li>
    </ul>
  </div>
  <button class="btn btn-play" id="playBtn">🗺️ PLAY</button>
</section>

<section class="screen screen-countdown" id="countdownScreen">
  <div class="countdown-number" id="countdownNumber">3</div>
</section>

<section class="screen screen-game" id="gameScreen">
  <div class="game-hud">
    <button class="hud-close" id="closeBtn" aria-label="홈으로">✕</button>
    <span class="hud-label" id="hudHp">❤️❤️❤️</span>
    <span class="hud-time" id="hudTime">⭐ 0/3</span>
    <span class="hud-score" id="hudScore">90</span>
    <button class="hud-sound" id="soundToggleGame" aria-label="사운드 토글">🔇</button>
  </div>
  <div class="banner" id="banner"></div>
  <div class="boards">
    <div class="board p1">
      <div class="board-label">👁 P1 지도 (전체)</div>
      <div class="maze" id="mazeP1"></div>
      <div class="legend">
        <span><i style="background:#64B5F6"></i>탐험가</span>
        <span><i style="background:#424242"></i>벽</span>
        <span><i style="background:#FFCDD2"></i>함정</span>
        <span><i style="background:#FFF9C4"></i>보물</span>
      </div>
    </div>
    <div class="board p2">
      <div class="board-label" style="color:#B0BEC5;">🔦 P2 시야 (주변만)</div>
      <div class="maze" id="mazeP2"></div>
      <div class="controls">
        <button class="dir-btn dir-up" id="dirUp" aria-label="위">⬆</button>
        <button class="dir-btn dir-left" id="dirLeft" aria-label="왼쪽">⬅</button>
        <button class="dir-btn dir-right" id="dirRight" aria-label="오른쪽">➡</button>
        <button class="dir-btn dir-down" id="dirDown" aria-label="아래">⬇</button>
      </div>
    </div>
  </div>
</section>

<section class="screen screen-result" id="resultScreen">
  <div class="result-emoji-big" id="resultEmoji">🏆</div>
  <h2 class="result-headline" id="resultHeadline">성공!</h2>
  <p class="result-sub" id="resultSub">훌륭한 팀워크!</p>
  <div class="result-stats">
    <div class="stat-row"><span class="stat-label">보물</span><span class="stat-val" id="statTreasure">0/3</span></div>
    <div class="stat-row"><span class="stat-label">남은 HP</span><span class="stat-val" id="statHp">0</span></div>
    <div class="stat-row"><span class="stat-label">이동 횟수</span><span class="stat-val" id="statMoves">0</span></div>
  </div>
  <div class="result-actions">
    <button class="btn btn-retry" id="retryBtn">다시하기</button>
    <button class="btn btn-home-res" id="homeBtn">홈으로</button>
  </div>
</section>

<script src="../../shared/engine.js?v=2"></script>
<script src="game.js"></script>
</body>
</html>
