<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>같은 그림 찾기</title>
  <link rel="stylesheet" href="../../shared/style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 화면 1: 인트로 -->
  <section class="screen screen-intro active" id="introScreen">
    <header class="game-header">
      <button class="icon-btn" id="backBtn" aria-label="뒤로가기">←</button>
      <h1 class="game-title">같은 그림 찾기</h1>
      <button class="sound-toggle" id="soundToggleIntro" aria-label="사운드 토글">🔇</button>
    </header>

    <div class="intro-body">
      <div class="intro-preview" aria-hidden="true">
        <div class="preview-grid">
          <div class="preview-cell">🍎</div>
          <div class="preview-cell">🎸</div>
          <div class="preview-cell highlight">🌟</div>
          <div class="preview-cell">🍕</div>
          <div class="preview-cell">🚀</div>
          <div class="preview-cell highlight">🌟</div>
          <div class="preview-cell">🎯</div>
          <div class="preview-cell">🍉</div>
          <div class="preview-cell">🏆</div>
        </div>
      </div>

      <p class="intro-text">25개 중 같은 그림 2개를 가장 먼저 찾으세요!</p>
      <p class="intro-subtext">찾았다! 버튼을 먼저 누른 뒤 그림 2개를 선택하세요.<br>맞으면 +1점, 틀리면 -1점! 10라운드 승부</p>

      <div class="player-select-area">
        <p class="player-select-label">플레이어 수 선택</p>
        <div class="player-btns">
          <button class="player-btn active" data-count="2">2명</button>
          <button class="player-btn" data-count="3">3명</button>
          <button class="player-btn" data-count="4">4명</button>
        </div>
      </div>

      <div class="difficulty-select-area">
        <p class="player-select-label">난이도 선택</p>
        <div class="difficulty-btns">
          <button class="difficulty-btn" data-seconds="12">쉬움<br><span class="diff-time">12초</span></button>
          <button class="difficulty-btn active" data-seconds="10">보통<br><span class="diff-time">10초</span></button>
          <button class="difficulty-btn" data-seconds="8">어려움<br><span class="diff-time">8초</span></button>
        </div>
      </div>
    </div>

    <button class="btn btn-primary btn-play" id="playBtn">PLAY</button>
  </section>

  <!-- 화면 2: 게임 플레이 -->
  <section class="screen screen-game" id="gameScreen">

    <!-- 상단: 라운드/타이머 바 -->
    <div class="game-top-bar">
      <button class="icon-btn" id="closeBtn" aria-label="홈으로">←</button>
      <div class="round-badge">라운드 <span id="roundDisplay">1</span>/10</div>
      <button class="sound-toggle" id="soundToggleGame" aria-label="사운드 토글">🔇</button>
    </div>

    <!-- 타이머 바 -->
    <div class="round-timer-wrap">
      <div class="round-timer-bar-track">
        <div class="round-timer-bar-fill" id="timerBarFill"></div>
      </div>
      <div class="round-timer-number" id="timerNumber">10</div>
    </div>

    <!-- 중앙: 이모지 그리드 -->
    <div class="board-wrapper">
      <!-- 상태 오버레이 (버저 후 표시) -->
      <div class="grid-overlay" id="gridOverlay"></div>
      <div class="emoji-grid" id="emojiGrid"></div>
    </div>

    <!-- 피드백 메시지 -->
    <div class="feedback-msg" id="feedbackMsg"></div>

    <!-- 하단: 플레이어 버저 존 (JS 생성) -->
    <div class="buzzer-zones" id="buzzerZones"></div>

  </section>

  <!-- 화면 3: 결과 -->
  <section class="screen screen-result" id="resultScreen">
    <div class="result-body">
      <div class="result-emoji" id="resultEmoji">🎉</div>
      <h2 class="result-title" id="resultTitle">플레이어 1 승리!</h2>
      <div class="result-scores" id="resultScores"></div>
    </div>
    <div class="result-actions">
      <button class="btn btn-primary" id="retryBtn">다시하기</button>
      <button class="btn btn-secondary" id="homeBtn">홈으로</button>
    </div>
  </section>

  <script src="../../shared/engine.js"></script>
  <script src="game.js"></script>

</body>
</html>
