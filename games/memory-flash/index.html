<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>순간 기억</title>
  <link rel="stylesheet" href="../../shared/style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 화면 1: 인트로 -->
  <section class="screen screen-intro active" id="introScreen">
    <header class="game-header">
      <button class="icon-btn" id="backBtn" aria-label="뒤로가기">←</button>
      <h1 class="game-title">순간 기억</h1>
      <button class="sound-toggle" id="soundToggleIntro" aria-label="사운드 토글">🔇</button>
    </header>

    <div class="intro-body">
      <!-- SVG preview grid -->
      <div class="intro-preview" aria-hidden="true">
        <svg viewBox="0 0 200 200" width="160" height="160" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <filter id="previewGlow">
              <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
              <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>
          <!-- 3x3 preview grid: some lit yellow, some dark -->
          <!-- Row 1 -->
          <rect x="10"  y="10"  width="52" height="52" rx="10" fill="#FFD54F" filter="url(#previewGlow)" stroke="#F9A825" stroke-width="2"/>
          <rect x="74"  y="10"  width="52" height="52" rx="10" fill="#37474F" stroke="#263238" stroke-width="2"/>
          <rect x="138" y="10"  width="52" height="52" rx="10" fill="#FFD54F" filter="url(#previewGlow)" stroke="#F9A825" stroke-width="2"/>
          <!-- Row 2 -->
          <rect x="10"  y="74"  width="52" height="52" rx="10" fill="#37474F" stroke="#263238" stroke-width="2"/>
          <rect x="74"  y="74"  width="52" height="52" rx="10" fill="#37474F" stroke="#263238" stroke-width="2"/>
          <rect x="138" y="74"  width="52" height="52" rx="10" fill="#37474F" stroke="#263238" stroke-width="2"/>
          <!-- Row 3 -->
          <rect x="10"  y="138" width="52" height="52" rx="10" fill="#37474F" stroke="#263238" stroke-width="2"/>
          <rect x="74"  y="138" width="52" height="52" rx="10" fill="#FFD54F" filter="url(#previewGlow)" stroke="#F9A825" stroke-width="2"/>
          <rect x="138" y="138" width="52" height="52" rx="10" fill="#37474F" stroke="#263238" stroke-width="2"/>
        </svg>
      </div>

      <p class="intro-text">반짝인 칸을 기억하고 터치!</p>
      <p class="intro-subtext">
        노란 칸이 반짝인 후 어둠 속에서<br>
        기억한 칸을 터치하세요.<br>
        10라운드, 더 많이 맞힌 플레이어가 이겨요!
      </p>

      <div class="player-select-area">
        <p class="player-select-label">플레이어 수 선택</p>
        <div class="player-btns">
          <button class="player-btn active" data-count="2">2명</button>
          <button class="player-btn" data-count="3">3명</button>
          <button class="player-btn" data-count="4">4명</button>
        </div>
      </div>
    </div>

    <button class="btn btn-primary btn-play" id="playBtn">PLAY</button>
  </section>

  <!-- 화면 2: 게임 플레이 -->
  <section class="screen screen-game" id="gameScreen">
    <header class="game-header game-header-compact">
      <button class="icon-btn" id="closeBtn" aria-label="홈으로">←</button>
      <div class="round-indicator" id="roundIndicator">라운드 1 / 10</div>
      <button class="sound-toggle" id="soundToggleGame" aria-label="사운드 토글">🔇</button>
    </header>

    <!-- 상태 메시지 + 타이머 -->
    <div class="status-bar">
      <div class="status-message" id="statusMessage">준비하세요!</div>
      <div class="status-timer" id="statusTimer"></div>
    </div>

    <!-- 점수판 -->
    <div class="scoreboard" id="scoreboard"></div>

    <!-- 플레이어 존 컨테이너 -->
    <div class="zones-container" id="zonesContainer"></div>
  </section>

  <!-- 화면 3: 결과 -->
  <section class="screen screen-result" id="resultScreen">
    <div class="result-body">
      <div class="result-trophy" id="resultTrophy" aria-hidden="true">
        <svg viewBox="0 0 120 120" width="100" height="100" xmlns="http://www.w3.org/2000/svg">
          <polygon points="60,10 75,45 112,45 82,68 93,103 60,82 27,103 38,68 8,45 45,45"
                   fill="#FFD54F" stroke="#F9A825" stroke-width="2"/>
        </svg>
      </div>
      <h2 class="result-title" id="resultTitle">플레이어 1 승리!</h2>
      <div class="result-scores" id="resultScores"></div>
    </div>
    <div class="result-actions">
      <button class="btn btn-primary" id="retryBtn">다시하기</button>
      <button class="btn btn-secondary" id="homeBtn">홈으로</button>
    </div>
  </section>

  <script src="../../shared/engine.js"></script>
  <script src="game.js"></script>

</body>
</html>
