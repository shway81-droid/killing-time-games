<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>빠른 분류</title>
  <link rel="stylesheet" href="../../shared/style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 화면 1: 인트로 / 인원 선택 -->
  <section class="screen screen-intro active" id="introScreen">
    <header class="game-header">
      <button class="icon-btn" id="backBtn" aria-label="뒤로가기">←</button>
      <h1 class="game-title">빠른 분류</h1>
      <button class="sound-toggle" id="soundToggleIntro" aria-label="사운드 토글">🔇</button>
    </header>
    <div class="intro-body">
      <div class="intro-demo">
        <svg viewBox="0 0 200 80" width="200" height="80" aria-hidden="true">
          <!-- Demo category banner -->
          <rect x="0" y="0" width="200" height="80" rx="14" fill="#E8F5E9"/>
          <rect x="10" y="14" width="180" height="36" rx="10" fill="#4CAF50"/>
          <text x="100" y="38" text-anchor="middle" font-size="18" font-weight="900"
            font-family="'Pretendard Variable', -apple-system, 'Noto Sans KR', sans-serif"
            fill="#fff">과일만 터치!</text>
          <!-- small apple icon -->
          <circle cx="55" cy="62" r="10" fill="#E53935"/>
          <line x1="55" y1="52" x2="55" y2="47" stroke="#388E3C" stroke-width="2"/>
          <!-- small bus icon -->
          <rect x="90" y="52" width="20" height="14" rx="3" fill="#1565C0"/>
          <circle cx="95" cy="66" r="3" fill="#333"/>
          <circle cx="105" cy="66" r="3" fill="#333"/>
          <!-- small cat icon -->
          <circle cx="150" cy="60" r="10" fill="#FF8F00"/>
          <polygon points="143,52 147,44 151,52" fill="#FF8F00"/>
          <polygon points="149,52 153,44 157,52" fill="#FF8F00"/>
        </svg>
        <p class="intro-hint">카테고리에 맞는 그림만 골라 터치!</p>
      </div>
      <p class="intro-text">화면 위 카테고리에 맞는 아이템을 <strong>빠르게</strong> 터치하세요</p>
      <p class="intro-subtext">정답 +1점 · 오답 -1점 · 30초 · 최고점 우승</p>

      <div class="player-select-label">인원 선택</div>
      <div class="player-select-row">
        <button class="player-btn active" data-count="2">2명</button>
        <button class="player-btn" data-count="3">3명</button>
        <button class="player-btn" data-count="4">4명</button>
      </div>
    </div>
    <button class="btn btn-primary btn-play" id="playBtn">PLAY</button>
  </section>

  <!-- 화면 2: 게임 플레이 -->
  <section class="screen screen-game" id="gameScreen">
    <!-- 카테고리 배너 (상단 중앙) -->
    <div class="category-banner" id="categoryBanner">
      <span class="category-text" id="categoryText">준비!</span>
    </div>

    <!-- 타이머 바 -->
    <div class="timer-bar-wrap">
      <div class="timer-bar-fill" id="timerBarFill"></div>
    </div>

    <!-- 플레이어 구역 (JS로 동적 렌더링) -->
    <div class="zones-wrap" id="zonesWrap"></div>

    <!-- 홈 버튼 -->
    <button class="icon-btn close-btn" id="closeBtn" aria-label="홈으로">✕</button>
  </section>

  <!-- 화면 3: 결과 -->
  <section class="screen screen-result" id="resultScreen">
    <header class="result-header">
      <h2 class="result-title" id="resultTitle">게임 종료!</h2>
    </header>
    <div class="result-winner" id="resultWinner"></div>

    <div class="result-scores" id="resultScores"></div>

    <div class="result-actions">
      <button class="btn btn-primary" id="retryBtn">다시하기</button>
      <button class="btn btn-secondary" id="homeBtn">홈으로</button>
    </div>
  </section>

  <script src="../../shared/engine.js"></script>
  <script src="game.js"></script>
</body>
</html>
