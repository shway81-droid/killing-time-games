<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>배틀쉽</title>
  <link rel="stylesheet" href="../../shared/style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 화면 1: 인트로 -->
  <section class="screen screen-intro active" id="introScreen">
    <header class="game-header">
      <button class="icon-btn" id="backBtn" aria-label="뒤로가기">←</button>
      <h1 class="game-title">배틀쉽 🚢</h1>
      <button class="sound-toggle" id="soundToggleIntro" aria-label="사운드 토글">🔇</button>
    </header>

    <div class="intro-body">
      <div class="intro-preview" aria-hidden="true">
        <svg viewBox="0 0 180 140" width="180" height="140">
          <!-- Ocean background -->
          <rect x="0" y="0" width="180" height="140" rx="12" fill="#1565C0"/>
          <!-- Grid lines -->
          <g stroke="rgba(255,255,255,0.2)" stroke-width="0.8">
            <line x1="20" y1="10" x2="20" y2="130"/>
            <line x1="40" y1="10" x2="40" y2="130"/>
            <line x1="60" y1="10" x2="60" y2="130"/>
            <line x1="80" y1="10" x2="80" y2="130"/>
            <line x1="100" y1="10" x2="100" y2="130"/>
            <line x1="120" y1="10" x2="120" y2="130"/>
            <line x1="140" y1="10" x2="140" y2="130"/>
            <line x1="160" y1="10" x2="160" y2="130"/>
            <line x1="10" y1="20" x2="170" y2="20"/>
            <line x1="10" y1="40" x2="170" y2="40"/>
            <line x1="10" y1="60" x2="170" y2="60"/>
            <line x1="10" y1="80" x2="170" y2="80"/>
            <line x1="10" y1="100" x2="170" y2="100"/>
            <line x1="10" y1="120" x2="170" y2="120"/>
          </g>
          <!-- Ship (3-cell horizontal) -->
          <rect x="22" y="22" width="56" height="16" rx="4" fill="#455A64"/>
          <!-- Ship (2-cell horizontal) -->
          <rect x="82" y="62" width="36" height="16" rx="4" fill="#455A64"/>
          <!-- Hit marker (red X) -->
          <circle cx="110" cy="70" r="6" fill="#EF5350"/>
          <line x1="107" y1="67" x2="113" y2="73" stroke="white" stroke-width="2" stroke-linecap="round"/>
          <line x1="113" y1="67" x2="107" y2="73" stroke="white" stroke-width="2" stroke-linecap="round"/>
          <!-- Miss marker (white dot) -->
          <circle cx="50" cy="90" r="4" fill="white" opacity="0.7"/>
          <circle cx="130" cy="50" r="4" fill="white" opacity="0.7"/>
          <circle cx="30" cy="110" r="4" fill="white" opacity="0.7"/>
          <!-- Sunk ship darker -->
          <rect x="122" y="102" width="36" height="16" rx="4" fill="#B71C1C" opacity="0.85"/>
          <circle cx="130" cy="110" r="5" fill="#EF5350"/>
          <line x1="127" y1="107" x2="133" y2="113" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="133" y1="107" x2="127" y2="113" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="150" cy="110" r="5" fill="#EF5350"/>
          <line x1="147" y1="107" x2="153" y2="113" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="153" y1="107" x2="147" y2="113" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>

      <p class="intro-text">상대 함선을 모두 격침시키세요!</p>

      <div class="intro-rules">
        <div class="rule-row">
          <span class="rule-icon ship-icon"></span>
          <span>함선 3척 배치 후 공격</span>
        </div>
        <div class="rule-row">
          <span class="rule-icon hit-icon">✕</span>
          <span>명중 = 빨간 마커</span>
        </div>
        <div class="rule-row">
          <span class="rule-icon miss-icon"></span>
          <span>빗나감 = 흰 점</span>
        </div>
        <div class="rule-row">
          <span class="rule-icon">🏆</span>
          <span>상대 함선 3척 격침 시 승리</span>
        </div>
      </div>
    </div>

    <button class="btn btn-primary btn-play" id="playBtn">PLAY</button>
  </section>

  <!-- 화면 2: 함선 배치 (공통 — JS가 플레이어 번호 표시) -->
  <section class="screen screen-setup" id="setupScreen">
    <header class="game-header">
      <button class="icon-btn" id="setupBackBtn" aria-label="뒤로가기">←</button>
      <h2 class="game-title" id="setupTitle">플레이어 1 배치</h2>
      <button class="sound-toggle" id="soundToggleSetup" aria-label="사운드 토글">🔇</button>
    </header>

    <div class="setup-body">
      <div class="ship-info" id="shipInfo">
        <span id="shipLabel">배치할 함선:</span>
        <span class="ship-preview" id="shipPreview"></span>
        <span id="shipSizeLabel"></span>
      </div>

      <div class="grid-wrapper">
        <!-- 열 레이블 A-H -->
        <div class="col-labels" id="setupColLabels"></div>
        <div class="grid-row-wrap">
          <!-- 행 레이블 1-8 -->
          <div class="row-labels" id="setupRowLabels"></div>
          <!-- 배치 그리드 -->
          <div class="sea-grid setup-grid" id="setupGrid"></div>
        </div>
      </div>

      <div class="setup-actions">
        <button class="btn btn-rotate" id="rotateBtn">🔄 회전</button>
        <button class="btn btn-confirm" id="confirmBtn" disabled>확인 ✓</button>
      </div>
    </div>
  </section>

  <!-- 화면 3: 화면 넘기기 (핸드오프) -->
  <section class="screen screen-handoff" id="handoffScreen">
    <div class="handoff-body">
      <div class="handoff-icon">🙈</div>
      <h2 class="handoff-title" id="handoffTitle">화면을 상대에게 넘기세요</h2>
      <p class="handoff-sub" id="handoffSub">준비되면 탭하세요</p>
      <button class="btn btn-primary btn-handoff" id="handoffBtn">계속하기 →</button>
    </div>
  </section>

  <!-- 화면 4: 게임 플레이 -->
  <section class="screen screen-game" id="gameScreen">
    <header class="game-header">
      <button class="icon-btn" id="gameBackBtn" aria-label="홈으로">←</button>
      <div class="turn-badge" id="turnBadge">
        <span id="turnText">플레이어 1의 공격</span>
      </div>
      <button class="sound-toggle" id="soundToggleGame" aria-label="사운드 토글">🔇</button>
    </header>

    <div class="game-body">
      <!-- 상단: 공격할 적 바다 -->
      <div class="grid-section">
        <div class="grid-label enemy-label">🎯 적 바다 (탭하여 공격)</div>
        <div class="grid-wrapper">
          <div class="col-labels" id="attackColLabels"></div>
          <div class="grid-row-wrap">
            <div class="row-labels" id="attackRowLabels"></div>
            <div class="sea-grid attack-grid" id="attackGrid"></div>
          </div>
        </div>
      </div>

      <!-- 구분선 -->
      <div class="grid-divider"></div>

      <!-- 하단: 내 바다 (내 함선 + 적 공격 표시) -->
      <div class="grid-section">
        <div class="grid-label my-label">🛡️ 내 바다</div>
        <div class="grid-wrapper">
          <div class="col-labels" id="myColLabels"></div>
          <div class="grid-row-wrap">
            <div class="row-labels" id="myRowLabels"></div>
            <div class="sea-grid my-grid" id="myGrid"></div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- 화면 5: 결과 -->
  <section class="screen screen-result" id="resultScreen">
    <div class="result-body">
      <div class="result-emoji" id="resultEmoji">🎉</div>
      <h2 class="result-title" id="resultTitle">플레이어 1 승리!</h2>
      <p class="result-sub" id="resultSub">적 함선 3척을 모두 격침했어요!</p>

      <div class="result-grids">
        <div class="result-grid-wrap">
          <p class="result-grid-label">플레이어 1의 바다</p>
          <div class="sea-grid result-grid" id="resultGrid1"></div>
        </div>
        <div class="result-grid-wrap">
          <p class="result-grid-label">플레이어 2의 바다</p>
          <div class="sea-grid result-grid" id="resultGrid2"></div>
        </div>
      </div>
    </div>
    <div class="result-actions">
      <button class="btn btn-primary" id="retryBtn">다시하기</button>
      <button class="btn btn-secondary" id="homeBtn">홈으로</button>
    </div>
  </section>

  <script src="../../shared/engine.js"></script>
  <script src="game.js"></script>
</body>
</html>
