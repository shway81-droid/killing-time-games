<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>같은 타이밍</title>
  <link rel="stylesheet" href="../../shared/style.css?v=2">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 화면 1: 인트로 / 인원 선택 -->
  <section class="screen screen-intro active" id="introScreen">
    <header class="game-header">
      <button class="icon-btn" id="backBtn" aria-label="뒤로가기">←</button>
      <h1 class="game-title">⏱️ 같은 타이밍</h1>
      <button class="sound-toggle" id="soundToggleIntro" aria-label="사운드 토글">🔇</button>
    </header>
    <div class="intro-body">

      <!-- Inline SVG demo -->
      <div class="intro-demo" aria-hidden="true">
        <svg viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg" class="demo-svg">
          <!-- Background circle (small) -->
          <circle cx="100" cy="60" r="30" fill="rgba(126,87,194,0.15)" stroke="rgba(126,87,194,0.4)" stroke-width="2"/>
          <!-- Growing circle -->
          <circle cx="100" cy="60" r="50" fill="rgba(126,87,194,0.25)" stroke="#7E57C2" stroke-width="3"/>
          <!-- Glow ring at max -->
          <circle cx="100" cy="60" r="58" fill="none" stroke="#69F0AE" stroke-width="4" stroke-dasharray="8,4" opacity="0.8"/>
          <!-- 지금! label -->
          <text x="100" y="65" text-anchor="middle" font-size="18" font-weight="900" font-family="sans-serif" fill="#69F0AE">지금!</text>
          <!-- Player dots -->
          <rect x="10" y="95" width="40" height="20" rx="10" fill="#00BCD4" opacity="0.8"/>
          <text x="30" y="109" text-anchor="middle" font-size="10" font-weight="700" font-family="sans-serif" fill="white">P1 ✓</text>
          <rect x="80" y="95" width="40" height="20" rx="10" fill="#FF5722" opacity="0.8"/>
          <text x="100" y="109" text-anchor="middle" font-size="10" font-weight="700" font-family="sans-serif" fill="white">P2 ✓</text>
          <rect x="150" y="95" width="40" height="20" rx="10" fill="#9C27B0" opacity="0.8"/>
          <text x="170" y="109" text-anchor="middle" font-size="10" font-weight="700" font-family="sans-serif" fill="white">P3 ✓</text>
        </svg>
      </div>

      <p class="intro-text">원이 가장 클 때 <strong>모두 함께</strong> 터치!</p>
      <p class="intro-subtext">10라운드 · 0.3초 안에 전원이 탭 → 성공</p>

      <div class="player-select-label">인원 선택</div>
      <div class="player-select-row">
        <button class="player-btn active" data-count="2">2명</button>
        <button class="player-btn" data-count="3">3명</button>
        <button class="player-btn" data-count="4">4명</button>
      </div>
    </div>
    <button class="btn btn-primary btn-play" id="playBtn">PLAY</button>
  </section>

  <!-- 화면: 카운트다운 -->
  <section class="screen screen-countdown" id="countdownScreen">
    <div class="countdown-number" id="countdownNumber">3</div>
  </section>

  <!-- 화면: 게임 플레이 -->
  <section class="screen screen-game" id="gameScreen">

    <!-- 상단 HUD -->
    <div class="game-hud">
      <div class="hud-round" id="hudRound">1 / 10</div>
      <div class="hud-score" id="hudScore">0 / 10</div>
      <button class="icon-btn close-btn" id="closeBtn" aria-label="홈으로">✕</button>
    </div>

    <!-- 중앙 펄스 영역 -->
    <div class="pulse-area" id="pulseArea">
      <svg id="pulseSvg" class="pulse-svg" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
        <!-- Outer glow ring (appears at TAP window) -->
        <circle id="glowRing" cx="150" cy="150" r="138" fill="none"
          stroke="#69F0AE" stroke-width="8" opacity="0" stroke-dasharray="12,6"/>
        <!-- Main pulsing circle -->
        <circle id="pulseCircle" cx="150" cy="150" r="60"
          fill="rgba(126,87,194,0.35)" stroke="#7E57C2" stroke-width="4"/>
        <!-- Inner highlight -->
        <circle id="pulseInner" cx="150" cy="150" r="40"
          fill="rgba(179,157,219,0.2)" stroke="none"/>
        <!-- TAP label (hidden until window opens) -->
        <text id="tapLabel" x="150" y="162" text-anchor="middle"
          font-size="36" font-weight="900" font-family="sans-serif"
          fill="#69F0AE" opacity="0">지금!</text>
        <!-- Round result overlay -->
        <text id="resultLabel" x="150" y="162" text-anchor="middle"
          font-size="28" font-weight="900" font-family="sans-serif"
          fill="white" opacity="0"></text>
      </svg>
    </div>

    <!-- 플레이어 탭 구역 (JS로 채움) -->
    <div class="tap-zones" id="tapZones"></div>

  </section>

  <!-- 화면: 결과 -->
  <section class="screen screen-result result-modern" id="resultScreen">
    <!-- Confetti container -->
    <div id="confettiContainer" class="confetti-container"></div>

    <div class="result-emoji" id="resultEmoji">🏆</div>
    <h2 class="result-title" id="resultTitle" style="color:#fff;">게임 종료!</h2>
    <div class="result-score-card">
      <div class="result-score-label">팀 성공 라운드</div>
      <div class="result-score-value" id="resultScore">0 / 10</div>
    </div>
    <p class="result-message" id="resultMessage"></p>

    <div class="result-actions">
      <button class="btn btn-primary" id="retryBtn">다시하기</button>
      <button class="btn btn-secondary" id="homeBtn">홈으로</button>
    </div>
  </section>

  <script src="../../shared/engine.js?v=2"></script>
  <script src="game.js"></script>
</body>
</html>
