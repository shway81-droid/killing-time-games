<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>파리 잡기</title>
  <link rel="stylesheet" href="../../shared/style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 화면 1: 인트로 / 플레이어 수 선택 -->
  <section class="screen screen-intro active" id="introScreen">
    <header class="game-header">
      <button class="icon-btn" id="backBtn" aria-label="뒤로가기">←</button>
      <h1 class="game-title">🪰 파리 잡기</h1>
      <button class="sound-toggle" id="soundToggleIntro" aria-label="사운드 토글">🔇</button>
    </header>

    <div class="intro-body">
      <div class="intro-fly-preview" aria-hidden="true">
        <svg viewBox="0 0 40 40" width="80" height="80" class="preview-fly">
          <ellipse cx="20" cy="24" rx="6" ry="8" fill="#333"/>
          <circle cx="20" cy="16" r="5" fill="#555"/>
          <ellipse cx="12" cy="16" rx="7" ry="4" fill="rgba(200,200,255,0.6)" transform="rotate(-20 12 16)"/>
          <ellipse cx="28" cy="16" rx="7" ry="4" fill="rgba(200,200,255,0.6)" transform="rotate(20 28 16)"/>
          <circle cx="18" cy="15" r="1.5" fill="red"/>
          <circle cx="22" cy="15" r="1.5" fill="red"/>
        </svg>
      </div>

      <p class="intro-text">내 영역의 파리를 빠르게 잡으세요!</p>
      <p class="intro-subtext">30초 안에 가장 많이 잡은 플레이어가 이깁니다</p>

      <div class="player-select-label">플레이어 수 선택</div>
      <div class="player-select-btns">
        <button class="player-btn active" data-count="2">2명</button>
        <button class="player-btn" data-count="3">3명</button>
        <button class="player-btn" data-count="4">4명</button>
      </div>
    </div>

    <button class="btn btn-primary btn-play" id="playBtn">PLAY</button>
  </section>

  <!-- 화면 2: 카운트다운 -->
  <section class="screen screen-countdown" id="countdownScreen">
    <div class="countdown-number" id="countdownNumber">3</div>
  </section>

  <!-- 화면 3: 게임 플레이 -->
  <section class="screen screen-game" id="gameScreen">
    <!-- 상단 HUD: 점수 + 타이머 -->
    <div class="game-hud" id="gameHud">
      <!-- 플레이어 점수 칸은 JS로 동적 생성 -->
    </div>

    <!-- 게임 영역: 영역 분할은 JS로 동적 생성 -->
    <div class="game-arena" id="gameArena">
      <!-- 파리 영역들 JS로 생성 -->
    </div>

    <button class="icon-btn close-game-btn" id="closeBtn" aria-label="홈으로">✕</button>
  </section>

  <!-- 화면 4: 결과 -->
  <section class="screen screen-result" id="resultScreen">
    <div class="result-body">
      <div class="result-trophy">🏆</div>
      <h2 class="result-title" id="resultTitle">게임 끝!</h2>
      <div class="result-scores" id="resultScores">
        <!-- 점수 카드들 JS로 생성 -->
      </div>
    </div>
    <div class="result-actions">
      <button class="btn btn-primary" id="retryBtn">다시하기</button>
      <button class="btn btn-secondary" id="homeBtn">홈으로</button>
    </div>
  </section>

  <script src="../../shared/engine.js"></script>
  <script src="game.js"></script>

</body>
</html>
