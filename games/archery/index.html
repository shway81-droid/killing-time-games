<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>양궁</title>
  <link rel="stylesheet" href="../../shared/style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 화면 1: 인트로 -->
  <section class="screen screen-intro active" id="introScreen">
    <header class="game-header">
      <button class="icon-btn" id="backBtn" aria-label="뒤로가기">←</button>
      <h1 class="game-title">🏹 양궁</h1>
      <button class="sound-toggle" id="soundToggleIntro" aria-label="사운드 토글">🔇</button>
    </header>

    <div class="intro-body">
      <div class="intro-preview" aria-hidden="true">
        <svg viewBox="0 0 180 180" width="160" height="160">
          <!-- Target rings -->
          <circle cx="90" cy="90" r="84" fill="#FFFFFF" stroke="#999" stroke-width="1.5"/>
          <circle cx="90" cy="90" r="67" fill="#222222" stroke="#999" stroke-width="1.5"/>
          <circle cx="90" cy="90" r="50" fill="#1565C0" stroke="#999" stroke-width="1.5"/>
          <circle cx="90" cy="90" r="34" fill="#EF5350" stroke="#999" stroke-width="1.5"/>
          <circle cx="90" cy="90" r="17" fill="#FFD700" stroke="#999" stroke-width="1.5"/>
          <!-- Cross hairs -->
          <line x1="90" y1="6" x2="90" y2="174" stroke="rgba(0,0,0,0.15)" stroke-width="1"/>
          <line x1="6" y1="90" x2="174" y2="90" stroke="rgba(0,0,0,0.15)" stroke-width="1"/>
          <!-- Sample arrow dots -->
          <circle cx="85" cy="88" r="5" fill="#EF5350" stroke="white" stroke-width="1.5"/>
          <circle cx="102" cy="76" r="5" fill="#EF5350" stroke="white" stroke-width="1.5"/>
          <circle cx="93" cy="92" r="5" fill="#29B6F6" stroke="white" stroke-width="1.5"/>
        </svg>
      </div>

      <p class="intro-text">과녁을 향해 활을 쏘세요!</p>
      <p class="intro-subtext">드래그로 조준, 손을 떼면 발사! 3발씩 쏘아 점수를 겨루세요.</p>

      <div class="player-select">
        <p class="player-select-label">플레이어 수</p>
        <div class="player-btns">
          <button class="player-count-btn active" data-count="2">2명</button>
          <button class="player-count-btn" data-count="3">3명</button>
          <button class="player-count-btn" data-count="4">4명</button>
        </div>
      </div>
    </div>

    <button class="btn btn-primary btn-play" id="playBtn">PLAY</button>
  </section>

  <!-- 화면 2: 게임 -->
  <section class="screen screen-game" id="gameScreen">
    <header class="game-header">
      <button class="icon-btn" id="closeBtn" aria-label="홈으로">←</button>
      <div class="hud-center">
        <div class="wind-indicator" id="windIndicator">
          <span class="wind-arrow" id="windArrow">→</span>
          <span class="wind-label" id="windLabel">약</span>
        </div>
      </div>
      <button class="sound-toggle" id="soundToggleGame" aria-label="사운드 토글">🔇</button>
    </header>

    <div class="player-status-bar" id="playerStatusBar">
      <!-- populated by JS -->
    </div>

    <div class="target-area" id="targetArea">
      <svg id="targetSvg" viewBox="0 0 300 300" class="target-svg">
        <!-- Rings (outermost to innermost) -->
        <circle cx="150" cy="150" r="140" fill="#FFFFFF" stroke="#ccc" stroke-width="2" class="ring ring-2"/>
        <circle cx="150" cy="150" r="112" fill="#222222" stroke="#ccc" stroke-width="2" class="ring ring-4"/>
        <circle cx="150" cy="150" r="84" fill="#1565C0" stroke="#ccc" stroke-width="2" class="ring ring-6"/>
        <circle cx="150" cy="150" r="56" fill="#EF5350" stroke="#ccc" stroke-width="2" class="ring ring-8"/>
        <circle cx="150" cy="150" r="28" fill="#FFD700" stroke="#ccc" stroke-width="2" class="ring ring-10"/>
        <!-- Score labels -->
        <text x="150" y="20" text-anchor="middle" font-size="11" fill="#666" font-weight="bold">2</text>
        <text x="150" y="48" text-anchor="middle" font-size="11" fill="#aaa" font-weight="bold">4</text>
        <text x="150" y="76" text-anchor="middle" font-size="11" fill="#aaa" font-weight="bold">6</text>
        <text x="150" y="104" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">8</text>
        <text x="150" y="130" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">10</text>
        <!-- Crosshair lines -->
        <line x1="150" y1="10" x2="150" y2="290" stroke="rgba(0,0,0,0.1)" stroke-width="1"/>
        <line x1="10" y1="150" x2="290" y2="150" stroke="rgba(0,0,0,0.1)" stroke-width="1"/>
        <!-- Arrow dots layer -->
        <g id="arrowDotsLayer"></g>
        <!-- Aim line layer -->
        <g id="aimLineLayer"></g>
      </svg>
    </div>

    <div class="shoot-zone" id="shootZone">
      <div class="shoot-instruction" id="shootInstruction">
        <span id="currentPlayerLabel">플레이어 1</span>의 차례 &nbsp;|&nbsp; 화살 남은 수:
        <span class="arrows-remaining" id="arrowsRemaining">●●●</span>
      </div>
      <div class="drag-hint">화면을 아래로 드래그해서 조준 후 손을 떼세요</div>
    </div>
  </section>

  <!-- 화면 3: 결과 -->
  <section class="screen screen-result" id="resultScreen">
    <div class="result-body">
      <div class="result-trophy" id="resultTrophy">🏆</div>
      <h2 class="result-title" id="resultTitle">플레이어 1 우승!</h2>
      <div class="score-table" id="scoreTable">
        <!-- populated by JS -->
      </div>
    </div>
    <div class="result-actions">
      <button class="btn btn-primary" id="retryBtn">다시하기</button>
      <button class="btn btn-secondary" id="homeBtn">홈으로</button>
    </div>
  </section>

  <script src="../../shared/engine.js"></script>
  <script src="game.js"></script>

</body>
</html>
