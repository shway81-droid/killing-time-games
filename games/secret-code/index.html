<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>비밀 암호</title>
<link rel="stylesheet" href="../../shared/style.css?v=2">
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="screen screen-intro active" id="introScreen">
  <header class="game-header">
    <button class="icon-btn" id="backBtn" aria-label="뒤로가기">←</button>
    <h1 class="game-title">비밀 암호</h1>
    <button class="sound-toggle" id="soundToggleIntro" aria-label="사운드 토글">🔇</button>
  </header>

  <div class="intro-body">
    <div class="intro-demo" aria-hidden="true">
      <!-- Left: P1 sees sequence -->
      <svg viewBox="0 0 80 80" width="78" height="78">
        <rect x="6" y="6" width="68" height="68" rx="8" fill="#fff" stroke="#3F51B5" stroke-width="2"/>
        <rect x="14" y="14" width="52" height="14" rx="4" fill="#EF5350"/>
        <rect x="14" y="33" width="52" height="14" rx="4" fill="#42A5F5"/>
        <rect x="14" y="52" width="52" height="14" rx="4" fill="#FFEE58"/>
        <circle cx="68" cy="12" r="5" fill="#3F51B5"/>
        <text x="68" y="15" text-anchor="middle" font-size="7" font-weight="900" fill="#fff">👁</text>
      </svg>
      <!-- Speech bubble / arrow -->
      <svg viewBox="0 0 50 40" width="40" height="32">
        <path d="M6 20 L38 20 M32 14 L38 20 L32 26" stroke="#3F51B5" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="25" y="13" text-anchor="middle" font-size="10" font-weight="800" fill="#3F51B5">🗣</text>
      </svg>
      <!-- Right: P2 taps color grid -->
      <svg viewBox="0 0 80 80" width="78" height="78">
        <rect x="6" y="6" width="68" height="68" rx="8" fill="#1A237E"/>
        <rect x="14" y="14" width="24" height="24" rx="4" fill="#EF5350"/>
        <rect x="42" y="14" width="24" height="24" rx="4" fill="#42A5F5"/>
        <rect x="14" y="42" width="24" height="24" rx="4" fill="#FFEE58"/>
        <rect x="42" y="42" width="24" height="24" rx="4" fill="#66BB6A"/>
        <circle cx="26" cy="26" r="6" fill="none" stroke="#fff" stroke-width="2.5"/>
      </svg>
    </div>

    <p class="intro-text">색 순서를 보고 말로 전달!</p>
    <div class="badge-2p">👥 2인 전용</div>
    <p class="intro-subtext">P1이 본 색 순서를 P2에게<br><b>말로</b> 알려주세요!</p>

    <ul class="intro-rules">
      <li>왼쪽(P1): 색이 순서대로 나타남</li>
      <li>오른쪽(P2): P1 말을 듣고 색깔 버튼 탭</li>
      <li>순서 틀리면 실패!</li>
      <li>5라운드, 3점 이상 성공!</li>
    </ul>
  </div>
  <button class="btn btn-play" id="playBtn">🔐 PLAY</button>
</section>

<section class="screen screen-countdown" id="countdownScreen">
  <div class="countdown-number" id="countdownNumber">3</div>
</section>

<section class="screen screen-game" id="gameScreen">
  <div class="game-hud">
    <button class="hud-close" id="closeBtn" aria-label="홈으로">✕</button>
    <span class="hud-round" id="hudRound">1/5</span>
    <div class="hud-timer-track"><div class="hud-timer-fill" id="hudTimerFill" style="width:100%"></div></div>
    <span class="hud-score" id="hudScore">0점</span>
    <button class="hud-sound" id="soundToggleGame" aria-label="사운드 토글">🔇</button>
  </div>

  <div class="banner" id="banner"></div>

  <div class="boards">
    <div class="board p1">
      <div class="board-label">👁 P1 암호</div>
      <div class="board-sub">P2에게 말해주세요!</div>
      <div class="seq-slots" id="seqSlots"></div>
    </div>
    <div class="board p2">
      <div class="board-label">🎮 P2 입력</div>
      <div class="board-sub">색깔 버튼을 탭!</div>
      <div class="input-row" id="inputRow"></div>
      <div class="color-grid" id="colorGrid"></div>
    </div>
  </div>
</section>

<section class="screen screen-result" id="resultScreen">
  <div class="result-emoji-big" id="resultEmoji">🎉</div>
  <h2 class="result-headline" id="resultHeadline">성공!</h2>
  <p class="result-sub" id="resultSub">암호 해독 성공!</p>
  <div class="result-stats">
    <div class="stat-row"><span class="stat-label">점수</span><span class="stat-val" id="statScore">0/5</span></div>
    <div class="stat-row"><span class="stat-label">완벽 해독</span><span class="stat-val" id="statPerfect">0회</span></div>
  </div>
  <div class="result-actions">
    <button class="btn btn-retry" id="retryBtn">다시하기</button>
    <button class="btn btn-home-res" id="homeBtn">홈으로</button>
  </div>
</section>

<script src="../../shared/engine.js?v=2"></script>
<script src="game.js"></script>
</body>
</html>
