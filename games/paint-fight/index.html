<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>페인트 파이트</title>
  <link rel="stylesheet" href="../../shared/style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 화면 1: 인트로 -->
  <section class="screen screen-intro active" id="introScreen">
    <header class="game-header">
      <button class="icon-btn" id="backBtn" aria-label="뒤로가기">←</button>
      <h1 class="game-title">🎨 페인트 파이트</h1>
      <button class="sound-toggle" id="soundToggleIntro" aria-label="사운드 토글">🔇</button>
    </header>

    <div class="intro-body">
      <div class="intro-preview" aria-hidden="true">
        <div class="preview-grid">
          <div class="preview-cell" style="background:#29B6F6"></div>
          <div class="preview-cell" style="background:#29B6F6"></div>
          <div class="preview-cell" style="background:#EF5350"></div>
          <div class="preview-cell" style="background:#EF5350"></div>
          <div class="preview-cell" style="background:#29B6F6"></div>
          <div class="preview-cell" style="background:#66BB6A"></div>
          <div class="preview-cell" style="background:#66BB6A"></div>
          <div class="preview-cell" style="background:#EF5350"></div>
          <div class="preview-cell" style="background:#FFA726"></div>
          <div class="preview-cell" style="background:#66BB6A"></div>
          <div class="preview-cell" style="background:#FFA726"></div>
          <div class="preview-cell" style="background:#FFA726"></div>
          <div class="preview-cell" style="background:#29B6F6"></div>
          <div class="preview-cell" style="background:#66BB6A"></div>
          <div class="preview-cell" style="background:#FFA726"></div>
          <div class="preview-cell" style="background:#EF5350"></div>
        </div>
      </div>

      <p class="intro-text">칸을 터치해서 내 색으로 칠하세요!</p>
      <p class="intro-subtext">30초 안에 가장 많은 칸을 차지한 플레이어가 이겨요.<br>상대 칸 위에 덧칠할 수도 있어요!</p>

      <div class="player-count-section">
        <p class="section-label">플레이어 수</p>
        <div class="count-buttons">
          <button class="count-btn active" data-count="2" id="count2">
            <span class="count-num">2</span>
            <span class="count-sub">명</span>
          </button>
          <button class="count-btn" data-count="3" id="count3">
            <span class="count-num">3</span>
            <span class="count-sub">명</span>
          </button>
          <button class="count-btn" data-count="4" id="count4">
            <span class="count-num">4</span>
            <span class="count-sub">명</span>
          </button>
        </div>
      </div>

      <div class="player-colors-preview" id="playerColorsPreview">
        <!-- JS로 채움 -->
      </div>
    </div>

    <button class="btn btn-primary btn-play" id="playBtn">PLAY</button>
  </section>

  <!-- 화면 2: 게임 플레이 -->
  <section class="screen screen-game" id="gameScreen">
    <header class="game-header game-header-play">
      <button class="icon-btn" id="closeBtn" aria-label="홈으로">←</button>

      <div class="hud-center">
        <div class="timer-wrap">
          <div class="timer-bar-bg">
            <div class="timer-bar-fill" id="timerBarFill"></div>
          </div>
          <span class="timer-text" id="timerText">30</span>
        </div>
      </div>

      <button class="sound-toggle" id="soundToggleGame" aria-label="사운드 토글">🔇</button>
    </header>

    <!-- 점수판 -->
    <div class="scoreboard" id="scoreboard">
      <!-- JS로 채움 -->
    </div>

    <!-- 현재 턴 표시 -->
    <div class="turn-banner" id="turnBanner">
      <span class="turn-banner-label">현재 차례</span>
      <span class="turn-banner-name" id="turnBannerName">플레이어 1</span>
      <span class="turn-banner-arrow">▼ 탭하세요</span>
    </div>

    <!-- 그리드 -->
    <div class="grid-wrapper">
      <div class="paint-grid" id="paintGrid">
        <!-- JS로 채움 -->
      </div>
    </div>
  </section>

  <!-- 화면 3: 결과 -->
  <section class="screen screen-result" id="resultScreen">
    <header class="game-header">
      <div></div>
      <h2 class="result-header-title">결과</h2>
      <div></div>
    </header>

    <!-- 미니 그리드 미리보기 -->
    <div class="result-mini-grid-wrap">
      <div class="result-mini-grid" id="resultMiniGrid">
        <!-- JS로 채움 -->
      </div>
    </div>

    <!-- 승자 발표 -->
    <div class="result-announce" id="resultAnnounce">
      <div class="result-trophy">🏆</div>
      <h3 class="result-winner-name" id="resultWinnerName">플레이어 1 승리!</h3>
    </div>

    <!-- 점수 목록 -->
    <div class="result-scores" id="resultScores">
      <!-- JS로 채움 -->
    </div>

    <div class="result-actions">
      <button class="btn btn-primary" id="retryBtn">다시하기</button>
      <button class="btn btn-secondary" id="homeBtn">홈으로</button>
    </div>
  </section>

  <script src="../../shared/engine.js"></script>
  <script src="game.js"></script>

</body>
</html>
