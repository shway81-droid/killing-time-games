<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>짝홀 대결</title>
  <link rel="stylesheet" href="../../shared/style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 화면 1: 인트로 -->
  <section class="screen screen-intro active" id="introScreen">
    <header class="game-header">
      <button class="icon-btn" id="backBtn" aria-label="뒤로가기">←</button>
      <h1 class="game-title">짝홀 대결</h1>
      <button class="sound-toggle" id="soundToggleIntro" aria-label="사운드 토글">🔇</button>
    </header>

    <div class="intro-body">
      <div class="intro-icon-wrap">
        <svg viewBox="0 0 160 160" width="110" height="110" aria-hidden="true">
          <circle cx="80" cy="80" r="72" fill="#5C6BC0" stroke="#3949AB" stroke-width="4"/>
          <text x="80" y="95" text-anchor="middle" font-size="62" font-weight="900" fill="#FFF" font-family="sans-serif">42</text>
        </svg>
      </div>
      <p class="intro-text">숫자를 보고<br>짝수/홀수를 먼저 터치!</p>
      <p class="intro-subtext">오답 터치 시 해당 라운드 실격 -1점 감점! · 15라운드 승부</p>

      <div class="select-label">인원 선택</div>
      <div class="player-select-row">
        <button class="player-btn active" data-count="2">2명</button>
        <button class="player-btn" data-count="3">3명</button>
        <button class="player-btn" data-count="4">4명</button>
      </div>
    </div>

    <button class="btn btn-primary btn-play" id="playBtn">PLAY</button>
  </section>

  <!-- 화면 2: 게임 플레이 -->
  <section class="screen screen-game" id="gameScreen">
    <!-- 플레이어 존 (JS 렌더링) -->
    <div class="zones-wrap" id="zonesWrap"></div>

    <!-- 중앙 패널 -->
    <div class="center-panel" id="centerPanel">
      <div class="round-counter" id="roundCounter">1 / 15</div>
      <div class="number-display" id="numberDisplay">
        <!-- SVG number injected by JS -->
      </div>
      <div class="center-label" id="centerLabel">짝수일까? 홀수일까?</div>
      <div class="round-status" id="roundStatus"></div>
    </div>

    <!-- 닫기 버튼 -->
    <button class="icon-btn close-btn" id="closeBtn" aria-label="홈으로">✕</button>

    <!-- 점수 칩 바 -->
    <div class="score-bar" id="scoreBar"></div>
  </section>

  <!-- 화면 3: 결과 -->
  <section class="screen screen-result" id="resultScreen">
    <header class="result-header">
      <h2 class="result-title" id="resultTitle">게임 종료!</h2>
    </header>
    <div class="result-winner" id="resultWinner"></div>

    <div class="result-table-wrap">
      <table class="result-table" id="resultTable">
        <thead id="resultTableHead"></thead>
        <tbody id="resultTableBody"></tbody>
      </table>
    </div>

    <div class="total-row" id="totalRow"></div>

    <div class="result-actions">
      <button class="btn btn-primary" id="retryBtn">다시하기</button>
      <button class="btn btn-secondary" id="homeBtn">홈으로</button>
    </div>
  </section>

  <script src="../../shared/engine.js"></script>
  <script src="game.js"></script>
</body>
</html>
