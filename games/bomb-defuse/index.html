<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>폭탄 해체</title>
  <link rel="stylesheet" href="../../shared/style.css?v=2">
  <style>
    /* ===== BOMB DEFUSE — inline styles ===== */
    :root {
      --bomb-bg: #1a0a0a;
      --bomb-mid: #2d0f0f;
      --wire-red:    #F44336;
      --wire-blue:   #2196F3;
      --wire-green:  #4CAF50;
      --wire-yellow: #FFEB3B;
      --wire-purple: #9C27B0;
      --wire-orange: #FF9800;
      --wire-pink:   #E91E63;
      --wire-cyan:   #00BCD4;
    }

    html, body {
      background: var(--bomb-bg);
      color: #fff;
      overflow: hidden;
      height: 100%;
    }

    /* ─── Intro ──────────────────────────────── */
    .screen-intro {
      background: linear-gradient(160deg, #1a0a0a 0%, #3d1a1a 100%);
      justify-content: flex-start;
    }
    .screen-intro .game-header { color: #fff; }
    .screen-intro .game-header .icon-btn {
      background: rgba(255,255,255,0.12);
      color: #fff;
    }
    .screen-intro .game-header .sound-toggle {
      background: rgba(255,255,255,0.12);
    }

    .intro-bomb-wrap {
      display: flex;
      justify-content: center;
      margin: 4px auto;
      filter: drop-shadow(0 0 28px rgba(211,47,47,0.7));
    }

    .intro-title-text {
      font-size: 1.7rem;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 0 16px rgba(211,47,47,0.9);
      text-align: center;
    }
    .intro-desc-text {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.65);
      text-align: center;
      line-height: 1.5;
    }
    .intro-rules {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      padding: 12px 20px;
      width: 90%;
      max-width: 340px;
    }
    .intro-rules li {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.75);
      margin-bottom: 5px;
      list-style: none;
      padding-left: 1.5em;
      position: relative;
    }
    .intro-rules li::before {
      content: '💥';
      position: absolute;
      left: 0;
      font-size: 0.75rem;
    }
    .player-select-label { color: rgba(255,255,255,0.55); }
    .player-btn {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.2);
      color: #fff;
    }
    .player-btn.active {
      background: #D32F2F;
      border-color: #D32F2F;
      color: #fff;
    }
    .btn-play {
      background: linear-gradient(135deg, #D32F2F, #7f0000);
      color: #fff;
      font-size: 1.25rem;
      box-shadow: 0 4px 24px rgba(211,47,47,0.55);
    }
    .btn-play:active { transform: scale(0.96); }

    /* ─── Countdown ──────────────────────────── */
    .screen-countdown {
      background: linear-gradient(160deg, #1a0a0a 0%, #3d1a1a 100%);
    }
    .screen-countdown .countdown-number {
      color: #FF5252;
      text-shadow: 0 0 48px rgba(255,82,82,0.9);
    }

    /* ─── Game screen ────────────────────────── */
    .screen-game {
      background: var(--bomb-bg);
      flex-direction: column;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* Code sheet (sequence bar) */
    .code-sheet {
      width: 100%;
      background: rgba(0,0,0,0.55);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      padding: 8px 10px 6px;
      flex-shrink: 0;
    }
    .code-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.45);
      text-transform: uppercase;
      margin-bottom: 5px;
    }
    .code-sequence {
      display: flex;
      align-items: center;
      gap: 3px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 2px;
    }
    .code-sequence::-webkit-scrollbar { display: none; }

    .seq-dot {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.15);
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.3s;
      position: relative;
    }
    .seq-dot.done {
      opacity: 0.28;
    }
    .seq-dot.done::after {
      content: '✕';
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.6);
    }
    .seq-dot.current {
      transform: scale(1.25);
      border-color: #FFD700;
      box-shadow: 0 0 0 3px rgba(255,215,0,0.5), 0 0 12px rgba(255,215,0,0.7);
      animation: dotPulse 0.8s ease-in-out infinite alternate;
    }
    @keyframes dotPulse {
      from { box-shadow: 0 0 0 3px rgba(255,215,0,0.5), 0 0 10px rgba(255,215,0,0.5); }
      to   { box-shadow: 0 0 0 5px rgba(255,215,0,0.25), 0 0 20px rgba(255,215,0,0.9); }
    }

    .seq-arrow {
      flex-shrink: 0;
      color: rgba(255,255,255,0.25);
      font-size: 0.7rem;
    }

    /* HUD row */
    .game-hud {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 5px 12px 5px;
      flex-shrink: 0;
    }
    .timer-box {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.07);
      border-radius: 10px;
      padding: 4px 12px;
      flex: 1;
    }
    .timer-icon { font-size: 0.9rem; }
    .timer-val {
      font-size: 1.3rem;
      font-weight: 900;
      color: #fff;
      min-width: 28px;
      text-align: center;
      font-family: monospace;
    }
    .timer-val.danger {
      color: #FF5252;
      animation: timerPulse 0.4s infinite alternate;
    }
    @keyframes timerPulse {
      from { opacity: 1; transform: scale(1); }
      to   { opacity: 0.6; transform: scale(1.08); }
    }

    .step-box {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,215,0,0.12);
      border: 1px solid rgba(255,215,0,0.3);
      border-radius: 10px;
      padding: 4px 12px;
    }
    .step-label {
      font-size: 0.65rem;
      font-weight: 700;
      color: rgba(255,215,0,0.7);
      letter-spacing: 0.05em;
    }
    .step-val {
      font-size: 1rem;
      font-weight: 900;
      color: #FFD700;
    }

    /* Bomb center */
    .bomb-area {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      padding: 4px 0 0;
    }
    .bomb-wrap {
      position: relative;
      display: inline-block;
    }
    .bomb-wrap svg {
      display: block;
      filter: drop-shadow(0 0 20px rgba(211,47,47,0.55));
    }
    .bomb-wrap.explode {
      animation: bombShake 0.6s ease;
    }
    @keyframes bombShake {
      0%   { transform: translate(0,0) rotate(0deg); }
      10%  { transform: translate(-8px,-4px) rotate(-5deg); }
      20%  { transform: translate(8px,4px) rotate(5deg); }
      30%  { transform: translate(-7px,5px) rotate(-4deg); }
      40%  { transform: translate(7px,-4px) rotate(4deg); }
      50%  { transform: translate(-5px,2px) rotate(-2deg); }
      60%  { transform: translate(5px,-2px) rotate(2deg); }
      75%  { transform: translate(-2px,1px) rotate(-1deg); }
      100% { transform: translate(0,0) rotate(0deg); }
    }

    /* Spark animation on fuse */
    .fuse-spark {
      animation: sparkFlicker 0.3s ease-in-out infinite alternate;
    }
    @keyframes sparkFlicker {
      from { opacity: 1; r: 6; }
      to   { opacity: 0.6; r: 8; }
    }

    /* Player zones */
    .zones-outer {
      flex: 1;
      display: flex;
      flex-direction: column;
      width: 100%;
      overflow-y: auto;
      padding: 6px 8px 8px;
      gap: 8px;
    }
    .zones-grid {
      display: grid;
      gap: 8px;
      width: 100%;
    }
    .zones-grid.p2 { grid-template-columns: 1fr 1fr; }
    .zones-grid.p3 { grid-template-columns: 1fr 1fr 1fr; }
    .zones-grid.p4 { grid-template-columns: 1fr 1fr; }

    .player-zone {
      border-radius: 14px;
      border: 2px solid rgba(255,255,255,0.1);
      padding: 8px 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      position: relative;
      overflow: hidden;
    }
    .zone-label {
      font-size: 0.7rem;
      font-weight: 800;
      letter-spacing: 0.05em;
      color: rgba(255,255,255,0.7);
    }
    .wire-list {
      display: flex;
      flex-direction: column;
      gap: 5px;
      width: 100%;
    }

    /* Wire button */
    .wire-btn {
      width: 100%;
      min-height: 44px;
      border-radius: 10px;
      border: 2px solid rgba(255,255,255,0.2);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 10px;
      position: relative;
      overflow: hidden;
      transition: filter 0.1s, transform 0.1s;
      font-family: var(--font-family);
    }
    .wire-btn:active { transform: scale(0.96); }
    .wire-btn.cut {
      opacity: 0.35;
      pointer-events: none;
    }
    .wire-btn.cut .wire-graphic::after {
      content: '';
      position: absolute;
      left: 50%;
      top: 50%;
      width: 2px;
      height: 140%;
      background: rgba(255,255,255,0.8);
      transform: translate(-50%, -50%) rotate(45deg);
    }
    .wire-btn.wrong-flash {
      animation: wrongFlash 0.4s ease;
    }
    @keyframes wrongFlash {
      0%   { background: rgba(255,23,68,0.7) !important; border-color: #FF1744; }
      50%  { background: rgba(255,23,68,0.9) !important; }
      100% { background: inherit; }
    }
    .wire-btn.correct-flash {
      animation: correctFlash 0.35s ease;
    }
    @keyframes correctFlash {
      0%  { filter: brightness(2); }
      100%{ filter: brightness(1); }
    }

    .wire-graphic {
      width: 32px;
      height: 28px;
      flex-shrink: 0;
      position: relative;
    }
    .wire-name-ko {
      font-size: 0.85rem;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 1px 3px rgba(0,0,0,0.6);
      flex: 1;
    }
    .wire-cut-label {
      font-size: 0.65rem;
      font-weight: 800;
      color: rgba(255,255,255,0.8);
      letter-spacing: 0.08em;
      background: rgba(255,255,255,0.15);
      padding: 2px 6px;
      border-radius: 6px;
    }
    .wire-cut-x {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.2rem;
      color: rgba(255,255,255,0.6);
      display: none;
    }
    .wire-btn.cut .wire-cut-label { display: none; }
    .wire-btn.cut .wire-cut-x { display: block; }

    /* Close btn */
    .close-btn-game {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 20;
      background: rgba(255,255,255,0.1);
      color: #fff;
    }

    /* Explosion overlay */
    .explosion-overlay {
      position: fixed;
      inset: 0;
      background: #FF1744;
      opacity: 0;
      pointer-events: none;
      z-index: 100;
      transition: opacity 0.05s;
    }
    .explosion-overlay.bang {
      animation: explosionFlash 0.7s ease-out forwards;
    }
    @keyframes explosionFlash {
      0%   { opacity: 0.95; }
      30%  { opacity: 0.7; }
      100% { opacity: 0; }
    }

    /* Wrong wire overlay */
    .wrong-overlay {
      position: fixed;
      inset: 0;
      background: #FF1744;
      opacity: 0;
      pointer-events: none;
      z-index: 90;
    }
    .wrong-overlay.flash {
      animation: wrongOverlayFlash 0.35s ease-out forwards;
    }
    @keyframes wrongOverlayFlash {
      0%   { opacity: 0.5; }
      100% { opacity: 0; }
    }

    /* Penalty float */
    .penalty-float {
      position: fixed;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 2.5rem;
      font-weight: 900;
      color: #FF1744;
      text-shadow: 0 0 20px rgba(255,23,68,0.8);
      pointer-events: none;
      z-index: 95;
      animation: penaltyPop 0.9s ease-out forwards;
    }
    @keyframes penaltyPop {
      0%   { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
      25%  { transform: translate(-50%, -60%) scale(1.3); }
      100% { opacity: 0; transform: translate(-50%, -80%) scale(0.9); }
    }

    /* ─── Result ─────────────────────────────── */
    .screen-result {
      background: linear-gradient(160deg, #1a0a0a 0%, #2d1a1a 60%, #1a0a0a 100%);
      justify-content: center;
      align-items: center;
      gap: 16px;
      padding: 24px;
    }
    .result-emoji {
      font-size: 4rem;
      animation: bounceIn 0.5s ease;
    }
    @keyframes bounceIn {
      0%  { transform: scale(0.3); opacity: 0; }
      60% { transform: scale(1.2); }
      100%{ transform: scale(1);   opacity: 1; }
    }
    .result-headline {
      font-size: 2rem;
      font-weight: 900;
      text-align: center;
    }
    .result-headline.success {
      color: #69F0AE;
      text-shadow: 0 0 16px rgba(105,240,174,0.6);
    }
    .result-headline.fail {
      color: #FF5252;
      text-shadow: 0 0 16px rgba(255,82,82,0.6);
    }
    .result-detail {
      font-size: 1rem;
      color: rgba(255,255,255,0.65);
      text-align: center;
    }
    .result-stats {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 14px 28px;
      width: 100%;
      max-width: 300px;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    .stat-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
    }
    .stat-label { color: rgba(255,255,255,0.5); }
    .stat-val   { color: #fff; font-weight: 700; }
    .result-actions {
      display: flex;
      gap: 12px;
      width: 100%;
      max-width: 300px;
    }
    .btn-retry {
      flex: 1;
      background: linear-gradient(135deg, #D32F2F, #7f0000);
      color: #fff;
      box-shadow: 0 4px 16px rgba(211,47,47,0.4);
    }
    .btn-home {
      flex: 1;
      background: rgba(255,255,255,0.1);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.15);
    }
  </style>
</head>
<body>

  <!-- Overlays (always present) -->
  <div class="explosion-overlay" id="explosionOverlay"></div>
  <div class="wrong-overlay" id="wrongOverlay"></div>

  <!-- ══ Screen 1: Intro ══ -->
  <section class="screen screen-intro active" id="introScreen">
    <header class="game-header">
      <button class="icon-btn" id="backBtn" aria-label="뒤로가기">←</button>
      <h1 class="game-title" style="color:#fff;">💣 폭탄 해체</h1>
      <button class="sound-toggle" id="soundToggleIntro" aria-label="사운드 토글">🔇</button>
    </header>
    <div class="intro-body">

      <!-- Intro bomb SVG -->
      <div class="intro-bomb-wrap">
        <svg viewBox="0 0 200 220" width="160" height="176" aria-hidden="true">
          <defs>
            <radialGradient id="introBombGrad" cx="38%" cy="32%">
              <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
              <stop offset="100%" stop-color="rgba(0,0,0,0.2)"/>
            </radialGradient>
          </defs>
          <!-- Fuse -->
          <path d="M100 20 Q120 10 140 20 Q150 30 140 40" fill="none" stroke="#795548" stroke-width="4" stroke-linecap="round"/>
          <!-- Spark outer -->
          <circle cx="140" cy="40" r="9" fill="rgba(255,111,0,0.4)"/>
          <!-- Spark inner -->
          <circle cx="140" cy="40" r="6" fill="#FF6F00"/>
          <circle cx="140" cy="40" r="3" fill="#FFEB3B"/>
          <!-- Bomb body shadow -->
          <ellipse cx="102" cy="126" rx="68" ry="68" fill="rgba(0,0,0,0.35)"/>
          <!-- Bomb body -->
          <circle cx="100" cy="120" r="70" fill="#2a2a2a"/>
          <circle cx="100" cy="120" r="70" fill="url(#introBombGrad)"/>
          <!-- Shine -->
          <circle cx="78" cy="98" r="16" fill="rgba(255,255,255,0.12)"/>
          <!-- Wires sticking out left -->
          <line x1="40" y1="108" x2="65" y2="118" stroke="#F44336" stroke-width="3" stroke-linecap="round"/>
          <line x1="38" y1="128" x2="64" y2="128" stroke="#2196F3" stroke-width="3" stroke-linecap="round"/>
          <line x1="40" y1="148" x2="65" y2="138" stroke="#4CAF50" stroke-width="3" stroke-linecap="round"/>
          <!-- Wires sticking out right -->
          <line x1="160" y1="108" x2="135" y2="118" stroke="#FFEB3B" stroke-width="3" stroke-linecap="round"/>
          <line x1="162" y1="128" x2="136" y2="128" stroke="#9C27B0" stroke-width="3" stroke-linecap="round"/>
          <line x1="160" y1="148" x2="135" y2="138" stroke="#FF9800" stroke-width="3" stroke-linecap="round"/>
          <!-- Timer display -->
          <rect x="66" y="98" width="68" height="44" rx="6" fill="#111" stroke="#333" stroke-width="1.5"/>
          <text x="100" y="128" text-anchor="middle" fill="#FF1744" font-size="26" font-weight="900" font-family="monospace">45</text>
        </svg>
      </div>

      <p class="intro-title-text">💣 폭탄 해체</p>
      <p class="intro-desc-text">순서에 맞게 선을 잘라 폭탄을 해체하세요!<br>45초 안에 모든 선을 올바른 순서로!</p>

      <ul class="intro-rules">
        <li>상단 해체 순서표의 현재 선(금색 빛남)을 확인</li>
        <li>해당 색 선을 가진 플레이어가 자르기</li>
        <li>오답 시 -5초 (2번 오답 즉시 폭발)</li>
        <li>45초 내 모두 해체 → 성공!</li>
      </ul>

      <div class="player-select-label">인원 선택</div>
      <div class="player-select" id="playerSelect">
        <button class="player-btn active" data-count="2">2명</button>
        <button class="player-btn" data-count="3">3명</button>
        <button class="player-btn" data-count="4">4명</button>
      </div>
    </div>
    <button class="btn btn-play" id="playBtn">💣 PLAY</button>
  </section>

  <!-- ══ Screen 1.5: Countdown ══ -->
  <section class="screen screen-countdown" id="countdownScreen">
    <div class="countdown-number" id="countdownNumber">3</div>
  </section>

  <!-- ══ Screen 2: Game ══ -->
  <section class="screen screen-game" id="gameScreen">

    <!-- Sequence code sheet -->
    <div class="code-sheet">
      <div class="code-label">해체 순서 (DEFUSE SEQUENCE)</div>
      <div class="code-sequence" id="codeSequence"></div>
    </div>

    <!-- HUD row: timer + step -->
    <div class="game-hud">
      <div class="timer-box">
        <span class="timer-icon">💣</span>
        <span class="timer-val" id="timerVal">45</span>
        <span style="font-size:0.65rem;color:rgba(255,255,255,0.35);margin-left:2px;">초</span>
      </div>
      <div class="step-box">
        <span class="step-label">STEP</span>
        <span class="step-val" id="stepVal">1 / 8</span>
      </div>
    </div>

    <!-- Bomb center -->
    <div class="bomb-area">
      <div class="bomb-wrap" id="bombWrap">
        <svg viewBox="0 0 200 220" width="160" height="176" aria-label="폭탄">
          <defs>
            <radialGradient id="bombBodyGrad" cx="38%" cy="32%">
              <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
              <stop offset="100%" stop-color="rgba(0,0,0,0.2)"/>
            </radialGradient>
          </defs>
          <!-- Fuse -->
          <path d="M100 20 Q120 10 140 20 Q150 30 140 40" fill="none" stroke="#795548" stroke-width="4" stroke-linecap="round"/>
          <!-- Spark -->
          <circle class="fuse-spark" id="sparkOuter" cx="140" cy="40" r="9" fill="rgba(255,111,0,0.45)"/>
          <circle class="fuse-spark" id="sparkInner" cx="140" cy="40" r="6" fill="#FF6F00"/>
          <circle cx="140" cy="40" r="3" fill="#FFEB3B"/>
          <!-- Shadow -->
          <ellipse cx="102" cy="126" rx="68" ry="68" fill="rgba(0,0,0,0.35)"/>
          <!-- Body -->
          <circle id="bombBody" cx="100" cy="120" r="70" fill="#2a2a2a"/>
          <circle cx="100" cy="120" r="70" fill="url(#bombBodyGrad)"/>
          <!-- Shine -->
          <circle cx="78" cy="98" r="16" fill="rgba(255,255,255,0.12)"/>
          <!-- Timer display -->
          <rect x="66" y="98" width="68" height="44" rx="6" fill="#111" stroke="#333" stroke-width="1.5"/>
          <text id="bombTimerText" x="100" y="128" text-anchor="middle" fill="#FF1744" font-size="24" font-weight="900" font-family="monospace">45</text>
          <!-- Success checkmark (hidden by default) -->
          <g id="bombSuccess" style="display:none;">
            <circle cx="100" cy="120" r="30" fill="#4CAF50" opacity="0.9"/>
            <polyline points="85,120 97,133 118,108" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
          </g>
        </svg>
      </div>
    </div>

    <!-- Player zones (built dynamically) -->
    <div class="zones-outer">
      <div class="zones-grid" id="zonesGrid"></div>
    </div>

    <!-- Close button -->
    <button class="icon-btn close-btn-game" id="closeBtn" aria-label="홈으로">✕</button>
  </section>

  <!-- ══ Screen 3: Result ══ -->
  <section class="screen screen-result" id="resultScreen">
    <div class="result-emoji" id="resultEmoji">🎉</div>
    <h2 class="result-headline" id="resultHeadline">성공!</h2>
    <p class="result-detail" id="resultDetail"></p>
    <div class="result-stats">
      <div class="stat-row">
        <span class="stat-label">남은 시간</span>
        <span class="stat-val" id="statTime">-</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">해체한 선</span>
        <span class="stat-val" id="statWires">-</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">오답 횟수</span>
        <span class="stat-val" id="statMistakes">-</span>
      </div>
    </div>
    <div class="result-actions">
      <button class="btn btn-retry" id="retryBtn">다시하기</button>
      <button class="btn btn-home"  id="homeBtn">홈으로</button>
    </div>
  </section>

  <script src="../../shared/engine.js?v=2"></script>
  <script src="game.js"></script>
</body>
</html>
