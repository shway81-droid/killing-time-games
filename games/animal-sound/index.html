<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>동물 소리</title>
  <link rel="stylesheet" href="../../shared/style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 화면 1: 인트로 / 설정 -->
  <section class="screen screen-intro active" id="introScreen">
    <header class="game-header">
      <button class="icon-btn" id="backBtn" aria-label="뒤로가기">←</button>
      <h1 class="game-title">동물 소리</h1>
      <button class="sound-toggle" id="soundToggleIntro" aria-label="사운드 토글">🔇</button>
    </header>

    <div class="intro-body">
      <div class="intro-speaker">
        <svg viewBox="0 0 80 80" width="80" height="80">
          <!-- Speaker body -->
          <polygon points="20,28 36,28 52,14 52,66 36,52 20,52" fill="#4CAF50" rx="4"/>
          <!-- Sound waves -->
          <path d="M58,30 Q66,40 58,50" stroke="#4CAF50" stroke-width="3.5" fill="none" stroke-linecap="round"/>
          <path d="M63,22 Q76,40 63,58" stroke="#81C784" stroke-width="3" fill="none" stroke-linecap="round"/>
        </svg>
      </div>
      <p class="intro-text">소리를 듣고<br>어떤 동물인지 맞춰보세요!</p>
      <p class="intro-subtext">정답 +1점 · 오답 -1점(실격) · 10라운드 승부</p>

      <div class="select-label">인원 선택</div>
      <div class="player-select-row">
        <button class="player-btn active" data-count="2">2명</button>
        <button class="player-btn" data-count="3">3명</button>
        <button class="player-btn" data-count="4">4명</button>
      </div>
    </div>

    <button class="btn btn-primary btn-play" id="playBtn">PLAY</button>
  </section>

  <!-- 화면 2: 게임 플레이 -->
  <section class="screen screen-game" id="gameScreen">
    <!-- 플레이어 존 (JS 렌더링) -->
    <div class="zones-wrap" id="zonesWrap"></div>

    <!-- 중앙 패널 -->
    <div class="center-panel" id="centerPanel">
      <div class="question-counter" id="questionCounter">1 / 10</div>

      <!-- Speaker icon with wave animation -->
      <div class="speaker-display" id="speakerDisplay">
        <svg class="speaker-svg" id="speakerSvg" viewBox="0 0 100 100" width="72" height="72">
          <!-- Speaker cone -->
          <polygon points="22,36 42,36 62,18 62,82 42,64 22,64" fill="#fff"/>
          <!-- Wave 1 -->
          <path class="wave wave1" d="M68,40 Q76,50 68,60" stroke="#fff" stroke-width="4" fill="none" stroke-linecap="round"/>
          <!-- Wave 2 -->
          <path class="wave wave2" d="M74,32 Q86,50 74,68" stroke="rgba(255,255,255,0.7)" stroke-width="3.5" fill="none" stroke-linecap="round"/>
          <!-- Wave 3 -->
          <path class="wave wave3" d="M80,24 Q96,50 80,76" stroke="rgba(255,255,255,0.4)" stroke-width="3" fill="none" stroke-linecap="round"/>
        </svg>
      </div>

      <div class="center-label" id="centerLabel">어떤 동물일까?</div>

      <button class="replay-btn" id="replayBtn" aria-label="다시 듣기">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <polyline points="1 4 1 10 7 10"/>
          <path d="M3.51 15a9 9 0 1 0 .49-3"/>
        </svg>
        다시 듣기
      </button>

      <div class="problem-status" id="problemStatus"></div>
    </div>

    <!-- 닫기 버튼 -->
    <button class="icon-btn close-btn" id="closeBtn" aria-label="홈으로">✕</button>

    <!-- 점수 칩 바 -->
    <div class="score-bar" id="scoreBar"></div>
  </section>

  <!-- 화면 3: 결과 -->
  <section class="screen screen-result" id="resultScreen">
    <header class="result-header">
      <h2 class="result-title" id="resultTitle">게임 종료!</h2>
    </header>
    <div class="result-winner" id="resultWinner"></div>

    <div class="result-table-wrap">
      <table class="result-table" id="resultTable">
        <thead id="resultTableHead"></thead>
        <tbody id="resultTableBody"></tbody>
      </table>
    </div>

    <div class="total-row" id="totalRow"></div>

    <div class="result-actions">
      <button class="btn btn-primary" id="retryBtn">다시하기</button>
      <button class="btn btn-secondary" id="homeBtn">홈으로</button>
    </div>
  </section>

  <script src="../../shared/engine.js"></script>
  <script src="game.js"></script>
</body>
</html>
