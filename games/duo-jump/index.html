<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>2인 점프</title>
<link rel="stylesheet" href="../../shared/style.css?v=2">
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="screen screen-intro active" id="introScreen">
  <header class="game-header">
    <button class="icon-btn" id="backBtn" aria-label="뒤로가기">←</button>
    <h1 class="game-title">2인 점프</h1>
    <button class="sound-toggle" id="soundToggleIntro" aria-label="사운드 토글">🔇</button>
  </header>
  <div class="intro-body">
    <div class="intro-demo" aria-hidden="true">
      <!-- P1 character (red) jumping -->
      <svg viewBox="0 0 60 72" width="58" height="68">
        <rect x="0" y="56" width="60" height="16" fill="#8D6E63"/>
        <circle cx="30" cy="22" r="14" fill="#EF5350"/>
        <circle cx="30" cy="20" r="14" fill="#FF8A80"/>
        <circle cx="26" cy="18" r="2" fill="#fff"/>
        <circle cx="34" cy="18" r="2" fill="#fff"/>
        <circle cx="26" cy="18" r="1" fill="#000"/>
        <circle cx="34" cy="18" r="1" fill="#000"/>
        <path d="M30 8 L30 2 M22 5 L38 3" stroke="#FFD54F" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
      <!-- Obstacle -->
      <svg viewBox="0 0 40 60" width="30" height="48">
        <rect x="10" y="10" width="20" height="40" fill="#424242" stroke="#000" stroke-width="2" rx="4"/>
        <text x="20" y="38" text-anchor="middle" font-size="18">🌵</text>
      </svg>
      <!-- P2 character (blue) jumping -->
      <svg viewBox="0 0 60 72" width="58" height="68">
        <rect x="0" y="56" width="60" height="16" fill="#8D6E63"/>
        <circle cx="30" cy="22" r="14" fill="#1E88E5"/>
        <circle cx="30" cy="20" r="14" fill="#64B5F6"/>
        <circle cx="26" cy="18" r="2" fill="#fff"/>
        <circle cx="34" cy="18" r="2" fill="#fff"/>
        <circle cx="26" cy="18" r="1" fill="#000"/>
        <circle cx="34" cy="18" r="1" fill="#000"/>
        <path d="M30 8 L30 2 M22 5 L38 3" stroke="#FFD54F" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
    </div>
    <p class="intro-text">둘이 동시에 탭해서 점프!</p>
    <div class="badge-2p">👥 2인 전용</div>
    <p class="intro-subtext">장애물이 올 때 P1, P2가<br>동시에 탭해야 점프 성공!</p>
    <ul class="intro-rules">
      <li>장애물이 화면 가운데 올 때 점프</li>
      <li>두 명 모두 0.3초 이내에 탭해야 성공</li>
      <li>한 명만 탭하면 실패 (HP 감소)</li>
      <li>HP 3개, 최대한 많이 성공시켜요!</li>
    </ul>
  </div>
  <button class="btn btn-play" id="playBtn">🦘 PLAY</button>
</section>

<section class="screen screen-countdown" id="countdownScreen">
  <div class="countdown-number" id="countdownNumber">3</div>
</section>

<section class="screen screen-game" id="gameScreen">
  <div class="game-hud">
    <button class="hud-close" id="closeBtn" aria-label="홈으로">✕</button>
    <span class="hud-label" id="hudHp">❤❤❤</span>
    <span class="hud-time" id="hudTime">30</span>
    <span class="hud-score" id="hudScore">0점</span>
    <button class="hud-sound" id="soundToggleGame" aria-label="사운드 토글">🔇</button>
  </div>

  <div class="play-area">
    <div class="track-area" id="trackArea">
      <div class="character" id="character">
        <svg viewBox="0 0 80 80"><circle cx="40" cy="40" r="30" fill="#FFB74D"/><circle cx="40" cy="38" r="30" fill="#FFCA28"/><circle cx="32" cy="34" r="4" fill="#fff"/><circle cx="48" cy="34" r="4" fill="#fff"/><circle cx="32" cy="35" r="2" fill="#000"/><circle cx="48" cy="35" r="2" fill="#000"/><path d="M30 48 Q40 56 50 48" stroke="#000" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
      </div>
      <div class="feedback" id="feedback"></div>
    </div>

    <div class="zones">
      <div class="tap-zone p1" id="zone1">
        <div class="zone-label">P1</div>
        <div class="zone-hint">탭해서 점프!</div>
      </div>
      <div class="tap-zone p2" id="zone2">
        <div class="zone-label">P2</div>
        <div class="zone-hint">탭해서 점프!</div>
      </div>
    </div>
  </div>
</section>

<section class="screen screen-result" id="resultScreen">
  <div class="result-emoji-big" id="resultEmoji">🎉</div>
  <h2 class="result-headline" id="resultHeadline">성공!</h2>
  <p class="result-sub" id="resultSub">호흡이 딱 맞았어요!</p>
  <div class="result-stats">
    <div class="stat-row"><span class="stat-label">성공</span><span class="stat-val" id="statSuccess">0회</span></div>
    <div class="stat-row"><span class="stat-label">실패</span><span class="stat-val" id="statFail">0회</span></div>
    <div class="stat-row"><span class="stat-label">점수</span><span class="stat-val" id="statScore">0점</span></div>
  </div>
  <div class="result-actions">
    <button class="btn btn-retry" id="retryBtn">다시하기</button>
    <button class="btn btn-home-res" id="homeBtn">홈으로</button>
  </div>
</section>

<script src="../../shared/engine.js?v=2"></script>
<script src="game.js"></script>
</body>
</html>
