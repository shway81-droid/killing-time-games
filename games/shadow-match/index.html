<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>그림자 맞추기</title>
  <link rel="stylesheet" href="../../shared/style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 화면 1: 인트로 -->
  <section class="screen screen-intro active" id="introScreen">
    <header class="game-header">
      <button class="icon-btn" id="backBtn" aria-label="뒤로가기">←</button>
      <h1 class="game-title">그림자 맞추기</h1>
      <button class="sound-toggle" id="soundToggleIntro" aria-label="사운드 토글">🔇</button>
    </header>

    <div class="intro-body">
      <div class="intro-demo" aria-hidden="true">
        <div class="demo-shadow">
          <!-- Shadow silhouette of star -->
          <svg viewBox="0 0 60 60" width="72" height="72" xmlns="http://www.w3.org/2000/svg">
            <polygon points="30,4 36,21 55,21 40,32 46,50 30,39 14,50 20,32 5,21 24,21"
              fill="#333333" stroke="#222222" stroke-width="2" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="demo-arrow">→</div>
        <div class="demo-grid">
          <div class="demo-item demo-item-wrong">
            <!-- Heart (wrong) -->
            <svg viewBox="0 0 60 60" width="44" height="44" xmlns="http://www.w3.org/2000/svg">
              <path d="M30 52 Q6 36 6 20 Q6 8 18 8 Q24 8 30 16 Q36 8 42 8 Q54 8 54 20 Q54 36 30 52Z"
                fill="#E91E63" stroke="#880E4F" stroke-width="2"/>
            </svg>
          </div>
          <div class="demo-item demo-item-correct">
            <!-- Star (correct) -->
            <svg viewBox="0 0 60 60" width="44" height="44" xmlns="http://www.w3.org/2000/svg">
              <polygon points="30,4 36,21 55,21 40,32 46,50 30,39 14,50 20,32 5,21 24,21"
                fill="#FFD600" stroke="#F9A825" stroke-width="2" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="demo-item demo-item-wrong">
            <!-- Cloud (wrong) -->
            <svg viewBox="0 0 60 60" width="44" height="44" xmlns="http://www.w3.org/2000/svg">
              <circle cx="20" cy="34" r="12" fill="#B3E5FC" stroke="#29B6F6" stroke-width="1.5"/>
              <circle cx="32" cy="28" r="15" fill="#E1F5FE" stroke="#29B6F6" stroke-width="1.5"/>
              <circle cx="44" cy="34" r="11" fill="#B3E5FC" stroke="#29B6F6" stroke-width="1.5"/>
              <rect x="10" y="34" width="38" height="14" fill="#E1F5FE"/>
            </svg>
          </div>
        </div>
      </div>

      <p class="intro-text">그림자의 원래 그림을 찾으세요!</p>
      <p class="intro-subtext">10라운드 · 먼저 정답을 터치하면 +1점 · 오답은 실격</p>

      <div class="player-select-label">인원 선택</div>
      <div class="player-select-row">
        <button class="player-btn active" data-count="2">2명</button>
        <button class="player-btn" data-count="3">3명</button>
        <button class="player-btn" data-count="4">4명</button>
      </div>
    </div>

    <button class="btn btn-primary btn-play" id="playBtn">PLAY</button>
  </section>

  <!-- 화면 2: 게임 플레이 -->
  <section class="screen screen-game" id="gameScreen">
    <!-- 플레이어 구역 (JS로 동적 렌더링) -->
    <div class="zones-wrap" id="zonesWrap"></div>

    <!-- 중앙 타겟 패널 (그림자) -->
    <div class="target-panel" id="targetPanel">
      <div class="round-badge" id="roundBadge">1 / 10</div>
      <div class="target-wrap" id="targetWrap">
        <div class="target-svg-box" id="targetSvgBox">
          <!-- JS로 채움 -->
        </div>
        <div class="target-label">이 그림자의 주인은?</div>
      </div>
      <div class="round-status" id="roundStatus"></div>
    </div>

    <button class="icon-btn close-btn" id="closeBtn" aria-label="홈으로">✕</button>
  </section>

  <!-- 화면 3: 결과 -->
  <section class="screen screen-result" id="resultScreen">
    <header class="result-header">
      <h2 class="result-title" id="resultTitle">게임 종료!</h2>
    </header>
    <div class="result-winner" id="resultWinner"></div>

    <div class="result-scores-wrap" id="resultScoresWrap"></div>

    <div class="result-actions">
      <button class="btn btn-primary" id="retryBtn">다시하기</button>
      <button class="btn btn-secondary" id="homeBtn">홈으로</button>
    </div>
  </section>

  <script src="../../shared/engine.js"></script>
  <script src="game.js"></script>
</body>
</html>
