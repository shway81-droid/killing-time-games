<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>폭탄 피하기</title>
  <link rel="stylesheet" href="../../shared/style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 화면 1: 인트로 -->
  <section class="screen screen-intro active" id="introScreen">
    <header class="game-header">
      <button class="icon-btn" id="backBtn" aria-label="뒤로가기">←</button>
      <h1 class="game-title">폭탄 피하기</h1>
      <button class="icon-btn sound-btn" id="soundToggleIntro" aria-label="사운드 토글">🔇</button>
    </header>

    <div class="intro-body">
      <div class="intro-illustration" aria-hidden="true">
        <svg viewBox="0 0 120 80" width="160" height="106">
          <!-- Star -->
          <polygon points="30,8 35,22 50,24 39,34 42,48 30,41 18,48 21,34 10,24 25,22"
            fill="#FFD54F" stroke="#FFA000" stroke-width="1.5" stroke-linejoin="round"/>
          <polygon points="30,13 33,22 43,23 36,29 38,38 30,33 22,38 24,29 17,23 27,22"
            fill="#FFECB3" opacity="0.5"/>
          <!-- Bomb -->
          <circle cx="88" cy="52" r="22" fill="#424242" stroke="#212121" stroke-width="2"/>
          <circle cx="80" cy="44" r="7" fill="rgba(255,255,255,0.15)"/>
          <path d="M88 30 Q95 22 102 25" fill="none" stroke="#795548" stroke-width="3.5" stroke-linecap="round"/>
          <circle cx="103" cy="23" r="5" fill="#FF6F00"/>
          <circle cx="103" cy="23" r="3" fill="#FFEB3B"/>
          <!-- spark lines -->
          <line x1="107" y1="18" x2="112" y2="14" stroke="#FFEE58" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="110" y1="23" x2="116" y2="22" stroke="#FFEE58" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="105" y1="17" x2="108" y2="11" stroke="#FFEE58" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>

      <p class="intro-desc">별은 터치! 폭탄은 피해!</p>
      <p class="intro-sub">30초 동안 가장 많이 점수를 얻은 플레이어가 승리!</p>

      <div class="player-select-label">인원 선택</div>
      <div class="player-select">
        <button class="player-btn active" data-count="2">2명</button>
        <button class="player-btn" data-count="3">3명</button>
        <button class="player-btn" data-count="4">4명</button>
      </div>
    </div>

    <button class="btn btn-primary btn-play" id="playBtn">PLAY</button>
  </section>

  <!-- 화면 2: 카운트다운 -->
  <section class="screen screen-countdown" id="countdownScreen">
    <div class="countdown-number" id="countdownNumber">3</div>
  </section>

  <!-- 화면 3: 게임 -->
  <section class="screen screen-game" id="gameScreen">
    <div class="game-hud" id="gameHud">
      <div class="hud-timer-wrap">
        <div class="hud-timer-bar">
          <div class="hud-timer-fill" id="timerFill"></div>
        </div>
        <span class="hud-timer-text" id="timerText">30</span>
      </div>
      <div class="hud-scores" id="hudScores">
        <!-- dynamically populated -->
      </div>
      <button class="icon-btn hud-close" id="closeBtn" aria-label="홈으로">✕</button>
    </div>

    <div class="game-zones" id="gameZones">
      <!-- dynamically populated -->
    </div>
  </section>

  <!-- 화면 4: 결과 -->
  <section class="screen screen-result" id="resultScreen">
    <div class="result-body">
      <div class="result-crown">🏆</div>
      <h2 class="result-winner-label" id="resultWinnerLabel">승자</h2>
      <div class="result-winner-name" id="resultWinnerName">P1</div>
      <div class="result-scores" id="resultScores">
        <!-- dynamically populated -->
      </div>
    </div>
    <div class="result-actions">
      <button class="btn btn-primary" id="retryBtn">다시하기</button>
      <button class="btn btn-secondary" id="homeBtn">홈으로</button>
    </div>
  </section>

  <script src="../../shared/engine.js"></script>
  <script src="game.js"></script>
</body>
</html>
