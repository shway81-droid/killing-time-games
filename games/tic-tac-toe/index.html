<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>틱택토</title>
  <link rel="stylesheet" href="../../shared/style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 화면 1: 인트로 -->
  <section class="screen screen-intro active" id="introScreen">
    <header class="game-header">
      <button class="icon-btn" id="backBtn" aria-label="뒤로가기">←</button>
      <h1 class="game-title">틱택토</h1>
      <button class="sound-toggle" id="soundToggleIntro" aria-label="사운드 토글">🔇</button>
    </header>

    <div class="intro-body">
      <!-- 미니 그리드 일러스트 -->
      <div class="intro-preview" aria-hidden="true">
        <svg viewBox="0 0 160 160" width="160" height="160">
          <!-- 그리드 선 -->
          <line x1="53" y1="10" x2="53" y2="150" stroke="#333" stroke-width="4" stroke-linecap="round"/>
          <line x1="107" y1="10" x2="107" y2="150" stroke="#333" stroke-width="4" stroke-linecap="round"/>
          <line x1="10" y1="53" x2="150" y2="53" stroke="#333" stroke-width="4" stroke-linecap="round"/>
          <line x1="10" y1="107" x2="150" y2="107" stroke="#333" stroke-width="4" stroke-linecap="round"/>
          <!-- O (상단 중앙) -->
          <circle cx="80" cy="31" r="14" fill="none" stroke="#29B6F6" stroke-width="5"/>
          <!-- X (상단 오른쪽) -->
          <line x1="119" y1="18" x2="143" y2="42" stroke="#EF5350" stroke-width="5" stroke-linecap="round"/>
          <line x1="143" y1="18" x2="119" y2="42" stroke="#EF5350" stroke-width="5" stroke-linecap="round"/>
          <!-- O (중앙) -->
          <circle cx="80" cy="80" r="14" fill="none" stroke="#29B6F6" stroke-width="5"/>
          <!-- X (하단 왼쪽) -->
          <line x1="17" y1="119" x2="41" y2="143" stroke="#EF5350" stroke-width="5" stroke-linecap="round"/>
          <line x1="41" y1="119" x2="17" y2="143" stroke="#EF5350" stroke-width="5" stroke-linecap="round"/>
          <!-- O (하단 오른쪽) - 승리 대각선 강조 -->
          <circle cx="131" cy="131" r="14" fill="none" stroke="#29B6F6" stroke-width="5"/>
          <!-- O 상단 좌 -->
          <circle cx="31" cy="31" r="14" fill="none" stroke="#29B6F6" stroke-width="5"/>
          <!-- 승리 대각선 -->
          <line x1="17" y1="17" x2="145" y2="145" stroke="#29B6F6" stroke-width="3" stroke-linecap="round" opacity="0.4" stroke-dasharray="6 4"/>
        </svg>
      </div>

      <p class="intro-text">O와 X를 번갈아 놓으세요</p>
      <p class="intro-subtext">가로, 세로, 대각선으로 3개를 먼저 만들면 이겨요!</p>

      <div class="intro-rules">
        <div class="rule-item">
          <span class="rule-icon o-color">⭕</span>
          <span>O가 먼저 시작</span>
        </div>
        <div class="rule-item">
          <span class="rule-icon x-color">❌</span>
          <span>X가 다음 차례</span>
        </div>
      </div>
    </div>

    <button class="btn btn-primary btn-play" id="playBtn">PLAY</button>
  </section>

  <!-- 화면 2: 게임 플레이 -->
  <section class="screen screen-game" id="gameScreen">
    <header class="game-header">
      <button class="icon-btn" id="closeBtn" aria-label="홈으로">←</button>
      <div class="turn-indicator" id="turnIndicator">
        <span class="turn-dot" id="turnDot"></span>
        <span class="turn-text" id="turnText">O의 차례</span>
      </div>
      <button class="sound-toggle" id="soundToggleGame" aria-label="사운드 토글">🔇</button>
    </header>

    <div class="board-wrapper">
      <div class="board" id="board">
        <button class="cell" data-index="0" aria-label="1번 칸"></button>
        <button class="cell" data-index="1" aria-label="2번 칸"></button>
        <button class="cell" data-index="2" aria-label="3번 칸"></button>
        <button class="cell" data-index="3" aria-label="4번 칸"></button>
        <button class="cell" data-index="4" aria-label="5번 칸"></button>
        <button class="cell" data-index="5" aria-label="6번 칸"></button>
        <button class="cell" data-index="6" aria-label="7번 칸"></button>
        <button class="cell" data-index="7" aria-label="8번 칸"></button>
        <button class="cell" data-index="8" aria-label="9번 칸"></button>
      </div>
    </div>
  </section>

  <!-- 화면 3: 결과 -->
  <section class="screen screen-result" id="resultScreen">
    <div class="result-body">
      <div class="result-emoji" id="resultEmoji">🎉</div>
      <h2 class="result-title" id="resultTitle">O 승리!</h2>
      <p class="result-sub" id="resultSub">O가 3줄을 완성했어요!</p>
    </div>
    <div class="result-actions">
      <button class="btn btn-primary" id="retryBtn">다시하기</button>
      <button class="btn btn-secondary" id="homeBtn">홈으로</button>
    </div>
  </section>

  <script src="../../shared/engine.js"></script>
  <script src="game.js"></script>

</body>
</html>
