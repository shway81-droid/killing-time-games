<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>두더지 잡기</title>
  <link rel="stylesheet" href="../../shared/style.css?v=2">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 화면 1: 인트로 -->
  <section class="screen screen-intro active" id="introScreen">
    <header class="game-header">
      <button class="icon-btn" id="backBtn" aria-label="뒤로가기">←</button>
      <h1 class="game-title">두더지 잡기</h1>
      <button class="icon-btn sound-btn" id="soundToggleIntro" aria-label="사운드 토글">🔇</button>
    </header>

    <div class="intro-body">
      <div class="intro-illustration" aria-hidden="true">
        <svg viewBox="0 0 100 90" width="120" height="108">
          <ellipse cx="50" cy="65" rx="32" ry="22" fill="#8D6E63"/>
          <ellipse cx="50" cy="42" rx="28" ry="26" fill="#A1887F"/>
          <circle cx="26" cy="24" r="10" fill="#8D6E63"/>
          <circle cx="26" cy="24" r="6" fill="#D7837F"/>
          <circle cx="74" cy="24" r="10" fill="#8D6E63"/>
          <circle cx="74" cy="24" r="6" fill="#D7837F"/>
          <ellipse cx="38" cy="38" rx="6" ry="7" fill="#FFF"/>
          <ellipse cx="39" cy="40" rx="3.5" ry="4.5" fill="#333"/>
          <circle cx="40" cy="38" r="1.2" fill="#FFF"/>
          <ellipse cx="62" cy="38" rx="6" ry="7" fill="#FFF"/>
          <ellipse cx="63" cy="40" rx="3.5" ry="4.5" fill="#333"/>
          <circle cx="64" cy="38" r="1.2" fill="#FFF"/>
          <ellipse cx="50" cy="50" rx="5" ry="3.5" fill="#D7837F"/>
          <path d="M43 56 Q50 63 57 56" fill="none" stroke="#6D4C41" stroke-width="1.8" stroke-linecap="round"/>
          <ellipse cx="28" cy="50" rx="7" ry="4" fill="#FFAB91" opacity="0.5"/>
          <ellipse cx="72" cy="50" rx="7" ry="4" fill="#FFAB91" opacity="0.5"/>
        </svg>
      </div>

      <p class="intro-desc">내 영역의 두더지를 빠르게 잡으세요!</p>
      <p class="intro-sub">30초 동안 가장 많이 잡은 플레이어가 승리! (2인 대결)</p>
    </div>

    <button class="btn btn-primary btn-play" id="playBtn">PLAY</button>
  </section>

  <!-- 화면 2: 카운트다운 -->
  <section class="screen screen-countdown" id="countdownScreen">
    <div class="countdown-number" id="countdownNumber">3</div>
  </section>

  <!-- 화면 3: 게임 -->
  <section class="screen screen-game" id="gameScreen">
    <div class="game-hud" id="gameHud">
      <div class="hud-timer-wrap">
        <div class="hud-timer-bar">
          <div class="hud-timer-fill" id="timerFill"></div>
        </div>
        <span class="hud-timer-text" id="timerText">30</span>
      </div>
      <div class="hud-scores" id="hudScores">
        <!-- dynamically populated -->
      </div>
      <button class="icon-btn hud-close" id="closeBtn" aria-label="홈으로">✕</button>
    </div>

    <div class="game-zones" id="gameZones">
      <!-- dynamically populated -->
    </div>
  </section>

  <!-- 화면 4: 결과 -->
  <section class="screen screen-result" id="resultScreen">
    <div class="result-body">
      <div class="result-crown">🏆</div>
      <h2 class="result-winner-label" id="resultWinnerLabel">승자</h2>
      <div class="result-winner-name" id="resultWinnerName">P1</div>
      <div class="result-scores" id="resultScores">
        <!-- dynamically populated -->
      </div>
    </div>
    <div class="result-actions">
      <button class="btn btn-primary" id="retryBtn">다시하기</button>
      <button class="btn btn-secondary" id="homeBtn">홈으로</button>
    </div>
  </section>

  <script src="../../shared/engine.js?v=2"></script>
  <script src="game.js"></script>
</body>
</html>
