<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>거울 그리기</title>
<link rel="stylesheet" href="../../shared/style.css?v=2">
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="screen screen-intro active" id="introScreen">
  <header class="game-header">
    <button class="icon-btn" id="backBtn" aria-label="뒤로가기">←</button>
    <h1 class="game-title">거울 그리기</h1>
    <button class="sound-toggle" id="soundToggleIntro" aria-label="사운드 토글">🔇</button>
  </header>
  <div class="intro-body">
    <div class="intro-demo" aria-hidden="true">
      <!-- Left: P1 target 3x3 with dots -->
      <svg viewBox="0 0 72 72" width="74" height="74">
        <rect x="4" y="4" width="64" height="64" rx="6" fill="#FFF8E1" stroke="#FB8C00" stroke-width="2"/>
        <line x1="25" y1="4" x2="25" y2="68" stroke="#FFCC80" stroke-width="1"/>
        <line x1="47" y1="4" x2="47" y2="68" stroke="#FFCC80" stroke-width="1"/>
        <line x1="4" y1="25" x2="68" y2="25" stroke="#FFCC80" stroke-width="1"/>
        <line x1="4" y1="47" x2="68" y2="47" stroke="#FFCC80" stroke-width="1"/>
        <circle cx="14" cy="14" r="6" fill="#EF5350"/>
        <circle cx="58" cy="14" r="6" fill="#EF5350"/>
        <circle cx="36" cy="36" r="6" fill="#EF5350"/>
        <circle cx="14" cy="58" r="6" fill="#EF5350"/>
      </svg>
      <!-- Arrow with speech -->
      <svg viewBox="0 0 50 40" width="40" height="32">
        <text x="25" y="13" text-anchor="middle" font-size="10" fill="#FB8C00">🗣</text>
        <path d="M6 22 L38 22 M32 16 L38 22 L32 28" stroke="#FB8C00" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <!-- Right: P2 mirrored copy -->
      <svg viewBox="0 0 72 72" width="74" height="74">
        <rect x="4" y="4" width="64" height="64" rx="6" fill="#E0F7FA" stroke="#0097A7" stroke-width="2"/>
        <line x1="25" y1="4" x2="25" y2="68" stroke="#80DEEA" stroke-width="1"/>
        <line x1="47" y1="4" x2="47" y2="68" stroke="#80DEEA" stroke-width="1"/>
        <line x1="4" y1="25" x2="68" y2="25" stroke="#80DEEA" stroke-width="1"/>
        <line x1="4" y1="47" x2="68" y2="47" stroke="#80DEEA" stroke-width="1"/>
        <circle cx="14" cy="14" r="6" fill="#FB8C00"/>
        <circle cx="58" cy="14" r="6" fill="#FB8C00"/>
        <circle cx="36" cy="36" r="6" fill="#FB8C00"/>
        <circle cx="14" cy="58" r="4.5" fill="none" stroke="#FB8C00" stroke-width="2" stroke-dasharray="2,2"/>
      </svg>
    </div>
    <p class="intro-text">말로 설명하고 똑같이 그려요!</p>
    <div class="badge-2p">👥 2인 전용</div>
    <p class="intro-subtext">P1이 본 그림을 말로 설명하고<br>P2가 격자에 똑같이 그려요!</p>
    <ul class="intro-rules">
      <li>왼쪽(P1): 5×5 격자에 빨간 점 위치 확인</li>
      <li>오른쪽(P2): P1 설명 듣고 같은 칸 탭</li>
      <li>정확도 80% 이상 = 성공!</li>
      <li>3라운드, 2라운드 성공 목표!</li>
    </ul>
  </div>
  <button class="btn btn-play" id="playBtn">🎨 PLAY</button>
</section>

<section class="screen screen-countdown" id="countdownScreen">
  <div class="countdown-number" id="countdownNumber">3</div>
</section>

<section class="screen screen-game" id="gameScreen">
  <div class="game-hud">
    <button class="hud-close" id="closeBtn" aria-label="홈으로">✕</button>
    <span class="hud-round" id="hudRound">1/3</span>
    <div class="hud-timer-track"><div class="hud-timer-fill" id="hudTimerFill" style="width:100%"></div></div>
    <span class="hud-score" id="hudScore">0점</span>
    <button class="hud-sound" id="soundToggleGame" aria-label="사운드 토글">🔇</button>
  </div>
  <div class="banner" id="banner"></div>
  <div class="boards">
    <div class="board p1">
      <div class="board-label">👁 P1 원본</div>
      <div class="board-sub">P2에게 설명하세요!</div>
      <div class="grid5" id="gridTarget"></div>
    </div>
    <div class="board p2">
      <div class="board-label">🎨 P2 그리기</div>
      <div class="board-sub">탭해서 칸 채우기</div>
      <div class="grid5" id="gridInput"></div>
    </div>
  </div>
</section>

<section class="screen screen-result" id="resultScreen">
  <div class="result-emoji-big" id="resultEmoji">🎉</div>
  <h2 class="result-headline" id="resultHeadline">성공!</h2>
  <p class="result-sub" id="resultSub">말로 잘 전달했어요!</p>
  <div class="result-stats">
    <div class="stat-row"><span class="stat-label">성공 라운드</span><span class="stat-val" id="statScore">0/3</span></div>
    <div class="stat-row"><span class="stat-label">평균 정확도</span><span class="stat-val" id="statAcc">0%</span></div>
  </div>
  <div class="result-actions">
    <button class="btn btn-retry" id="retryBtn">다시하기</button>
    <button class="btn btn-home-res" id="homeBtn">홈으로</button>
  </div>
</section>

<script src="../../shared/engine.js?v=2"></script>
<script src="game.js"></script>
</body>
</html>
