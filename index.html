<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>킬링타임 미니게임</title>
  <link rel="stylesheet" href="shared/style.css">
  <style>
    /* === Launcher page background === */
    body {
      background: linear-gradient(135deg, #e8eaf6 0%, #e1f5fe 50%, #f3e5f5 100%);
      min-height: 100vh;
    }

    .launcher-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-md) var(--space-lg);
    }

    .launcher-title {
      font-size: var(--font-size-title);
      font-weight: 700;
      background: linear-gradient(135deg, #5c6bc0, #7c4dff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* 필터 영역 */
    .filter-section {
      padding: 0 var(--space-lg);
      margin-bottom: var(--space-sm);
    }

    .filter-label {
      font-size: var(--font-size-small);
      color: var(--text-sub);
      font-weight: 600;
      margin-bottom: var(--space-xs);
    }

    .filter-bar {
      display: flex;
      gap: var(--space-sm);
      flex-wrap: wrap;
      margin-bottom: var(--space-sm);
    }

    .filter-btn {
      padding: var(--space-sm) var(--space-md);
      border: none;
      border-radius: var(--btn-radius);
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      font-family: var(--font-family);
      font-size: var(--font-size-small);
      font-weight: 600;
      color: var(--text-sub);
      cursor: pointer;
      transition: all 0.15s ease;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .filter-btn.active {
      background: var(--primary);
      color: #FFFFFF;
      box-shadow: 0 2px 8px rgba(124,92,252,0.3);
    }

    /* 카테고리 필터 — 각 카테고리별 색상 */
    .cat-btn[data-cat="speed"].active { background: #FF9800; box-shadow: 0 2px 8px rgba(255,152,0,0.35); }
    .cat-btn[data-cat="brain"].active { background: #9C27B0; box-shadow: 0 2px 8px rgba(156,39,176,0.35); }
    .cat-btn[data-cat="math"].active  { background: #29B6F6; box-shadow: 0 2px 8px rgba(41,182,246,0.35); }
    .cat-btn[data-cat="knowledge"].active { background: #EC407A; box-shadow: 0 2px 8px rgba(236,64,122,0.35); }

    /* 게임 카드 그리드 */
    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(var(--card-min-size), 1fr));
      gap: var(--space-md);
      padding: 0 var(--space-lg) var(--space-lg);
    }

    .game-card {
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.8);
      border-radius: var(--card-radius);
      box-shadow: var(--shadow-card);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .game-card:active {
      transform: scale(1.03);
      box-shadow: var(--shadow-card-hover);
    }

    .game-card-thumb {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
      background: linear-gradient(135deg, var(--thumb-color, #ccc), var(--thumb-color-dark, #999)) !important;
    }

    .game-card-info {
      padding: var(--space-sm) var(--space-md);
      text-align: center;
    }

    .game-card-name {
      font-size: var(--font-size-card);
      font-weight: 700;
    }

    .game-card-time {
      font-size: var(--font-size-small);
      color: var(--text-sub);
      margin-top: 2px;
    }

    /* 카드 숨김 (필터) */
    .game-card.hidden {
      display: none;
    }
  </style>
</head>
<body>

  <header class="launcher-header">
    <h1 class="launcher-title">킬링타임 미니게임</h1>
    <button class="sound-toggle" id="soundToggle" aria-label="사운드 토글">🔇</button>
  </header>

  <div class="filter-section">
    <nav class="filter-bar" id="catFilter">
      <button class="filter-btn cat-btn active" data-cat="all">전체</button>
      <button class="filter-btn cat-btn" data-cat="speed">⚡ 반응속도</button>
      <button class="filter-btn cat-btn" data-cat="brain">🧠 두뇌</button>
      <button class="filter-btn cat-btn" data-cat="math">📐 수학</button>
      <button class="filter-btn cat-btn" data-cat="knowledge">📚 지식</button>
    </nav>
  </div>

  <main class="game-grid" id="gameGrid">
    <!-- JS가 카드를 동적으로 삽입 -->
  </main>

  <script src="shared/engine.js"></script>
  <script>
    // 카테고리 매핑
    var CATEGORY_MAP = {
      'whack-a-mole': 'speed',
      'reaction-race': 'speed',
      'catch-the-fly': 'speed',
      'balloon-pop': 'speed',
      'bomb-dodge': 'speed',
      'color-touch': 'brain',
      'shape-match': 'brain',
      'shadow-match': 'brain',
      'missing-piece': 'brain',
      'mirror-match': 'brain',
      'quick-sort': 'brain',
      'quick-math': 'math',
      'size-compare': 'math',
      'even-odd': 'math',
      'color-count': 'math',
      'more-or-less': 'math',
      'number-tap': 'math',
      'clock-reading': 'math',
      'ox-quiz': 'knowledge',
      'initial-quiz': 'knowledge',
      'dots-and-boxes': 'brain',
      'memory-match': 'brain',
      'capital-quiz': 'knowledge',
      'flag-quiz': 'knowledge',
      'proverb-quiz': 'knowledge',
      'nim-game': 'brain'
    };

    const FALLBACK_GAMES = [
      { folder:'whack-a-mole', name:'두더지 잡기', description:'내 영역의 두더지를 빠르게 잡으세요!', icon:'🔨', color:'#81C784', grades:[1,2,3,4,5,6], playTime:'30초' },
      { folder:'reaction-race', name:'신호 반응', description:'초록색이 되면 재빨리 터치!', icon:'🚦', color:'#66BB6A', grades:[1,2,3,4,5,6], playTime:'1분' },
      { folder:'number-tap', name:'숫자 순서대로', description:'1부터 순서대로 빠르게 터치하세요!', icon:'🔢', color:'#FFA726', grades:[1,2,3,4,5,6], playTime:'1~2분' },
      { folder:'catch-the-fly', name:'파리 잡기', description:'내 영역의 파리를 빠르게 잡으세요!', icon:'🪰', color:'#7E77A8', grades:[1,2,3,4,5,6], playTime:'30초' },
      { folder:'dots-and-boxes', name:'도트 앤 박스', description:'선을 그어 사각형을 완성하세요!', icon:'🔲', color:'#78909C', grades:[2,3,4,5,6], playTime:'2~3분' },
      { folder:'memory-match', name:'카드 뒤집기', description:'같은 그림 카드 짝을 찾으세요!', icon:'🃏', color:'#AB47BC', grades:[1,2,3,4,5,6], playTime:'1~2분' },
      { folder:'quick-math', name:'빠른 계산', description:'정답을 가장 먼저 터치하세요!', icon:'🧮', color:'#26A69A', grades:[1,2,3,4,5,6], playTime:'1~2분' },
      { folder:'ox-quiz', name:'OX 퀴즈', description:'O일까 X일까? 빠르게 맞춰보세요!', icon:'❓', color:'#EC407A', grades:[1,2,3,4,5,6], playTime:'1~2분' },
      { folder:'balloon-pop', name:'풍선 터트리기', description:'떠오르는 풍선을 빠르게 터치!', icon:'🎈', color:'#E91E63', grades:[1,2,3,4,5,6], playTime:'30초' },
      { folder:'color-touch', name:'색깔 터치', description:'글자의 뜻에 맞는 색을 터치!', icon:'🟡', color:'#9C27B0', grades:[1,2,3,4,5,6], playTime:'1분' },
      { folder:'bomb-dodge', name:'폭탄 피하기', description:'별은 터치! 폭탄은 피해!', icon:'💣', color:'#F44336', grades:[1,2,3,4,5,6], playTime:'30초' },
      { folder:'shape-match', name:'모양 맞추기', description:'같은 그림을 가장 먼저 찾아라!', icon:'🔷', color:'#00BCD4', grades:[1,2,3,4,5,6], playTime:'1분' },
      { folder:'size-compare', name:'크기 비교', description:'더 큰 숫자를 먼저 터치!', icon:'📐', color:'#FF9800', grades:[1,2,3,4,5,6], playTime:'1분' },
      { folder:'quick-sort', name:'빠른 분류', description:'맞는 것만 골라서 터치!', icon:'🗂️', color:'#4CAF50', grades:[1,2,3,4,5,6], playTime:'30초' },
      { folder:'even-odd', name:'짝홀 대결', description:'짝수? 홀수? 빠르게 판단!', icon:'🔢', color:'#3F51B5', grades:[1,2,3,4,5,6], playTime:'1분' },
      { folder:'more-or-less', name:'많다 적다', description:'어느 쪽이 더 많은지 빠르게 판단!', icon:'⚖️', color:'#8D6E63', grades:[1,2,3,4,5,6], playTime:'1분' },
      { folder:'color-count', name:'색 세기', description:'같은 색 원이 몇 개인지 세어보세요!', icon:'🔵', color:'#42A5F5', grades:[1,2,3,4,5,6], playTime:'1분' },
      { folder:'initial-quiz', name:'초성 퀴즈', description:'초성을 보고 맞는 그림을 터치!', icon:'🔤', color:'#8D6E63', grades:[1,2,3,4,5,6], playTime:'1분' },
      { folder:'shadow-match', name:'그림자 맞추기', description:'그림자를 보고 원래 그림을 찾으세요!', icon:'🌑', color:'#546E7A', grades:[1,2,3,4,5,6], playTime:'1분' },
      { folder:'missing-piece', name:'빠진 조각', description:'패턴을 보고 빠진 조각을 찾으세요!', icon:'🧩', color:'#7E57C2', grades:[1,2,3,4,5,6], playTime:'1분' },
      { folder:'mirror-match', name:'거울 대칭', description:'거울에 비친 모습을 찾으세요!', icon:'🪞', color:'#26C6DA', grades:[1,2,3,4,5,6], playTime:'1분' },
      { folder:'clock-reading', name:'시계 읽기', description:'시계를 보고 맞는 시간을 터치!', icon:'🕐', color:'#78909C', grades:[1,2,3,4,5,6], playTime:'1분' },
      { folder:'capital-quiz', name:'수도 맞추기', description:'나라의 수도를 맞춰보세요!', icon:'🌍', color:'#26A69A', grades:[1,2,3,4,5,6], playTime:'1분' },
      { folder:'flag-quiz', name:'국기 맞추기', description:'국기를 보고 나라를 맞춰보세요!', icon:'🏁', color:'#1565C0', grades:[1,2,3,4,5,6], playTime:'1분' },
      { folder:'proverb-quiz', name:'속담 완성', description:'속담의 뒷부분을 맞춰보세요!', icon:'📜', color:'#795548', grades:[2,3,4,5,6], playTime:'1분' },
      { folder:'nim-game', name:'돌 가져가기', description:'마지막 돌을 가져가면 지는 전략 게임!', icon:'🪨', color:'#607D8B', grades:[1,2,3,4,5,6], playTime:'2~3분' }
    ];

    const grid = document.getElementById('gameGrid');
    const catBtns = document.querySelectorAll('#catFilter .cat-btn');
    const soundToggle = document.getElementById('soundToggle');
    let allGames = [];
    let currentCat = 'all';

    // --- 사운드 토글 ---
    function updateSoundIcon() {
      const muted = sessionStorage.getItem('sound-muted') !== 'false';
      soundToggle.textContent = muted ? '🔇' : '🔊';
    }
    soundToggle.addEventListener('click', function() {
      const wasMuted = sessionStorage.getItem('sound-muted') !== 'false';
      sessionStorage.setItem('sound-muted', !wasMuted);
      updateSoundIcon();
    });
    updateSoundIcon();

    // --- 썸네일 그라디언트용 색상 어둡게 ---
    function darkenColor(hex) {
      var r = parseInt(hex.slice(1,3),16);
      var g = parseInt(hex.slice(3,5),16);
      var b = parseInt(hex.slice(5,7),16);
      r = Math.max(0, Math.floor(r * 0.65));
      g = Math.max(0, Math.floor(g * 0.65));
      b = Math.max(0, Math.floor(b * 0.65));
      return '#' + [r,g,b].map(function(v){ return v.toString(16).padStart(2,'0'); }).join('');
    }

    // --- 카드 렌더링 ---
    function renderCards(games) {
      grid.innerHTML = '';
      allGames = games;
      games.forEach(function(game) {
        var a = document.createElement('a');
        a.className = 'game-card';
        a.href = 'games/' + game.folder + '/index.html';
        a.dataset.grades = JSON.stringify(game.grades);
        a.dataset.cat = CATEGORY_MAP[game.folder] || 'brain';
        a.innerHTML =
          '<div class="game-card-thumb" style="--thumb-color:' + game.color + ';--thumb-color-dark:' + darkenColor(game.color) + '">' +
            '<span>' + game.icon + '</span>' +
          '</div>' +
          '<div class="game-card-info">' +
            '<div class="game-card-name">' + game.name + '</div>' +
            '<div class="game-card-time">' + game.playTime + '</div>' +
          '</div>';
        grid.appendChild(a);
      });
      applyFilters();
    }

    // --- 필터 적용 (카테고리) ---
    function applyFilters() {
      var cards = grid.querySelectorAll('.game-card');
      cards.forEach(function(card) {
        var cat = card.dataset.cat;
        var catOk = (currentCat === 'all') || (cat === currentCat);
        card.classList.toggle('hidden', !catOk);
      });
    }

    // --- 카테고리 필터 ---
    catBtns.forEach(function(btn) {
      btn.addEventListener('click', function() {
        catBtns.forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        currentCat = btn.dataset.cat;
        applyFilters();
      });
    });

    // --- 게임 목록 로딩 ---
    async function loadGames() {
      try {
        var res = await fetch('games/registry.json');
        var folders = await res.json();
        var games = [];
        for (var i = 0; i < folders.length; i++) {
          var metaRes = await fetch('games/' + folders[i] + '/game.json');
          var meta = await metaRes.json();
          meta.folder = folders[i];
          games.push(meta);
        }
        renderCards(games);
      } catch (e) {
        renderCards(FALLBACK_GAMES);
      }
    }

    loadGames();
  </script>

</body>
</html>
