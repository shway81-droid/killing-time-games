<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>킬링타임 미니게임</title>
  <link rel="stylesheet" href="shared/style.css">
  <style>
    .launcher-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-md) var(--space-lg);
    }

    .launcher-title {
      font-size: var(--font-size-title);
      font-weight: 700;
    }

    /* 학년 필터 */
    .filter-bar {
      display: flex;
      gap: var(--space-sm);
      padding: 0 var(--space-lg);
      margin-bottom: var(--space-md);
    }

    .filter-btn {
      padding: var(--space-sm) var(--space-md);
      border: 2px solid #E0E0E0;
      border-radius: var(--btn-radius);
      background: var(--bg);
      font-family: var(--font-family);
      font-size: var(--font-size-small);
      font-weight: 600;
      color: var(--text-sub);
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .filter-btn.active {
      border-color: var(--primary);
      background: var(--primary);
      color: #FFFFFF;
    }

    /* 게임 카드 그리드 */
    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(var(--card-min-size), 1fr));
      gap: var(--space-md);
      padding: 0 var(--space-lg) var(--space-lg);
    }

    .game-card {
      background: var(--card-bg);
      border-radius: var(--card-radius);
      box-shadow: var(--shadow-card);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .game-card:active {
      transform: scale(1.03);
      box-shadow: var(--shadow-card-hover);
    }

    .game-card-thumb {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
    }

    .game-card-info {
      padding: var(--space-sm) var(--space-md);
      text-align: center;
    }

    .game-card-name {
      font-size: var(--font-size-card);
      font-weight: 700;
    }

    .game-card-time {
      font-size: var(--font-size-small);
      color: var(--text-sub);
      margin-top: 2px;
    }

    /* 카드 숨김 (필터) */
    .game-card.hidden {
      display: none;
    }
  </style>
</head>
<body>

  <header class="launcher-header">
    <h1 class="launcher-title">킬링타임 미니게임</h1>
    <button class="sound-toggle" id="soundToggle" aria-label="사운드 토글">🔇</button>
  </header>

  <nav class="filter-bar">
    <button class="filter-btn active" data-filter="all">전체</button>
    <button class="filter-btn" data-filter="low">저학년</button>
    <button class="filter-btn" data-filter="high">고학년</button>
  </nav>

  <main class="game-grid" id="gameGrid">
    <!-- JS가 카드를 동적으로 삽입 -->
  </main>

  <script src="shared/engine.js"></script>
  <script>
    const FALLBACK_GAMES = [
      { folder:'whack-a-mole', name:'두더지 잡기', description:'내 영역의 두더지를 빠르게 잡으세요!', icon:'🔨', color:'#81C784', grades:[1,2,3,4,5,6], playTime:'30초' },
      { folder:'reaction-race', name:'신호 반응', description:'초록색이 되면 재빨리 터치!', icon:'🚦', color:'#66BB6A', grades:[1,2,3,4,5,6], playTime:'1분' },
      { folder:'number-tap', name:'숫자 순서대로', description:'1부터 순서대로 빠르게 터치하세요!', icon:'🔢', color:'#FFA726', grades:[1,2,3,4,5,6], playTime:'1~2분' },
      { folder:'catch-the-fly', name:'파리 잡기', description:'내 영역의 파리를 빠르게 잡으세요!', icon:'🪰', color:'#7E77A8', grades:[1,2,3,4,5,6], playTime:'30초' },
      { folder:'dots-and-boxes', name:'도트 앤 박스', description:'선을 그어 사각형을 완성하세요!', icon:'🔲', color:'#78909C', grades:[2,3,4,5,6], playTime:'2~3분' },
      { folder:'memory-match', name:'카드 뒤집기', description:'같은 그림 카드 짝을 찾으세요!', icon:'🃏', color:'#AB47BC', grades:[1,2,3,4,5,6], playTime:'1~2분' },
      { folder:'simon-says', name:'색깔 따라하기', description:'색 순서를 기억하고 따라하세요!', icon:'🌈', color:'#5C6BC0', grades:[1,2,3,4,5,6], playTime:'2~3분' },
      { folder:'quick-math', name:'빠른 계산', description:'정답을 가장 먼저 터치하세요!', icon:'🧮', color:'#26A69A', grades:[1,2,3,4,5,6], playTime:'1~2분' },
      { folder:'spot-the-match', name:'같은 그림 찾기', description:'같은 이모지 2개를 빨리 찾으세요!', icon:'🔍', color:'#FDD835', grades:[1,2,3,4,5,6], playTime:'1~2분' },
      { folder:'ox-quiz', name:'OX 퀴즈', description:'O일까 X일까? 빠르게 맞춰보세요!', icon:'❓', color:'#EC407A', grades:[1,2,3,4,5,6], playTime:'1~2분' }
    ];

    const grid = document.getElementById('gameGrid');
    const filterBtns = document.querySelectorAll('.filter-btn');
    const soundToggle = document.getElementById('soundToggle');
    let allGames = [];

    // --- 사운드 토글 (런처에서는 상태만 관리) ---
    function updateSoundIcon() {
      const muted = sessionStorage.getItem('sound-muted') !== 'false';
      soundToggle.textContent = muted ? '🔇' : '🔊';
    }
    soundToggle.addEventListener('click', function() {
      const wasMuted = sessionStorage.getItem('sound-muted') !== 'false';
      sessionStorage.setItem('sound-muted', !wasMuted);
      updateSoundIcon();
    });
    updateSoundIcon();

    // --- 카드 렌더링 ---
    function renderCards(games) {
      grid.innerHTML = '';
      allGames = games;
      games.forEach(function(game) {
        var a = document.createElement('a');
        a.className = 'game-card';
        a.href = 'games/' + game.folder + '/index.html';
        a.dataset.grades = JSON.stringify(game.grades);
        a.innerHTML =
          '<div class="game-card-thumb" style="background:' + game.color + '">' +
            '<span>' + game.icon + '</span>' +
          '</div>' +
          '<div class="game-card-info">' +
            '<div class="game-card-name">' + game.name + '</div>' +
            '<div class="game-card-time">' + game.playTime + '</div>' +
          '</div>';
        grid.appendChild(a);
      });
    }

    // --- 학년 필터 ---
    filterBtns.forEach(function(btn) {
      btn.addEventListener('click', function() {
        filterBtns.forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        applyFilter(btn.dataset.filter);
      });
    });

    function applyFilter(filter) {
      var cards = grid.querySelectorAll('.game-card');
      cards.forEach(function(card) {
        var grades = JSON.parse(card.dataset.grades);
        var show = true;
        if (filter === 'low') {
          show = grades.some(function(g) { return g >= 1 && g <= 3; });
        } else if (filter === 'high') {
          show = grades.some(function(g) { return g >= 4 && g <= 6; });
        }
        card.classList.toggle('hidden', !show);
      });
    }

    // --- 게임 목록 로딩 (fetch → fallback) ---
    async function loadGames() {
      try {
        var res = await fetch('games/registry.json');
        var folders = await res.json();
        var games = [];
        for (var i = 0; i < folders.length; i++) {
          var metaRes = await fetch('games/' + folders[i] + '/game.json');
          var meta = await metaRes.json();
          meta.folder = folders[i];
          games.push(meta);
        }
        renderCards(games);
      } catch (e) {
        // file:// 프로토콜 등에서 fetch 실패 시 fallback
        renderCards(FALLBACK_GAMES);
      }
    }

    loadGames();
  </script>

</body>
</html>
