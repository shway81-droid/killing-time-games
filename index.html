  <style>
    /* === Launcher page background === */
    body {
      background: #FFFFFF;
      min-height: 100vh;
    }

    /* === 피드백 플로팅 버튼 === */
    .feedback-fab {
      position: fixed;
      bottom: 20px;
      right: 20px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 20px;
      background: linear-gradient(135deg, #7c5cfc, #5c6bc0);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.95rem;
      border-radius: 30px;
      box-shadow: 0 4px 16px rgba(124,92,252,0.4);
      z-index: 1000;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .feedback-fab:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(124,92,252,0.5);
    }
    .feedback-fab:active {
      transform: translateY(0);
    }
    .feedback-fab svg {
      flex-shrink: 0;
    }
    /* 모바일: 아이콘만 */
    @media (max-width: 480px) {
      .feedback-fab {
        padding: 14px;
        border-radius: 50%;
      }
      .feedback-fab span { display: none; }
    }

    .launcher-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-md) var(--space-lg);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .brand-logo {
      flex-shrink: 0;
      filter: drop-shadow(0 2px 8px rgba(124,77,255,0.25));
    }
    .launcher-title {
      font-size: var(--font-size-title);
      font-weight: 800;
      letter-spacing: -0.01em;
      background: linear-gradient(135deg, #5c6bc0, #7c4dff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* 필터 영역 */
    .filter-section {
      padding: 0 var(--space-lg);
      margin-bottom: var(--space-sm);
    }

    .filter-label {
      font-size: var(--font-size-small);
      color: var(--text-sub);
      font-weight: 600;
      margin-bottom: var(--space-xs);
    }

    .filter-bar {
      display: flex;
      gap: var(--space-sm);
      flex-wrap: wrap;
      margin-bottom: var(--space-sm);
    }

    .filter-btn {
      padding: var(--space-sm) var(--space-md);
      border: none;
      border-radius: var(--btn-radius);
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      font-family: var(--font-family);
      font-size: var(--font-size-small);
      font-weight: 600;
      color: var(--text-sub);
      cursor: pointer;
      transition: all 0.15s ease;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .filter-btn.active {
      background: var(--primary);
      color: #FFFFFF;
      box-shadow: 0 2px 8px rgba(124,92,252,0.3);
    }

    /* 카테고리 필터 — 각 카테고리별 색상 */
    .cat-btn[data-cat="speed"].active { background: #FF9800; box-shadow: 0 2px 8px rgba(255,152,0,0.35); }
    .cat-btn[data-cat="brain"].active { background: #9C27B0; box-shadow: 0 2px 8px rgba(156,39,176,0.35); }
    .cat-btn[data-cat="math"].active  { background: #29B6F6; box-shadow: 0 2px 8px rgba(41,182,246,0.35); }
    .cat-btn[data-cat="knowledge"].active { background: #EC407A; box-shadow: 0 2px 8px rgba(236,64,122,0.35); }
    .cat-btn[data-cat="coop"].active { background: #00ACC1; box-shadow: 0 2px 8px rgba(0,172,193,0.35); }

    /* 게임 카드 그리드 */
    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(var(--card-min-size), 1fr));
      gap: var(--space-md);
      padding: 0 var(--space-lg) var(--space-lg);
    }

    .game-card {
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.8);
      border-radius: var(--card-radius);
      box-shadow: var(--shadow-card);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .game-card:active {
      transform: scale(1.03);
      box-shadow: var(--shadow-card-hover);
    }

    .game-card-thumb {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
      background: var(--thumb-color, #ccc) !important;
    }

    .game-card-info {
      padding: var(--space-sm) var(--space-md);
      text-align: center;
    }

    .game-card-name {
      font-size: var(--font-size-card);
      font-weight: 700;
    }

    .game-card-time {
      font-size: var(--font-size-small);
      color: var(--text-sub);
      margin-top: 2px;
    }

    /* SVG 아이콘 */
    .card-icon-svg {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
    }
    .card-icon-svg svg {
      width: 65%;
      height: 65%;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.35));
    }

    /* 카드 숨김 (필터) */
    .game-card.hidden {
      display: none;
    }

    /* ═══════════════════════════════════════════════════════════
       LEVEL 3 PREVIEW — 디자인풍 전환 (메인 페이지)
       복원: 이 블록만 통째로 삭제하면 됨
       ═══════════════════════════════════════════════════════════ */

    body {
      background:
        radial-gradient(circle at 12% 8%, rgba(124,77,255,0.10) 0, transparent 30%),
        radial-gradient(circle at 88% 92%, rgba(255,193,7,0.10) 0, transparent 35%),
        #FFF8F0 !important;
      background-attachment: fixed;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: radial-gradient(rgba(0,0,0,0.04) 1.5px, transparent 1.5px);
      background-size: 20px 20px;
      pointer-events: none;
      z-index: 0;
    }
    body > * { position: relative; z-index: 1; }

    /* 헤더 */
    .launcher-header {
      padding: 20px 24px 8px;
      align-items: center;
    }
    .brand-logo {
      width: 56px !important;
      height: 56px !important;

    .launcher-title {
      font-size: 2.2rem !important;
      font-weight: 900 !important;
      letter-spacing: -0.03em !important;
      -webkit-text-stroke: 0;
      text-shadow: 0 4px 0 rgba(124,77,255,0.18);
    }

    /* 사운드 토글 — 청키하게 */
    .sound-toggle {
      width: 52px !important;
      height: 52px !important;
      border-radius: 50% !important;
      background: #fff !important;
      border: 3px solid #2C2C2C !important;
      box-shadow: 4px 4px 0 #2C2C2C !important;
      font-size: 1.4rem !important;
    }
    .sound-toggle:active {
      transform: translate(2px,2px);
      box-shadow: 2px 2px 0 #2C2C2C !important;
    }

    /* 필터 버튼 — 청키 캡슐 + 검정 테두리 */
    .filter-section {
      padding: 0 24px;
    }
    .filter-bar {
      gap: 10px !important;
      margin-bottom: 20px !important;
    }
    .filter-btn {
      padding: 12px 22px !important;
      border-radius: 999px !important;
      background: #fff !important;
      border: 3px solid #2C2C2C !important;
      box-shadow: 3px 3px 0 #2C2C2C !important;
      backdrop-filter: none !important;
      -webkit-backdrop-filter: none !important;
      font-weight: 800 !important;
      font-size: 0.95rem !important;
      color: #2C2C2C !important;
      transition: all 0.1s ease !important;
    }
    .filter-btn:active {
      transform: translate(2px,2px);
      box-shadow: 1px 1px 0 #2C2C2C !important;
    }
    .filter-btn.active {
      color: #fff !important;
      box-shadow: 3px 3px 0 #2C2C2C !important;
    }
    .cat-btn[data-cat="speed"].active     { background: #FF7043 !important; }
    .cat-btn[data-cat="brain"].active     { background: #AB47BC !important; }
    .cat-btn[data-cat="math"].active      { background: #26C6DA !important; }
    .cat-btn[data-cat="knowledge"].active { background: #EC407A !important; }
    .cat-btn[data-cat="coop"].active      { background: #66BB6A !important; }
    .filter-btn[data-cat="all"].active    { background: #7C4DFF !important; }

    /* 게임 카드 — 두꺼운 검정 테두리, 큰 그림자, 라운드 ↑ */
    .game-grid {
      gap: 18px !important;
      padding: 0 24px 100px !important;
    }
    .game-card {
      background: #fff !important;
      backdrop-filter: none !important;
      -webkit-backdrop-filter: none !important;
      border: 3px solid #2C2C2C !important;
      border-radius: 22px !important;
      box-shadow: 6px 6px 0 #2C2C2C !important;
      overflow: hidden !important;
      transition: all 0.12s ease !important;
    }
    .game-card:hover {
      transform: translate(-2px,-2px);
      box-shadow: 8px 8px 0 #2C2C2C !important;
    }
    .game-card:active {
      transform: translate(3px,3px) !important;
      box-shadow: 3px 3px 0 #2C2C2C !important;
    }
    .game-card-thumb {
      border-bottom: 3px solid #2C2C2C !important;
      aspect-ratio: 1.05 !important;
    }
    .card-icon-svg svg {
      width: 70% !important;
      height: 70% !important;
      filter: drop-shadow(0 6px 0 rgba(0,0,0,0.18));
    }
    .game-card-info {
      padding: 12px 14px 14px !important;
    }
    .game-card-name {
      font-size: 1.05rem !important;
      font-weight: 900 !important;
      letter-spacing: -0.01em !important;
    }
    .game-card-time {
      font-size: 0.78rem !important;
      font-weight: 700 !important;
      color: #888 !important;
      margin-top: 4px !important;
    }

    /* 피드백 버튼 — 청키 스타일 */
    .feedback-fab {
      padding: 14px 22px !important;
      border-radius: 999px !important;
      border: 3px solid #2C2C2C !important;
      background: #FFD54F !important;
      color: #2C2C2C !important;
      font-weight: 900 !important;
      font-size: 1rem !important;
      box-shadow: 5px 5px 0 #2C2C2C !important;
    }
    .feedback-fab:hover {
      transform: translate(-2px,-2px) !important;
      box-shadow: 7px 7px 0 #2C2C2C !important;
    }
    .feedback-fab:active {
      transform: translate(2px,2px) !important;
      box-shadow: 2px 2px 0 #2C2C2C !important;
    }
  </style>
</head>

      { folder:'missing-piece', name:'빠진 조각', description:'패턴을 보고 빠진 조각을 찾으세요!', icon:'🧩', color:'#7E57C2', grades:[1,2,3,4,5,6], playTime:'1분' },
      { folder:'mirror-match', name:'거울 대칭', description:'거울에 비친 모습을 찾으세요!', icon:'🪞', color:'#26C6DA', grades:[1,2,3,4,5,6], playTime:'1분' },
      { folder:'clock-reading', name:'시계 읽기', description:'시계를 보고 맞는 시간을 터치!', icon:'🕐', color:'#78909C', grades:[1,2,3,4,5,6], playTime:'1분' },
      { folder:'capital-quiz', name:'수도 맞추기', description:'나라의 수도를 맞춰보세요!', icon:'🌍', color:'#26A69A', grades:[1,2,3,4,5,6], playTime:'1분' },
      { folder:'flag-quiz', name:'국기 맞추기', description:'국기를 보고 나라를 맞춰보세요!', icon:'🏁', color:'#1565C0', grades:[1,2,3,4,5,6], playTime:'1분' },
      { folder:'proverb-quiz', name:'속담 완성', description:'속담의 뒷부분을 맞춰보세요!', icon:'📜', color:'#795548', grades:[2,3,4,5,6], playTime:'1분' },
      { folder:'nim-game', name:'돌 가져가기', description:'마지막 돌을 가져가면 지는 전략 게임!', icon:'🪨', color:'#607D8B', grades:[1,2,3,4,5,6], playTime:'2~3분' },
      { folder:'secret-code', name:'비밀 암호', description:'P1이 본 색 순서를 말로 알려주고 P2가 입력!', icon:'🔐', color:'#3F51B5', grades:[1,2,3,4,5,6], playTime:'1~2분' },
      { folder:'mirror-draw', name:'거울 그리기', description:'P1이 설명하고 P2가 격자에 똑같이 그려요!', icon:'🎨', color:'#FB8C00', grades:[2,3,4,5,6], playTime:'1~2분' },
      { folder:'commander-explorer', name:'지휘관과 탐험가', description:'P1이 지도를 보고 P2에게 길을 알려줘요!', icon:'🗺️', color:'#388E3C', grades:[2,3,4,5,6], playTime:'2분' }
    ];

    const grid = document.getElementById('gameGrid');
    const catBtns = document.querySelectorAll('#catFilter .cat-btn');
    const soundToggle = document.getElementById('soundToggle');
    let allGames = [];
    let currentCat = 'all';

    // --- 사운드 토글 ---
    function updateSoundIcon() {
      const muted = sessionStorage.getItem('sound-muted') !== 'false';
      soundToggle.textContent = muted ? '🔇' : '🔊';
    }
    soundToggle.addEventListener('click', function() {
      const wasMuted = sessionStorage.getItem('sound-muted') !== 'false';
      sessionStorage.setItem('sound-muted', !wasMuted);
      updateSoundIcon();
    });
    updateSoundIcon();

    // --- 썸네일 파스텔 색상 변환 ---
    function pastelColor(hex) {
      var r = parseInt(hex.slice(1,3),16);
      var g = parseInt(hex.slice(3,5),16);
      var b = parseInt(hex.slice(5,7),16);
      // 흰색과 70% 혼합 → 파스텔
      r = Math.round(r + (255 - r) * 0.55);
      g = Math.round(g + (255 - g) * 0.55);
      b = Math.round(b + (255 - b) * 0.55);
      return '#' + [r,g,b].map(function(v){ return v.toString(16).padStart(2,'0'); }).join('');
    }

    // --- 카드 렌더링 ---
    function renderCards(games) {
      grid.innerHTML = '';
      allGames = games;
      games.forEach(function(game) {
        var a = document.createElement('a');
        a.className = 'game-card';
        a.href = 'games/' + game.folder + '/index.html';
        a.setAttribute('aria-label', game.name + ' 게임 시작');
        a.dataset.grades = JSON.stringify(game.grades);
        a.dataset.cat = CATEGORY_MAP[game.folder] || 'brain';
        a.innerHTML =
          '<div class="game-card-thumb" style="--thumb-color:' + pastelColor(game.color) + '">' +
            '<span class="card-icon-svg">' + (GAME_ICONS[game.folder] || game.icon) + '</span>' +
          '</div>' +
          '<div class="game-card-info">' +
            '<div class="game-card-name">' + game.name + '</div>' +
            '<div class="game-card-time">' + game.playTime + '</div>' +
          '</div>';
        grid.appendChild(a);
      });
      applyFilters();
    }

    // --- 필터 적용 (카테고리) ---
    function applyFilters() {
      var cards = grid.querySelectorAll('.game-card');
      cards.forEach(function(card) {
        var cat = card.dataset.cat;
        var catOk = (currentCat === 'all') || (cat === currentCat);
        card.classList.toggle('hidden', !catOk);
      });
    }

    // --- 카테고리 필터 ---
    catBtns.forEach(function(btn) {
      btn.addEventListener('click', function() {
        catBtns.forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        currentCat = btn.dataset.cat;
        applyFilters();
      });
    });

    // --- 게임 목록 로딩 ---
    async function loadGames() {
      try {
        var res = await fetch('games/registry.json');
        var folders = await res.json();

        // Parallel fetch all game.json files
        var games = await Promise.all(folders.map(function(folder) {
          return fetch('games/' + folder + '/game.json')
            .then(function(r) {
              if (!r.ok) throw new Error(folder);
              return r.json();
            })
            .then(function(meta) {
              meta.folder = folder;
              return meta;
            })
            .catch(function() {
              // Per-game error isolation: skip failed games
              console.warn('Failed to load:', folder);
              return null;
            });
        }));

        // Filter out failed games
        var validGames = games.filter(function(g) { return g !== null; });

        if (validGames.length === 0) {
          // All failed → fall back
          renderCards(FALLBACK_GAMES);
        } else {
          renderCards(validGames);
        }
      } catch (e) {
        // Registry fetch failed → fallback
        renderCards(FALLBACK_GAMES);
      }
    }

    // Verify engine.js loaded
    if (typeof createTimer !== 'function' || typeof onTap !== 'function') {
      document.body.innerHTML = '<div style="padding:40px;text-align:center;font-family:sans-serif;"><h1>오류</h1><p>게임 엔진을 불러오지 못했습니다.<br>새로고침해주세요.</p><button onclick="location.reload()" style="padding:12px 24px;background:#7c5cfc;color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer;">새로고침</button></div>';
    } else {
      loadGames();
    }

    // Register service worker for offline support
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('./sw.js').catch(function(err) {
          console.warn('SW registration failed:', err);
        });
      });
    }
  </script>

</body>
